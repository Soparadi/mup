<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Votre accès MovUP est ouvert</title>
</head>
<body style="margin:0;padding:0;background:#F5F5F7;font-family:Geist,Inter,-apple-system,'Helvetica Neue',sans-serif;color:#1D1D1F;-webkit-font-smoothing:antialiased;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F5F5F7;padding:32px 16px;">
  <tr><td align="center">
    <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background:#FFFFFF;border:1px solid #E8E8ED;border-radius:14px;overflow:hidden;">
      <tr><td style="padding:32px 36px 0;">
        <svg width="86" height="22" viewBox="0 0 86 22" xmlns="http://www.w3.org/2000/svg" aria-label="MovUP">
          <text x="0" y="17" font-family="Geist,Inter,Helvetica,sans-serif" font-size="20" font-weight="800" letter-spacing="-0.6" fill="#1D1D1F">MovUP</text>
        </svg>
      </td></tr>
      <tr><td style="padding:24px 36px 0;font-size:14px;line-height:1.65;color:#1D1D1F;">
        <p style="margin:0;">{{salutation}},</p>
        <p style="margin:14px 0 0;">{{intro}}</p>
        <p style="margin:14px 0 0;white-space:pre-line;">{{body}}</p>
      </td></tr>
      <tr><td style="padding:24px 36px 0;" align="center">
        <a href="{{cta_url}}" style="display:inline-block;background:#1D1D1F;color:#FFFFFF;text-decoration:none;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:600;letter-spacing:-0.2px;">Commencer ma première recherche</a>
      </td></tr>
      <tr><td style="padding:18px 36px 0;font-size:12px;color:#6E6E73;line-height:1.6;">
        <p style="margin:0;">Ou copiez ce lien dans votre navigateur :</p>
        <p style="margin:6px 0 0;word-break:break-all;color:#1D1D1F;">{{cta_url}}</p>
      </td></tr>
      <tr><td style="padding:24px 36px 32px;font-size:12px;color:#6E6E73;line-height:1.6;">
        <div style="border-top:1px solid #E8E8ED;padding-top:18px;">
          <p style="margin:0;color:#1D1D1F;">Bien à vous,<br>L’équipe MovUP</p>
          <p style="margin:14px 0 0;"><span style="font-weight:700;color:#1D1D1F;">MovUP</span> · <a href="https://movup.io" style="color:#6E6E73;text-decoration:none;">movup.io</a></p>
        </div>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
