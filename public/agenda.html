<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUP — Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;--surface:#F5F5F7;--surface2:#EBEBF0;
  --card:#FFFFFF;--border:#E8E8ED;--border2:#C7C7CC;
  --text:#1D1D1F;--muted:#6E6E73;--muted2:#AEAEB2;
  --green:#1D8348;--orange:#B84C00;--red:#CC0000;--blue:#0A66C2;
  --font:'Geist',-apple-system,'Helvetica Neue',sans-serif;
  --mono:'Geist Mono','SF Mono','Menlo',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);font-size:14px;color:var(--text);-webkit-font-smoothing:antialiased;display:flex}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0;height:100vh;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:12px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sb-logo-icon{width:28px;height:28px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;letter-spacing:-.3px}
.sb-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:10px 8px 5px;margin-top:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:12.5px;font-weight:500;color:var(--muted);transition:all .12s;text-decoration:none;cursor:pointer}
.sb-item:hover{color:var(--text);background:var(--surface2)}
.sb-item.active{color:var(--text);background:var(--card);font-weight:600;border:1px solid var(--border)}
.sb-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:9px;font-weight:800;font-family:var(--mono);background:var(--text);color:#fff;border-radius:6px;padding:1px 6px}

/* ── SHELL ── */
.shell{flex:1;display:grid;grid-template-columns:1fr 380px;height:100vh;overflow:hidden}

/* ── CALENDRIER ── */
.cal-col{display:flex;flex-direction:column;border-right:1px solid var(--border);height:100vh;overflow:hidden;background:var(--card);min-height:0}

.cal-hdr{background:var(--text);color:#fff;padding:20px 24px 18px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.cal-month{font-size:20px;font-weight:800;letter-spacing:-.4px}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav button:hover{background:rgba(255,255,255,.2)}
.cal-btn-today{padding:0 14px;font-family:var(--font);font-size:11.5px;font-weight:600;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;height:30px;transition:all .15s}
.cal-btn-today:hover{background:rgba(255,255,255,.22)}

.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.cal-day-lbl{padding:8px 0;text-align:center;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2)}

.cal-grid-wrap{flex:1;min-height:0;display:flex;flex-direction:column}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-height:0}

.cal-cell{min-height:88px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 8px;cursor:pointer;transition:background .1s;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--surface)}
.cal-cell.other-month .cal-date{color:var(--muted2)}
.cal-cell.today{background:var(--surface)}
.cal-cell.today .cal-date{width:24px;height:24px;background:var(--text);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-cell.selected{background:#EFF6FF}
.cal-date{font-size:12.5px;font-weight:600;color:var(--text);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.cal-events{display:flex;flex-direction:column;gap:2px}
.cal-evt{padding:2px 5px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-evt.type-rdv{background:rgba(10,102,194,.1);color:#0A66C2}
.cal-evt.type-visio{background:rgba(67,56,202,.1);color:#4338CA}
.cal-evt.type-appel{background:rgba(29,131,72,.1);color:#1D8348}
.cal-evt.type-devis{background:rgba(184,76,0,.1);color:#B84C00}
.cal-evt.type-perso{background:rgba(107,114,128,.1);color:#4B5563}
.cal-more{font-size:9.5px;color:var(--muted2);font-weight:600;padding:1px 4px}

/* ── COLONNE DROITE : vue jour ── */
.day-col{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg)}

.day-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)}
.day-hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.day-date-big{font-size:36px;font-weight:900;letter-spacing:-.8px;color:var(--text);line-height:1}
.day-name{font-size:11.5px;font-weight:500;color:var(--muted);margin-top:4px;text-transform:capitalize}
.day-weather{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--surface);flex-shrink:0}
.day-weather-ico{font-size:22px;line-height:1}
.day-weather-info{display:flex;flex-direction:column;gap:1px}
.day-weather-temp{font-size:18px;font-weight:800;letter-spacing:-.4px;color:var(--text);line-height:1}
.day-weather-desc{font-size:10.5px;color:var(--muted);font-weight:500}
.day-weather-loc{font-size:9.5px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.day-actions{display:flex;gap:6px;margin-top:12px}
.btn-add-evt{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:9px;border:none;background:var(--text);color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-add-evt:hover{background:#000}

/* Timeline */
.day-scroll{flex:1;overflow:hidden;display:flex;flex-direction:column}
.day-scroll::-webkit-scrollbar{width:3px}
.day-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.timeline{display:flex;flex-direction:column;flex:1}
.time-slot{display:flex;flex:1;border-bottom:1px solid var(--border);position:relative;min-height:44px}
.time-slot.current-hour{background:rgba(37,99,235,.02)}
.time-label{width:52px;padding:6px 8px 0;font-size:10.5px;font-weight:600;font-family:var(--mono);color:var(--muted2);flex-shrink:0;text-align:right;line-height:1}
.time-line{flex:1;padding:4px 10px 4px 14px;position:relative;border-left:1px solid var(--border)}
.current-time-line{position:absolute;left:0;right:0;height:2px;background:#2563eb;z-index:10}
.current-time-line::before{content:'';width:8px;height:8px;border-radius:50%;background:#2563eb;position:absolute;left:-4px;top:-3px}

/* Events dans la timeline */
.evt-block{padding:7px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;position:relative}
.evt-block:hover{transform:translateX(2px)}
.evt-block.type-rdv{background:rgba(10,102,194,.08);border-color:#0A66C2}
.evt-block.type-visio{background:rgba(67,56,202,.08);border-color:#4338CA}
.evt-block.type-appel{background:rgba(29,131,72,.08);border-color:#1D8348}
.evt-block.type-devis{background:rgba(184,76,0,.08);border-color:#B84C00}
.evt-block.type-perso{background:rgba(107,114,128,.08);border-color:#6B7280}
.evt-title{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px}
.evt-contact{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.evt-time-tag{font-size:10px;font-weight:600;font-family:var(--mono);color:var(--muted2);position:absolute;top:7px;right:10px}
.evt-empty{padding:20px 14px;text-align:center;color:var(--muted2);font-size:12.5px;font-style:italic}

/* Modal ajout événement */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-bar{height:4px;background:var(--text)}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-x{width:26px;height:26px;border-radius:7px;border:none;background:var(--surface2);cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.frow{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)}
.finput{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);width:100%;outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--text);background:var(--card)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-pills{display:flex;gap:5px;flex-wrap:wrap}
.type-pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.type-pill.sel{border-color:var(--text);background:var(--text);color:#fff}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-save{background:var(--text);color:#fff;border:none;border-radius:9px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-save:hover{background:#000}
.btn-can{background:var(--surface);color:var(--muted);border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<!-- SHELL -->
<div class="shell">

  <!-- CALENDRIER MENSUEL -->
  <div class="cal-col">
    <div class="cal-hdr">
      <div class="cal-month" id="cal-month-title">Avril 2026</div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="cal-btn-today" onclick="goToday()">Aujourd'hui</button>
        <div class="cal-nav">
          <button onclick="prevMonth()">‹</button>
          <button onclick="nextMonth()">›</button>
        </div>
      </div>
    </div>
    <div class="cal-days-header">
      <div class="cal-day-lbl">Lu</div>
      <div class="cal-day-lbl">Ma</div>
      <div class="cal-day-lbl">Me</div>
      <div class="cal-day-lbl">Je</div>
      <div class="cal-day-lbl">Ve</div>
      <div class="cal-day-lbl">Sa</div>
      <div class="cal-day-lbl">Di</div>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- VUE JOUR -->
  <div class="day-col">
    <div class="day-hdr">
      <div class="day-hdr-top">
        <div>
          <div class="day-date-big" id="day-date-big">6</div>
          <div id="day-clock" style="font-size:22px;font-weight:700;font-family:var(--mono);color:var(--muted);letter-spacing:.5px;margin-top:2px;line-height:1"></div>
          <div class="day-name" id="day-name">Lundi 6 avril 2026</div>
        </div>
        <div class="day-weather" id="day-weather">
          <div class="day-weather-ico" id="weather-ico">⛅</div>
          <div class="day-weather-info">
            <div class="day-weather-temp" id="weather-temp">—°</div>
            <div class="day-weather-desc" id="weather-desc">Chargement…</div>
            <div class="day-weather-loc">Combourg</div>
          </div>
        </div>
      </div>
      <div class="day-actions">
        <button class="btn-add-evt" onclick="openModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Ajouter un événement
        </button>
      </div>
    </div>
    <div class="day-scroll" id="day-scroll">
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-hdr">
      <div class="modal-title">Nouvel événement</div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="frow">
        <div class="flabel">Titre</div>
        <input class="finput" id="m-title" placeholder="Ex : RDV Laurent Morin">
      </div>
      <div class="frow">
        <div class="flabel">Contact / Société</div>
        <input class="finput" id="m-contact" placeholder="Ex : Château Margaux">
      </div>
      <div class="f2">
        <div class="frow">
          <div class="flabel">Heure début</div>
          <input class="finput" id="m-start" type="time" value="09:00">
        </div>
        <div class="frow">
          <div class="flabel">Heure fin</div>
          <input class="finput" id="m-end" type="time" value="10:00">
        </div>
      </div>
      <div class="frow">
        <div class="flabel">Type</div>
        <div class="type-pills">
          <span class="type-pill sel" data-type="rdv" onclick="selType(this)">📅 RDV</span>
          <span class="type-pill" data-type="visio" onclick="selType(this)">📹 Visio</span>
          <span class="type-pill" data-type="appel" onclick="selType(this)">📞 Appel</span>
          <span class="type-pill" data-type="devis" onclick="selType(this)">📄 Devis</span>
          <span class="type-pill" data-type="perso" onclick="selType(this)">⭐ Perso</span>
        </div>
      </div>
      <div class="frow">
        <div class="flabel">Notes</div>
        <textarea class="finput" id="m-notes" rows="2" placeholder="Optionnel…" style="resize:none"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-can" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR   = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

const TODAY = new Date();
let viewYear  = TODAY.getFullYear();
let viewMonth = TODAY.getMonth();
let selectedDay = new Date(TODAY);

// Événements (données mockées + stockage local)
const MOCK_EVENTS = [
  { id:'e1', date:'2026-04-06', start:'09:00', end:'10:00', title:'RDV Laurent Morin', contact:'Hôtel Le Grand', type:'rdv', notes:'Présentation solution écrans' },
  { id:'e2', date:'2026-04-06', start:'11:00', end:'11:30', title:'Visio K. Sørensen', contact:'Nimb Hotel', type:'visio', notes:'' },
  { id:'e3', date:'2026-04-06', start:'14:00', end:'15:30', title:'Signature devis P. Dumont', contact:'Le Meurice, Paris', type:'devis', notes:'Contrat 45k€' },
  { id:'e4', date:'2026-04-06', start:'17:00', end:'17:30', title:'Appel A. Morgan', contact:'Villa Firenze', type:'appel', notes:'Suite intro' },
  { id:'e5', date:'2026-04-08', start:'10:00', end:'11:00', title:'RDV S. Clément', contact:'Domaine Viticole', type:'rdv', notes:'' },
  { id:'e6', date:'2026-04-10', start:'14:00', end:'15:00', title:'Visio prospect Nantes', contact:'Events & Co', type:'visio', notes:'' },
  { id:'e7', date:'2026-04-15', start:'09:30', end:'10:30', title:'RDV Directeur Achats', contact:'Nordic Hotels', type:'rdv', notes:'Présenter catalogue' },
  { id:'e8', date:'2026-04-22', start:'11:00', end:'12:00', title:'Déjeuner A. Fournier', contact:'Château Margaux', type:'rdv', notes:'Closing' },
];

let events = [];

function loadEvents() {
  const stored = localStorage.getItem('mup_agenda');
  if(stored) { try { events = JSON.parse(stored); } catch(e) { events = []; } }
  if(!events.length) events = MOCK_EVENTS;
}

function saveEvents() {
  localStorage.setItem('mup_agenda', JSON.stringify(events));
}

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function eventsForDate(dateStr) {
  return events.filter(e => e.date === dateStr).sort((a,b) => a.start.localeCompare(b.start));
}

// ── CALENDRIER ──
function renderCal() {
  const title = document.getElementById('cal-month-title');
  const grid  = document.getElementById('cal-grid');
  title.textContent = MONTHS_FR[viewMonth] + ' ' + viewYear;

  // Premier jour du mois (0=dim, ajuster pour lundi)
  const first = new Date(viewYear, viewMonth, 1);
  const last  = new Date(viewYear, viewMonth+1, 0);
  let startDow = first.getDay(); // 0=dim
  startDow = startDow === 0 ? 6 : startDow - 1; // convertir lundi=0

  const cells = [];
  // Jours du mois précédent
  for(let i = startDow - 1; i >= 0; i--) {
    const d = new Date(viewYear, viewMonth, -i);
    cells.push({ date: d, otherMonth: true });
  }
  // Jours du mois
  for(let d = 1; d <= last.getDate(); d++) {
    cells.push({ date: new Date(viewYear, viewMonth, d), otherMonth: false });
  }
  // Compléter jusqu'à la fin de la semaine (multiple de 7, max 42)
  const targetLen = Math.ceil((startDow + last.getDate()) / 7) * 7;
  while(cells.length < targetLen) {
    const d = new Date(viewYear, viewMonth+1, cells.length - startDow - last.getDate() + 1);
    cells.push({ date: d, otherMonth: true });
  }

  // Calculer nb de rangées réelles
  const nbRows = Math.ceil(cells.length / 7);
  grid.style.gridTemplateRows = `repeat(${nbRows}, 1fr)`;
  grid.innerHTML = cells.map(cell => {
    const dk = dateKey(cell.date);
    const isToday = dk === dateKey(TODAY);
    const isSel   = dk === dateKey(selectedDay);
    const dayEvts = eventsForDate(dk);
    const cls = ['cal-cell', cell.otherMonth?'other-month':'', isToday?'today':'', isSel?'selected':''].filter(Boolean).join(' ');

    let evtHtml = '';
    const visible = dayEvts.slice(0, 2);
    visible.forEach(e => {
      evtHtml += `<div class="cal-evt type-${e.type}" title="${e.title}">${e.start} ${e.title}</div>`;
    });
    if(dayEvts.length > 2) evtHtml += `<div class="cal-more">+${dayEvts.length-2}</div>`;

    return `<div class="${cls}" onclick="selectDay(${cell.date.getTime()})">
      <div class="cal-date">${cell.date.getDate()}</div>
      <div class="cal-events">${evtHtml}</div>
    </div>`;
  }).join('');
}

function selectDay(ts) {
  selectedDay = new Date(ts);
  renderCal();
  renderDay();
}

function prevMonth() { viewMonth--; if(viewMonth < 0){ viewMonth=11; viewYear--; } renderCal(); }
function nextMonth() { viewMonth++; if(viewMonth > 11){ viewMonth=0; viewYear++; } renderCal(); }
function goToday()   { viewYear=TODAY.getFullYear(); viewMonth=TODAY.getMonth(); selectedDay=new Date(TODAY); renderCal(); renderDay(); }

// ── VUE JOUR ──
function renderDay() {
  const dk = dateKey(selectedDay);
  const dayEvts = eventsForDate(dk);

  // Header
  const dow = DAYS_FR[(selectedDay.getDay()+6)%7];
  const dd = String(selectedDay.getDate()).padStart(2,'0');
  const mm = String(selectedDay.getMonth()+1).padStart(2,'0');
  const yyyy = selectedDay.getFullYear();
  document.getElementById('day-date-big').textContent = dd + ' ' + mm + ' ' + yyyy;
  document.getElementById('day-name').textContent = dow;
  startClock();

  // Timeline 7h → 21h
  const timeline = document.getElementById('timeline');
  const nowH = TODAY.getHours() + TODAY.getMinutes()/60;
  const isToday = dk === dateKey(TODAY);

  let html = '';
  for(let h = 7; h <= 21; h++) {
    const hLabel = String(h).padStart(2,'0') + ':00';
    const hEvts  = dayEvts.filter(e => {
      const [eh] = e.start.split(':').map(Number);
      return eh === h;
    });

    let evtsHtml = '';
    hEvts.forEach(e => {
      const typeEmoji = {rdv:'📅',visio:'📹',appel:'📞',devis:'📄',perso:'⭐'}[e.type]||'📅';
      evtsHtml += `
        <div class="evt-block type-${e.type}" onclick="editEvent('${e.id}')">
          <div class="evt-time-tag">${e.start}–${e.end}</div>
          <div class="evt-title">${typeEmoji} ${e.title}</div>
          ${e.contact?`<div class="evt-contact"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${e.contact}</div>`:''}
          ${e.notes?`<div style="font-size:10.5px;color:var(--muted);margin-top:3px;font-style:italic">${e.notes}</div>`:''}
        </div>`;
    });

    // Ligne de l'heure courante
    let currentLine = '';
    if(isToday && nowH >= h && nowH < h+1) {
      const pct = (nowH - h) * 100;
      currentLine = `<div class="current-time-line" style="top:${pct}%;position:absolute;left:0;right:0"></div>`;
    }

    const isCurrent = isToday && Math.floor(nowH) === h;
    html += `<div class="time-slot${isCurrent?' current-hour':''}">
      <div class="time-label">${hLabel}</div>
      <div class="time-line" style="position:relative">
        ${currentLine}
        ${evtsHtml || '<div style="height:100%"></div>'}
      </div>
    </div>`;
  }

  if(!dayEvts.length) {
    html += `<div class="evt-empty">Aucun événement ce jour</div>`;
  }

  timeline.innerHTML = html;

  // Scroll vers l'heure courante si aujourd'hui
  if(isToday) {
    setTimeout(() => {
      const slot = document.querySelector('.current-hour');
      if(slot) slot.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 100);
  }
}

// ── MODAL ──
let editingId = null;
let modalType = 'rdv';

function openModal(hour) {
  editingId = null;
  document.getElementById('m-title').value = '';
  document.getElementById('m-contact').value = '';
  document.getElementById('m-notes').value = '';
  if(hour !== undefined) {
    document.getElementById('m-start').value = String(hour).padStart(2,'0') + ':00';
    document.getElementById('m-end').value = String(hour+1).padStart(2,'0') + ':00';
  } else {
    document.getElementById('m-start').value = '09:00';
    document.getElementById('m-end').value = '10:00';
  }
  selType(document.querySelector('.type-pill[data-type="rdv"]'));
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-title').focus(), 100);
}

function editEvent(id) {
  const e = events.find(x => x.id === id);
  if(!e) return;
  editingId = id;
  document.getElementById('m-title').value = e.title;
  document.getElementById('m-contact').value = e.contact||'';
  document.getElementById('m-start').value = e.start;
  document.getElementById('m-end').value = e.end;
  document.getElementById('m-notes').value = e.notes||'';
  selType(document.querySelector(`.type-pill[data-type="${e.type}"]`));
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function selType(el) {
  document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('sel'));
  el.classList.add('sel');
  modalType = el.dataset.type;
}

function saveEvent() {
  const title = document.getElementById('m-title').value.trim();
  if(!title) { document.getElementById('m-title').focus(); return; }
  if(editingId) {
    const e = events.find(x => x.id === editingId);
    if(e) { e.title=title; e.contact=document.getElementById('m-contact').value.trim(); e.start=document.getElementById('m-start').value; e.end=document.getElementById('m-end').value; e.type=modalType; e.notes=document.getElementById('m-notes').value.trim(); }
  } else {
    events.push({ id:'e'+Date.now(), date:dateKey(selectedDay), start:document.getElementById('m-start').value, end:document.getElementById('m-end').value, title, contact:document.getElementById('m-contact').value.trim(), type:modalType, notes:document.getElementById('m-notes').value.trim() });
  }
  saveEvents();
  closeModal();
  renderCal();
  renderDay();
}

// Fermer modal en cliquant outside
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

// Init


var _clockInterval = null;
function startClock() {
  if(_clockInterval) clearInterval(_clockInterval);
  function tick() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    var sec = String(now.getSeconds()).padStart(2,'0');
    var el = document.getElementById('day-clock');
    if(el) el.textContent = h + ':' + m + ':' + sec;
  }
  tick();
  _clockInterval = setInterval(tick, 1000);
}

// ── MÉTÉO Combourg ──
async function fetchWeather() {
  try {
    const r = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=48.41&longitude=-1.75&current=temperature_2m,weathercode&timezone=Europe/Paris',
      { signal: AbortSignal.timeout(6000) }
    );
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const code = d.current.weathercode;
    const { ico, desc } = weatherCode(code);
    document.getElementById('weather-ico').textContent  = ico;
    document.getElementById('weather-temp').textContent = temp + '°C';
    document.getElementById('weather-desc').textContent = desc;
  } catch(e) {
    document.getElementById('weather-desc').textContent = 'Indisponible';
  }
}

function weatherCode(c) {
  if(c === 0)           return { ico:'☀️',  desc:'Ensoleillé' };
  if(c <= 2)            return { ico:'🌤️',  desc:'Peu nuageux' };
  if(c === 3)           return { ico:'☁️',  desc:'Couvert' };
  if(c <= 48)           return { ico:'🌫️',  desc:'Brouillard' };
  if(c <= 57)           return { ico:'🌧️',  desc:'Bruine' };
  if(c <= 67)           return { ico:'🌧️',  desc:'Pluie' };
  if(c <= 77)           return { ico:'❄️',  desc:'Neige' };
  if(c <= 82)           return { ico:'🌦️',  desc:'Averses' };
  if(c <= 99)           return { ico:'⛈️',  desc:'Orages' };
  return { ico:'🌡️', desc:'—' };
}

loadEvents();
fetchWeather();
renderCal();
renderDay();
