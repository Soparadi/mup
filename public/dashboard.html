<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prospect — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  :root{
    --bg:#FFFFFF; --surface:#F5F5F7; --surface2:#EBEBF0;
    --card:#FFFFFF; --border:#E8E8ED; --border2:#C7C7CC;
    --text:#1D1D1F; --muted:#6E6E73; --muted2:#AEAEB2;
    --green:#1D8348; --orange:#B84C00; --red:#CC0000;
    --blue:#0A66C2; --purple:#4338CA;
    --font:'Geist',-apple-system,'Helvetica Neue',sans-serif;
    --mono:'Geist Mono','SF Mono','Menlo',monospace;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  ::-webkit-scrollbar{width:4px;height:4px;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ping{0%{transform:scale(1);opacity:1}100%{transform:scale(2.4);opacity:0}}
  @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  #news-ticker:hover #news-track{animation-play-state:paused;}
  @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}

  /* ── NAVBAR ── */
  nav{
    position:sticky;top:0;z-index:600;
    background:rgba(255,255,255,.94);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    height:56px;display:flex;align-items:center;
    justify-content:space-between;padding:0 28px;
  }
  .nav-logo{font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px;text-decoration:none;}
  .nav-logo-badge{display:flex;gap:4px;}
  .nav-logo-dot{width:7px;height:7px;border-radius:50%;}
  .nav-links{display:flex;gap:2px;}
  .nav-link{font-size:12.5px;color:var(--muted);text-decoration:none;font-weight:500;transition:all .15s;padding:6px 12px;border-radius:8px;display:flex;align-items:center;gap:6px;}
  .nav-link:hover{color:var(--text);background:var(--surface);}
  .nav-link.active{color:var(--text);background:var(--surface);}
  .nav-link-num{font-size:9px;font-weight:800;font-family:var(--mono);color:var(--muted2);}
  .nav-right{display:flex;align-items:center;gap:10px;}
  .pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);position:relative;flex-shrink:0;}
  .pulse-dot::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--green);animation:ping 1.8s ease-out infinite;opacity:.35;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:var(--font);font-weight:700;cursor:pointer;transition:all .18s;border:none;text-decoration:none;white-space:nowrap;}
  .btn-dark{background:var(--text);color:#fff;border-radius:10px;padding:8px 16px;font-size:12.5px;}
  .btn-dark:hover{background:#000;transform:translateY(-1px);}
  .btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border2);border-radius:10px;padding:7px 14px;font-size:12.5px;}
  .btn-outline:hover{background:var(--surface);border-color:var(--text);}

  /* ── LAYOUT ── */
  .shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}

  /* ── SIDEBAR ── */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .sb-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:10px 10px 6px;margin-top:8px;}
  .sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--muted);transition:all .12s;text-decoration:none;}
  .sb-item:hover{color:var(--text);background:var(--surface2);}
  .sb-item.active{color:var(--text);background:var(--card);border:1px solid var(--border);font-weight:600;}
  .sb-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;}
  .sb-badge{margin-left:auto;font-size:9px;font-weight:800;font-family:var(--mono);background:var(--text);color:#fff;border-radius:6px;padding:1px 6px;}
  .sb-sep{height:1px;background:var(--border);margin:8px 4px;}
  .sb-today{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:auto;}
  .sb-today-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
  .sb-today-num{font-size:26px;font-weight:900;letter-spacing:-1px;color:var(--text);line-height:1;}
  .sb-today-date{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;}

  /* ── MAIN ── */
  .main{background:var(--bg);overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:20px;}

  /* ── TOP BAR ── */
  .topbar{display:flex;flex-direction:column;gap:14px;}
  .topbar-left h1{font-size:22px;font-weight:900;letter-spacing:-.6px;color:var(--text);}
  .topbar-left p{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .topbar-stats{display:flex;gap:10px;}
  .ts-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;}
  .ts-num{font-size:18px;font-weight:900;letter-spacing:-.5px;line-height:1;margin-bottom:2px;}
  .ts-label{font-size:10px;color:var(--muted);font-weight:500;}

  /* ── GRID ── */
  .grid-main{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto;gap:16px;}

  /* ── CARD BASE ── */
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;isolation:isolate;}
  .card-header{padding:14px 18px;height:56px;box-sizing:border-box;border-bottom:1px solid #000;display:flex;align-items:center;justify-content:space-between;background:#1D1D1F;border-radius:0;}
  .card-title{font-size:17px;font-weight:800;letter-spacing:-.3px;color:#fff;}
  .card-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
  .card-action{font-size:11.5px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:color .15s;display:flex;align-items:center;gap:4px;}
  .card-action:hover{color:#fff;}

  /* ── PROSPECTS CARD ── */
  /* prospects-card removed */
  .prospect-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
  .prospect-item:last-child{border-bottom:none;}
  .prospect-item:hover{background:var(--surface);}
  .pi-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
  .pi-info{flex:1;min-width:0;}
  .pi-name{font-size:13.5px;font-weight:700;color:var(--text);}
  .pi-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pi-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .pi-score{font-size:15px;font-weight:900;font-family:var(--mono);line-height:1;}
  .pi-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;}
  .tag-hot{background:rgba(204,0,0,.1);color:var(--red);}
  .tag-warm{background:rgba(184,76,0,.1);color:var(--orange);}
  .tag-cold{background:rgba(174,174,178,.12);color:var(--muted);}

  /* ── MAP CARD ── */
  .map-card{grid-column:1/3;grid-row:3;}
  .map-box{height:300px;position:relative;overflow:hidden;border-bottom-left-radius:16px;border-bottom-right-radius:16px;}
  .leaflet-container{font-family:var(--font)!important;}
  .leaflet-tile-pane{filter:grayscale(100%) contrast(1.1);}
  .leaflet-popup-content-wrapper{border-radius:12px!important;border:1px solid var(--border)!important;box-shadow:0 10px 28px rgba(0,0,0,.12)!important;padding:0!important;overflow:hidden;}
  .leaflet-popup-content{margin:0!important;width:auto!important;}
  .leaflet-popup-tip-container{display:none!important;}
  .map-popup{padding:12px 14px;min-width:190px;font-family:var(--font);}
  .mp-name{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px;}
  .mp-meta{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .mp-row{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:2px;}
  .mp-foot{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border);margin-top:6px;}
  .map-overlay{position:absolute;top:12px;left:12px;display:flex;gap:8px;}
  .mo-chip{background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:9px;padding:5px 11px;font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;}
  .mo-num{font-size:16px;font-weight:900;font-family:var(--mono);line-height:1;color:var(--text);}
  .map-legend{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:9px;padding:8px 12px;display:flex;gap:10px;}
  .ml-item{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;}
  .ml-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);}

  /* ── CALENDAR CARD ── */
  .cal-card{grid-column:1/2;grid-row:1;}
  .cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;height:56px;box-sizing:border-box;border-bottom:1px solid #000;background:#1D1D1F;}
  .cal-month{font-size:17px;font-weight:800;letter-spacing:-.3px;color:#fff;}
  .cal-year{font-size:11px;color:rgba(255,255,255,.5);font-family:var(--mono);}
  .cal-nav{display:flex;gap:4px;}
  .cal-btn{width:24px;height:24px;border-radius:7px;border:1px solid rgba(255,255,255,.2);background:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);}
  .cal-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
  .cal-grid{padding:12px 18px 8px;}
  .cal-dn{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
  .cal-dn span{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);text-align:center;padding:3px 0;}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
  .cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11.5px;cursor:pointer;border-radius:7px;color:var(--text);transition:background .1s;position:relative;font-weight:400;}
  .cd:hover{background:var(--surface);}
  .cd.om{color:var(--muted2);}
  .cd.today{background:var(--text);color:#fff;font-weight:800;}
  .cd.evt::after{content:'';position:absolute;bottom:2px;width:3px;height:3px;background:var(--green);border-radius:50%;}
  .cd.today.evt::after{background:rgba(255,255,255,.6);}
  .cal-events{border-top:1px solid var(--border);}
  .cal-ev{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
  .cal-ev:hover{background:var(--surface);}
  .cal-ev:last-child{border-bottom:none;}
  .cal-ev-num{font-size:18px;font-weight:900;font-family:var(--mono);color:var(--text);width:22px;text-align:center;line-height:1;}
  .cal-ev-info{flex:1;}
  .cal-ev-title{font-size:11.5px;font-weight:600;color:var(--text);}
  .cal-ev-sub{font-size:10.5px;color:var(--muted);}
  .cal-ev-time{font-size:10px;color:var(--muted);font-family:var(--mono);}

  /* ── CRM CARD ── */
  .crm-card{grid-column:1/3;grid-row:2;}
  .crm-board{display:flex;overflow-x:auto;height:360px;gap:0;}
  .crm-board::-webkit-scrollbar{height:4px;}
  .crm-board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  .crm-col{display:flex;flex-direction:column;min-width:130px;flex:1;border-radius:10px;background:var(--surface2);overflow:hidden;margin:0 3px;}
  .crm-col:first-child{margin-left:0;}
  .crm-col:last-child{margin-right:0;}
  .crm-col-top{height:3px;flex-shrink:0;}
  .crm-col-head{padding:8px 10px 6px;flex-shrink:0;}
  .crm-col-head-top{display:flex;align-items:center;gap:5px;margin-bottom:1px;}
  .crm-col-bar{width:22px;height:3px;border-radius:2px;flex-shrink:0;}
  .crm-col-name{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text);white-space:nowrap;}
  .crm-col-count{margin-left:auto;font-size:9px;font-weight:800;font-family:var(--mono);color:var(--muted2);background:var(--card);border-radius:4px;padding:1px 5px;}
  .crm-col-amount{font-size:10px;font-weight:600;color:var(--muted);font-family:var(--mono);}
  .crm-col-body{flex:1;overflow-y:auto;padding:5px 6px;display:flex;flex-direction:column;gap:5px;}
  .crm-col-body::-webkit-scrollbar{width:2px;}
  .crm-col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .crm-kcard{background:var(--card);border-radius:8px;padding:8px 9px;border:1.5px solid var(--border);transition:all .12s;overflow:hidden;}
  .crm-kcard:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);border-color:var(--border2);}
  .ck-bar{height:3px;border-radius:6px 6px 0 0;margin:-8px -9px 6px;flex-shrink:0;}
  .ck-name{font-size:10.5px;font-weight:700;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ck-co{font-size:9.5px;color:var(--muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ck-foot{display:flex;align-items:center;justify-content:space-between;}
  .ck-val{font-size:10px;font-weight:800;font-family:var(--mono);color:var(--text);}
  .ck-days{font-size:9px;font-weight:600;color:var(--muted2);background:var(--surface);border-radius:4px;padding:1px 5px;}

  /* ── MAIL CARD ── */
  .mail-card{grid-column:2/3;grid-row:1;}
  .mail-inner{display:grid;grid-template-columns:1fr;min-height:260px;}
  .mail-col{border-right:1px solid var(--border);}
  .mail-col:last-child{border-right:none;}
  .mail-col-head{padding:11px 16px;height:56px;box-sizing:border-box;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .mail-col-title{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);}
  .mail-unread-badge{font-size:9px;font-weight:800;font-family:var(--mono);background:var(--text);color:#fff;border-radius:6px;padding:1px 6px;}
  .mail-thread{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
  .mail-thread:hover{background:var(--surface);}
  .mail-thread.unread .mt-from{font-weight:700;}
  .mt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1px;}
  .mt-from{font-size:13px;color:var(--text);font-weight:600;}
  .mt-time{font-size:10px;color:var(--muted2);font-family:var(--mono);}
  .mt-subject{font-size:12px;color:var(--text);margin-bottom:2px;font-weight:500;}
  .mt-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .unread-dot{display:inline-block;width:5px;height:5px;background:var(--blue);border-radius:50%;margin-right:5px;vertical-align:middle;flex-shrink:0;}

  /* Compose */
  .compose{padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
  .cf{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);padding-bottom:7px;}
  .cl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);width:36px;flex-shrink:0;}
  .ci{border:none;background:none;font-family:var(--font);font-size:12px;color:var(--text);outline:none;flex:1;}
  .cb{border:none;background:none;font-family:var(--font);font-size:12px;color:var(--text);outline:none;width:100%;resize:none;height:90px;line-height:1.7;margin-top:4px;}
  .compose-footer{display:flex;gap:8px;justify-content:flex-end;padding-top:4px;}
  .btn-send{background:var(--text);color:#fff;border:none;padding:7px 16px;font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;border-radius:9px;display:flex;align-items:center;gap:6px;}
  .btn-draft{background:none;color:var(--muted);border:1.5px solid var(--border);padding:7px 12px;font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;border-radius:9px;}
  .btn-draft:hover{border-color:var(--border2);color:var(--text);}

  /* ── TODAY ── */
  .today-action{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
  .today-action:last-child{border-bottom:none;}
  .today-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}
  .today-name{font-size:13px;font-weight:700;color:var(--text);}
  .today-meta{font-size:11px;color:var(--muted2);margin-top:2px;}

  /* ── BADGES ── */
  .statut-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:9.5px;font-weight:700;}
  .src-dot{width:5px;height:5px;border-radius:50%;}

  /* ══════════════════════════════════════════
     RESPONSIVE — Mobile First Breakpoints
     xs  < 480px   (iPhone SE, small phones)
     sm  480–767px (iPhone Pro Max, large phones)
     md  768–1023px (iPad portrait, small tablets)
     lg  1024–1279px (iPad landscape, small laptops)
     xl  1280–1535px (laptops)
     2xl 1536px+   (desktops, large monitors)
  ══════════════════════════════════════════ */

  /* ── HAMBURGER BUTTON (mobile only) ── */
  .hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;
    width:36px;height:36px;background:var(--card);border:1px solid var(--border);
    border-radius:10px;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.1);}
  .hamburger span{display:block;width:16px;height:2px;background:var(--text);border-radius:2px;
    transition:all .2s;}
  .hamburger span+span{margin-top:3px;}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;backdrop-filter:blur(2px);}
  .sidebar-overlay.open{display:block;}

  /* ════════════════════════════════
     XS — iPhone SE / small phones (< 480px)
  ════════════════════════════════ */
  @media (max-width: 479px) {
    .hamburger{display:flex;}
    .shell{grid-template-columns:1fr;}
    .sidebar{position:fixed;left:-240px;top:0;bottom:0;z-index:160;width:220px;transition:left .25s ease;}
    .sidebar.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.2);}
    .main{padding:56px 12px 24px;gap:12px;}

    /* Topbar: titre + KPI scroll */
    .topbar{gap:8px;}
    .topbar > div:first-child h1{font-size:17px;}
    .topbar > div:last-child{
      display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
      padding-bottom:4px;scrollbar-width:none;
    }
    .topbar > div:last-child::-webkit-scrollbar{display:none;}
    /* Groupes KPI: réduire taille */
    .topbar > div:last-child > div{flex-shrink:0;}
    .topbar > div:last-child .card-title{font-size:13px!important;}

    /* Today: 1 colonne, sections empilées */
    .today-grid{grid-template-columns:1fr!important;}
    .today-col-border{border-right:none!important;border-bottom:1px solid var(--border)!important;}
    .today-grid > div:last-child{border-bottom:none!important;}

    /* Hiérarchie Today: noms plus lisibles */
    .today-name{font-size:14px!important;}
    .today-meta{font-size:12px!important;}

    /* Grid: 1 colonne, ordre logique */
    .grid-main{grid-template-columns:1fr!important;gap:12px!important;}
    .cal-card  {grid-column:1!important;grid-row:1!important;}
    .mail-card {grid-column:1!important;grid-row:2!important;}
    .crm-card  {grid-column:1!important;grid-row:3!important;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── MAP — pipeline addresses from localStorage ──
var map = L.map('dashboard-map', {
  center: [46.5, 2.5],
  zoom: 5,
  zoomControl: true,
  attributionControl: false
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18, opacity: 0.85
}).addTo(map);
L.control.attribution({ prefix: '© OpenStreetMap' }).addTo(map);
setTimeout(function(){ map.invalidateSize(); }, 100);

(function(){
  var STAGES=[
    {id:'prospects',color:'#CC0000'},{id:'linkedin',color:'#0A66C2'},
    {id:'mailing',color:'#B84C00'},{id:'phoning',color:'#4338CA'},
    {id:'visio',color:'#7C3AED'},{id:'rdv',color:'#0BBCD4'},
    {id:'devis',color:'#F59E0B'},{id:'nego',color:'#EA580C'},
    {id:'won',color:'#1D8348'}
  ];
  function stageIdx(col){ for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===col)return i;} return -1; }
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function progressHtml(col){
    var cur=stageIdx(col);
    if(cur<0) return '';
    var h='<div style="display:flex;align-items:center;gap:2px;margin-top:8px">';
    for(var i=0;i<STAGES.length;i++){
      var done=i<cur,isCur=i===cur;
      var op=done||isCur?'1':'.2';
      var bg=done||isCur?STAGES[i].color:'#C7C7CC';
      var shadow=isCur?';box-shadow:0 0 0 2px #fff,0 0 0 3px '+STAGES[i].color:'';
      h+='<div style="width:7px;height:7px;border-radius:50%;background:'+bg+';opacity:'+op+shadow+'" title="'+STAGES[i].id+'"></div>';
      if(i<STAGES.length-1) h+='<div style="flex:1;height:1px;background:'+(done?'#C7C7CC':'#E8E8ED')+'"></div>';
    }
    h+='</div>';
    return h;
  }

  function migrateCard(c){
    if(c.co&&!c.company)c.company=c.co;if(c.name&&!c.contact)c.contact=c.name;
    if(!c.company&&c.contact)c.company=c.contact;if(c.tel&&!c.phone)c.phone=c.tel;
    if(c.location&&!c.address)c.address=c.location;if(c.director&&!c.contact)c.contact=c.director;
    c.co=c.company||'';c.name=c.contact||'';c.tel=c.phone||'';return c;
  }
  var cards=[];
  try{var r=localStorage.getItem('mup_pipeline');if(r)cards=JSON.parse(r).map(migrateCard);}catch(e){}
  var withAddr=cards.filter(function(c){return c.address;});
  if(!withAddr.length) return;

  // Group by address for geocoding, but keep individual cards
  var addrMap={};
  withAddr.forEach(function(c){
    if(!addrMap[c.address]) addrMap[c.address]={cards:[]};
    addrMap[c.address].cards.push(c);
  });

  var bounds=[];
  var pending=Object.keys(addrMap).length;
  Object.keys(addrMap).forEach(function(addr){
    var group=addrMap[addr];
    fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(addr)+'&limit=1')
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.length){
          var lat=parseFloat(data[0].lat),lng=parseFloat(data[0].lon);
          bounds.push([lat,lng]);
          // One marker per card, slightly offset if multiple at same address
          group.cards.forEach(function(c,idx){
            var jitter=group.cards.length>1?(idx-group.cards.length/2)*0.0003:0;
            var col=STAGES.find(function(s){return s.id===c.col;});
            var dotColor=col?col.color:'#0BBCD4';
            var icon=L.divIcon({
              className:'',
              html:'<div style="width:20px;height:20px;border-radius:50%;background:'+dotColor+';border:3px solid rgba(255,255,255,.9);box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
              iconSize:[20,20],iconAnchor:[10,10]
            });
            var val=c.val>=1000?Math.round(c.val/1000)+'k\u20AC':(c.val?c.val+'\u20AC':'\u2014');
            var popup='<div style="font-family:var(--font);width:200px;padding:10px 12px">'
              +'<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px">'+esc(c.co||c.name)+'</div>'
              +'<div style="font-size:11.5px;color:var(--muted);margin-bottom:6px">'+esc(c.co&&c.name?c.name:'')+'</div>'
              +'<div style="display:flex;justify-content:space-between;align-items:center">'
              +'<span style="font-size:12px;font-weight:800;font-family:var(--mono);color:var(--text)">'+val+'</span>'
              +'<span style="font-size:10px;font-weight:600;color:var(--muted2);background:var(--surface);border-radius:4px;padding:2px 6px">J+'+(c.days||0)+'</span>'
              +'</div>'
              +progressHtml(c.col)
              +'</div>';
            L.marker([lat+jitter,lng+jitter],{icon:icon}).addTo(map)
              .bindPopup(popup,{maxWidth:220,closeButton:false,offset:[0,-6]})
              .on('mouseover',function(){this.openPopup();})
              .on('click',function(){window.location.href='/carte';});
          });
        }
        pending--;
        if(pending<=0&&bounds.length){
          map.fitBounds(bounds,{padding:[30,30],maxZoom:12});
        }
      })
      .catch(function(){pending--;});
  });
})();
</script>

<script>
(async () => {
  try {
    const rss_url = encodeURIComponent('https://www.lemonde.fr/rss/une.xml');
    const res = await fetch(`https://api.allorigins.win/get?url=${rss_url}`);
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, 'text/xml');
    const items = Array.from(xml.querySelectorAll('item')).slice(0, 12);
    const headlines = items.map(i => i.querySelector('title')?.textContent || '').filter(Boolean);
    const track = document.getElementById('news-track');
    if (headlines.length && track) {
      // Build single set, duplicate for seamless loop
      const makeSpans = (arr) => arr.map(h =>
        `<span style="display:inline-block;font-size:11px;color:var(--text);font-weight:500;padding-right:48px;">
          <span style="color:var(--muted2);margin-right:8px;">◆</span>${h}
        </span>`
      ).join('');
      track.style.animation = 'none';
      track.style.whiteSpace = 'nowrap';
      track.style.display = 'inline-block';
      track.innerHTML = makeSpans(headlines) + makeSpans(headlines);

      // JS scroll: seamless by resetting when half is scrolled
      let x = 0;
      const speed = 0.5; // px per frame (~7s)
      function scroll() {
        x += speed;
        const half = track.scrollWidth / 2;
        if (x >= half) x = 0;
        track.style.transform = `translateX(${-x}px)`;
        requestAnimationFrame(scroll);
      }
      // Pause on hover
      track.parentElement.addEventListener('mouseenter', () => speed_paused = true);
      track.parentElement.addEventListener('mouseleave', () => speed_paused = false);
      let speed_paused = false;
      function scrollLoop() {
        if (!speed_paused) {
          x += speed;
          const half = track.scrollWidth / 2;
          if (x >= half) x = 0;
          track.style.transform = `translateX(${-x}px)`;
        }
        requestAnimationFrame(scrollLoop);
      }
      requestAnimationFrame(scrollLoop);
    }
  } catch(e) { console.log('news error', e); }
})();
</script>

<script>
function isUpcoming(dateStr){if(!dateStr)return false;var today=new Date();today.setHours(0,0,0,0);return new Date(dateStr+'T00:00:00')>=today;}
// ── TODAY ──
(function(){
  const now = new Date();
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  const el = document.getElementById('today-date');
  // date handled by clock

  // Progress bar: % of workday elapsed (9h-19h)
  const startH = 9, endH = 19;
  const h = now.getHours() + now.getMinutes()/60;
  const pct = Math.min(100, Math.max(0, Math.round((h - startH) / (endH - startH) * 100)));
  const bar = document.getElementById('today-progress');
  const lbl = document.getElementById('today-progress-label');
  setTimeout(() => { if(bar) bar.style.width = pct + '%'; if(lbl) lbl.textContent = pct + '%'; }, 300);
})();

// ── CALENDAR ──
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const TODAY = new Date();

// Events data keyed by YYYY-MM-DD — loaded from agenda localStorage
const CAL_EVENTS = {};
(function(){
  try {
    var raw = localStorage.getItem('mup_agenda');
    if(!raw) return;
    var events = JSON.parse(raw);
    // Deduplicate by id — keep last
    var deduped = {};
    events.forEach(function(e){ if(e.id) deduped[e.id]=e; else deduped['_'+Math.random()]=e; });
    Object.keys(deduped).forEach(function(k){
      var e=deduped[k];
      if(!e.date) return;
      if(!CAL_EVENTS[e.date]) CAL_EVENTS[e.date] = [];
      CAL_EVENTS[e.date].push({ id: e.id||'', title: e.title || '', sub: e.contact || '', time: e.start || '' });
    });
  } catch(e){}
})();
(function(){
  try {
    var raw = localStorage.getItem('mup_pipeline');
    if(!raw) return;
    var cards = JSON.parse(raw).map(function(c){if(c.co&&!c.company)c.company=c.co;if(c.name&&!c.contact)c.contact=c.name;c.co=c.company||'';c.name=c.contact||'';return c;});
    cards.forEach(function(c){
      if(!c.rdvDate||!isUpcoming(c.rdvDate)) return;
      if(!CAL_EVENTS[c.rdvDate]) CAL_EVENTS[c.rdvDate] = [];
      var exists = CAL_EVENTS[c.rdvDate].find(function(ev){ return String(ev.id) === String(c.id); });
      if(!exists) {
        CAL_EVENTS[c.rdvDate].push({ id: String(c.id), title: (c.co||c.name||'RDV'), sub: c.name||'', time: c.rdvTime||'' });
      }
    });
  } catch(e){}
})();

let calYear = TODAY.getFullYear();
let calMonth = TODAY.getMonth();
let selectedDay = null;

function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  const daysEl = document.getElementById('cal-days');
  const eventsEl = document.getElementById('cal-events-list');

  label.textContent = MONTHS_FR[calMonth] + ' ' + calYear;

  // First day of month (0=Sun…6=Sat → convert to Mon-based)
  const first = new Date(calYear, calMonth, 1).getDay();
  const startOffset = (first === 0) ? 6 : first - 1;
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  let html = '';
  // Prev month padding
  for(let i = startOffset - 1; i >= 0; i--) {
    html += `<div class="cd om">${daysInPrev - i}</div>`;
  }
  // Current month days
  for(let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(calYear, calMonth, d);
    const isToday = (calYear === TODAY.getFullYear() && calMonth === TODAY.getMonth() && d === TODAY.getDate());
    const hasEvt = !!CAL_EVENTS[key];
    const isSelected = selectedDay === key;
    let cls = 'cd';
    if(isToday) cls += ' today';
    if(hasEvt) cls += ' evt';
    if(isSelected && !isToday) cls += ' selected';
    html += `<div class="${cls}" onclick="selectDay('${key}')">${d}</div>`;
  }
  // Next month padding
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
  const nextDays = totalCells - startOffset - daysInMonth;
  for(let d = 1; d <= nextDays; d++) {
    html += `<div class="cd om">${d}</div>`;
  }
  daysEl.innerHTML = html;

  // Render events for selected day or show upcoming
  renderEvents(eventsEl);
}

function renderEvents(el) {
  // Collect upcoming events
  const upcoming = [];
  Object.entries(CAL_EVENTS).forEach(([key, evts]) => {
    const [y,m,d] = key.split('-').map(Number);
    const date = new Date(y, m-1, d);
    if(date >= new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate())) {
      evts.forEach(ev => upcoming.push({key, date, ...ev}));
    }
  });
  upcoming.sort((a,b) => a.date - b.date);

  const toShow = selectedDay && CAL_EVENTS[selectedDay]
    ? CAL_EVENTS[selectedDay].map(ev => ({key: selectedDay, ...ev}))
    : upcoming.slice(0, 3);

  if(!toShow.length) {
    el.innerHTML = '<div style="padding:16px 18px;font-size:12px;color:var(--muted)">Aucun événement</div>';
    return;
  }

  el.innerHTML = toShow.map(ev => {
    const [y,m,d] = ev.key.split('-').map(Number);
    const isToday = ev.key === dateKey(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
    const dateLabel = `${pad(d)}/${pad(m)}`;
    const dayLabel = isToday ? 'Auj.' : ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][new Date(y,m-1,d).getDay()];
    return `<div class="cal-ev" style="cursor:pointer" onclick="window.location.href='/agenda'">
      <div style="flex-shrink:0;text-align:center;min-width:38px;">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:${isToday ? 'var(--green)' : 'var(--muted2)'};">${dayLabel}</div>
        <div style="font-size:13px;font-weight:900;font-family:var(--font);color:var(--text);line-height:1.2;">${pad(d)}/${pad(m)}</div>
      </div>
      <div class="cal-ev-info">
        <div class="cal-ev-title">${ev.title}</div>
        <div class="cal-ev-sub">${ev.sub}</div>
      </div>
      <div class="cal-ev-time">${ev.time}</div>
    </div>`;
  }).join('');
}

function selectDay(key) {
  selectedDay = (selectedDay === key) ? null : key;
  renderCalendar();
}

function calNav(dir) {
  calMonth += dir;
  if(calMonth > 11){ calMonth = 0; calYear++; }
  if(calMonth < 0){ calMonth = 11; calYear--; }
  selectedDay = null;
  renderCalendar();
}

// Add .selected style
const style = document.createElement('style');
style.textContent = '.cd.selected{background:var(--surface2);font-weight:700;}';
document.head.appendChild(style);

renderCalendar();
</script>

<script>
// ── DASHBOARD DATA FROM LOCALSTORAGE ──
(function(){
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // Load pipeline
  function migrateCard(c){
    if(c.co&&!c.company)c.company=c.co;if(c.name&&!c.contact)c.contact=c.name;
    if(!c.company&&c.contact)c.company=c.contact;if(c.tel&&!c.phone)c.phone=c.tel;
    if(c.location&&!c.address)c.address=c.location;if(c.director&&!c.contact)c.contact=c.director;
    c.co=c.company||'';c.name=c.contact||'';c.tel=c.phone||'';return c;
  }
  var cards=[];
  try{var r=localStorage.getItem('mup_pipeline');if(r)cards=JSON.parse(r).map(migrateCard);}catch(e){}

  var COLS=[
    {id:'prospects',name:'Prospects',color:'#CC0000'},
    {id:'linkedin',name:'LinkedIn',color:'#0A66C2'},
    {id:'mailing',name:'Mailing',color:'#B84C00'},
    {id:'phoning',name:'Phoning',color:'#4338CA'},
    {id:'visio',name:'Visio',color:'#7C3AED'},
    {id:'rdv',name:'RDV',color:'#0BBCD4'},
    {id:'devis',name:'Devis',color:'#F59E0B'},
    {id:'nego',name:'Négociation',color:'#EA580C'},
    {id:'won',name:'Gagné',color:'#1D8348'},
    {id:'lost',name:'Disqualifié',color:'#AEAEB2'},
  ];

  // KPIs
  var kpiMap={mailing:'kpi-mailing',phoning:'kpi-phoning',visio:'kpi-visio',devis:'kpi-devis',rdv:'kpi-rdv'};
  Object.keys(kpiMap).forEach(function(col){
    var el=document.getElementById(kpiMap[col]);
    if(el) el.textContent=cards.filter(function(c){return c.col===col;}).length;
  });

  // Pipeline total
  var activeStages=['prospects','linkedin','mailing','phoning','visio','rdv','devis','nego'];
  var pipeTotal=cards.filter(function(c){return activeStages.indexOf(c.col)!==-1;}).reduce(function(s,c){return s+(c.val||0);},0);
  var pipeFmt=pipeTotal>=1000?Math.round(pipeTotal/1000)+'k€':pipeTotal+'€';
  var kpPipe=document.getElementById('kpi-pipeline');if(kpPipe)kpPipe.textContent=pipeFmt;
  var pipeSub=document.getElementById('dash-pipeline-sub');if(pipeSub)pipeSub.textContent=pipeFmt+' en cours';

  // Today section
  var todayCols=[
    {id:'mailing',label:'Mailing',color:'#B84C00'},
    {id:'phoning',label:'Phoning',color:'#CC0000'},
    {id:'visio',label:'Visio',color:'#0A66C2'},
    {id:'devis',label:'Devis',color:'#0BBCD4'},
    {id:'rdv',label:'RDV',color:'#4338CA'},
  ];

  // Load today's RDV from agenda
  var todayAgenda = [];
  try {
    var agRaw = localStorage.getItem('mup_agenda');
    if(agRaw) {
      var agAll = JSON.parse(agRaw);
      var todayStr = new Date().toISOString().slice(0,10);
      var filtered = agAll.filter(function(ev) { return ev.date === todayStr; });
      // Deduplicate by id — keep last occurrence (most recent)
      var seen = {};
      for(var i=filtered.length-1;i>=0;i--){
        var key=filtered[i].id||('no-id-'+i);
        if(seen[key]){filtered.splice(i,1);}
        else{seen[key]=true;}
      }
      todayAgenda = filtered;
    }
  } catch(e) {}

  var todayGrid=document.getElementById('today-grid');
  if(todayGrid){
    todayGrid.innerHTML=todayCols.map(function(tc,i){
      var border=i<todayCols.length-1?'border-right:1px solid var(--border);':'';
      var items='';
      var count=0;
      if(tc.id==='rdv'){
        count=todayAgenda.length;
        items=todayAgenda.length?todayAgenda.slice(0,3).map(function(ev){
          return '<div class="today-action"><div class="today-dot" style="background:'+tc.color+'"></div><div><div class="today-name">'+esc(ev.title||'RDV')+'</div><div class="today-meta">'+esc(ev.contact||'')+(ev.start?' · '+ev.start:'')+'</div></div></div>';
        }).join(''):'<div style="font-size:11px;color:var(--muted2);padding:4px 0;">Aucun</div>';
      } else {
        var colCards=cards.filter(function(c){return c.col===tc.id;}).slice(0,3);
        count=cards.filter(function(c){return c.col===tc.id;}).length;
        items=colCards.length?colCards.map(function(c){return '<div class="today-action"><div class="today-dot" style="background:'+tc.color+'"></div><div><div class="today-name">'+esc(c.co||c.name)+'</div><div class="today-meta">'+esc(c.name||'')+'</div></div></div>';}).join(''):'<div style="font-size:11px;color:var(--muted2);padding:4px 0;">Aucun</div>';
      }
      return '<div style="padding:14px 18px;'+border+'"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><div style="font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted2);">'+tc.label+'</div><span style="font-size:16px;font-weight:900;color:'+tc.color+';">'+count+'</span></div>'+items+'</div>';
    }).join('');
  }

  // (prospects list removed)

  // CRM board — matches pipeline.html design
  var board=document.getElementById('dash-crm-board');
  if(board){
    board.innerHTML=COLS.map(function(col){
      var colCards=cards.filter(function(c){return c.col===col.id;});
      var total=colCards.reduce(function(s,c){return s+(c.val||0);},0);
      var totalStr=total>=1000?Math.round(total/1000)+'k\u20AC':(total?total+'\u20AC':'\u2014');
      var cardsHtml=colCards.map(function(c){
        var val=c.val>=1000?Math.round(c.val/1000)+'k\u20AC':(c.val?c.val+'\u20AC':'\u2014');
        return '<div class="crm-kcard" style="cursor:pointer" onclick="window.location.href=\'/pipeline\'">'
          +'<div class="ck-bar" style="background:'+col.color+'"></div>'
          +'<div class="ck-name">'+esc(c.co||c.name)+'</div>'
          +'<div class="ck-co">'+esc(c.co&&c.name?c.name:'')+'</div>'
          +'<div class="ck-foot"><span class="ck-val">'+val+'</span><span class="ck-days">J+'+(c.days||0)+'</span></div>'
          +'</div>';
      }).join('');
      return '<div class="crm-col">'
        +'<div class="crm-col-head">'
        +'<div class="crm-col-head-top"><div class="crm-col-bar" style="background:'+col.color+'"></div><span class="crm-col-name">'+col.name+'</span><span class="crm-col-count">'+colCards.length+'</span></div>'
        +'<div class="crm-col-amount">'+totalStr+'</div>'
        +'</div>'
        +'<div class="crm-col-body">'+(cardsHtml||'')+'</div>'
        +'</div>';
    }).join('');
  }
})();
</script>
