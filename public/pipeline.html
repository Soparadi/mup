<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUP — Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F7;--surface:#F5F5F7;--surface2:#EBEBF0;
  --card:#FFFFFF;--border:#E8E8ED;--border2:#C7C7CC;
  --text:#1D1D1F;--muted:#6E6E73;--muted2:#AEAEB2;
  --green:#1D8348;--orange:#B84C00;--red:#CC0000;--blue:#0A66C2;
  --font:'Geist',-apple-system,'Helvetica Neue',sans-serif;
  --mono:'Geist Mono','SF Mono','Menlo',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);font-size:14px;color:var(--text);-webkit-font-smoothing:antialiased;display:flex}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0;height:100vh;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:12px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sb-logo-icon{width:28px;height:28px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;letter-spacing:-.3px}
.sb-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:10px 8px 5px;margin-top:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:12.5px;font-weight:500;color:var(--muted);transition:all .12s;text-decoration:none}
.sb-item:hover{color:var(--text);background:var(--surface2)}
.sb-item.active{color:var(--text);background:var(--surface);font-weight:600;border:1px solid var(--border)}
.sb-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── SHELL ── */
.shell{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0;display:flex;align-items:center;gap:16px}
.topbar-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.pipeline-total{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--green);background:rgba(29,131,72,.1);border-radius:6px;padding:3px 10px}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.btn-add-card{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:9px;border:none;background:var(--text);color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-add-card:hover{background:#000}

/* ── KANBAN ── */
.kanban-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 20px 20px;display:flex;gap:12px;align-items:flex-start}
.kanban-wrap::-webkit-scrollbar{height:6px}
.kanban-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── COLONNE ── */
.col{display:flex;flex-direction:column;width:220px;flex-shrink:0;height:calc(100vh - 120px);border-radius:12px;background:var(--surface2);overflow:hidden}
.col-hdr{padding:10px 12px 8px;flex-shrink:0}
.col-top{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.col-bar{width:28px;height:3px;border-radius:2px;flex-shrink:0}
.col-name{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text)}
.col-count{margin-left:auto;font-size:10px;font-weight:800;font-family:var(--mono);color:var(--muted2);background:var(--card);border-radius:5px;padding:1px 6px}
.col-amount{font-size:11px;font-weight:600;color:var(--muted);font-family:var(--mono)}
.col-body{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.col-body.drag-over{background:rgba(37,99,235,.05);border-radius:8px}

/* ── CARD ── */
.kcard{background:var(--card);border-radius:10px;padding:10px 12px;cursor:grab;transition:all .15s;border:1.5px solid var(--border);position:relative;user-select:none}
.kcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.kcard.dragging{opacity:.4;transform:rotate(2deg);cursor:grabbing}
.kcard-bar{height:3px;border-radius:2px;margin-bottom:8px;margin-left:-12px;margin-right:-12px;margin-top:-10px;border-radius:8px 8px 0 0}
.kcard-name{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3}
.kcard-co{font-size:11px;color:var(--muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kcard-foot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.kcard-val{font-size:11.5px;font-weight:800;font-family:var(--mono);color:var(--text)}
.kcard-days{font-size:10px;font-weight:600;color:var(--muted2);background:var(--surface);border-radius:5px;padding:2px 6px}
.kcard-src{font-size:9.5px;color:var(--muted2);margin-top:4px}
.kcard-actions{position:absolute;top:8px;right:8px;display:none;gap:3px}
.kcard:hover .kcard-actions{display:flex}
.kcard-btn{width:20px;height:20px;border-radius:5px;border:none;background:var(--surface2);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .12s}
.kcard-btn:hover{background:var(--border2);color:var(--text)}

/* ── COLONNES SPÉCIALES ── */
.col.won .col-body{background:rgba(29,131,72,.04)}
.col.lost .col-body{background:rgba(204,0,0,.03)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:460px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-bar{height:4px}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-x{width:26px;height:26px;border-radius:7px;border:none;background:var(--surface2);cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.frow{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)}
.finput{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);width:100%;outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--text);background:var(--card)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-save{background:var(--text);color:#fff;border:none;border-radius:9px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-save:hover{background:#000}
.btn-can{background:var(--surface);color:var(--muted);border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}

/* ── FICHE DÉTAIL ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:400;display:none}
.detail-overlay.open{display:block}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:420px;background:var(--card);border-left:1px solid var(--border);z-index:401;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.detail-panel.open{transform:none}
.detail-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-name{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px}
.detail-co{font-size:13px;color:var(--muted);margin-bottom:10px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap}
.detail-badge{padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:700}
.detail-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.detail-section{display:flex;flex-direction:column;gap:6px}
.detail-section-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted2)}
.detail-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text)}
.detail-row a{color:var(--blue);text-decoration:none}
.detail-row a:hover{text-decoration:underline}
.detail-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.d-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;color:var(--text);transition:all .15s;text-decoration:none}
.d-btn:hover{border-color:var(--text)}
.d-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.d-btn.primary:hover{background:#000}
.col-select{border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);width:100%;outline:none;cursor:pointer}
.activity-item{display:flex;gap:8px;font-size:12px}
.activity-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;margin-top:4px}
.activity-txt{color:var(--muted);line-height:1.5}
.activity-date{color:var(--muted2);font-size:10.5px;margin-left:auto;flex-shrink:0}
.detail-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:8px;border:none;background:var(--surface2);cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:var(--border2);color:var(--text)}


/* ── PROGRESSION ÉTAPES ── */
.kcard-progress{display:flex;align-items:center;gap:3px;margin-top:6px;margin-bottom:2px}
.prog-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative;cursor:help;transition:transform .15s}
.prog-dot:hover{transform:scale(1.3)}
.prog-dot.done{opacity:1}
.prog-dot.todo{opacity:.2;background:var(--border2)!important}
.prog-dot.current{opacity:1;box-shadow:0 0 0 2px #fff, 0 0 0 3px currentColor;animation:prog-pulse 2s ease-in-out infinite}
@keyframes prog-pulse{0%,100%{box-shadow:0 0 0 2px #fff,0 0 0 3px var(--c,#000)}50%{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--c,#000)}}
.prog-line{flex:1;height:1.5px;background:var(--border);min-width:4px}
.prog-line.done{background:var(--border2)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<!-- SHELL -->
<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">Pipeline</div>
    <div class="pipeline-total" id="pipeline-total">127k€ en cours</div>
    <div style="display:flex;gap:6px;align-items:center;margin-left:8px">
      <span style="font-size:11px;color:var(--muted)">Trier par</span>
      <select style="border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:11.5px;font-family:var(--font);color:var(--text);background:var(--card);cursor:pointer;outline:none" onchange="sortCards(this.value)">
        <option value="recent">Plus récent</option>
        <option value="value">Valeur ↓</option>
        <option value="name">Nom A→Z</option>
      </select>
    </div>
    <div class="topbar-actions">
      <button class="btn-add-card" onclick="openModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Nouvelle fiche
      </button>
    </div>
  </div>

  <!-- KANBAN -->
  <div class="kanban-wrap" id="kanban"></div>

</div>

<!-- MODAL AJOUT -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-bar" id="modal-bar" style="background:var(--text)"></div>
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title">Nouvelle fiche</div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="f2">
        <div class="frow">
          <div class="flabel">Prénom Nom</div>
          <input class="finput" id="m-name" placeholder="Laurent Morin">
        </div>
        <div class="frow">
          <div class="flabel">Société</div>
          <input class="finput" id="m-co" placeholder="Hôtel Le Grand">
        </div>
      </div>
      <div class="f2">
        <div class="frow">
          <div class="flabel">Valeur estimée</div>
          <input class="finput" id="m-val" placeholder="15000" type="number">
        </div>
        <div class="frow">
          <div class="flabel">Étape</div>
          <select class="finput" id="m-col">
            <option value="leads">Leads</option>
            <option value="prospects">Prospects</option>
            <option value="linkedin">LinkedIn</option>
            <option value="mailing">Mailing</option>
            <option value="phoning">Phoning</option>
            <option value="visio">Visio</option>
            <option value="rdv">RDV</option>
            <option value="devis">Devis</option>
            <option value="nego">Négociation</option>
            <option value="won">Gagné ✓</option>
            <option value="lost">Disqualifié</option>
          </select>
        </div>
      </div>
      <div class="f2">
        <div class="frow">
          <div class="flabel">Email</div>
          <input class="finput" id="m-email" placeholder="contact@example.com" type="email">
        </div>
        <div class="frow">
          <div class="flabel">Téléphone</div>
          <input class="finput" id="m-tel" placeholder="06 00 00 00 00">
        </div>
      </div>
      <div class="frow">
        <div class="flabel">Adresse</div>
        <input class="finput" id="m-addr" placeholder="33460 Margaux">
      </div>
      <div class="frow">
        <div class="flabel">Notes</div>
        <textarea class="finput" id="m-notes" rows="2" style="resize:none" placeholder="Contexte, besoins, prochaine action…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-can" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveCard()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- FICHE DÉTAIL -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">×</button>
  <div class="detail-hdr">
    <div class="detail-name" id="d-name"></div>
    <div class="detail-co" id="d-co"></div>
    <div class="detail-badges" id="d-badges"></div>
  </div>
  <div class="detail-body">
    <div class="detail-actions">
      <a class="d-btn" id="d-tel-btn" href=""><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.22 2 2 0 012.12 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6z"/></svg> Appeler</a>
      <a class="d-btn" id="d-mail-btn" href=""><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Email</a>
      <button class="d-btn" onclick="editCurrentCard()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Modifier</button>
      <button class="d-btn" style="color:var(--red);border-color:rgba(204,0,0,.2)" onclick="deleteCurrentCard()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg> Supprimer</button>
      <button class="d-btn" id="d-devis-btn" style="display:none;color:var(--green);border-color:rgba(29,131,72,.2);font-weight:700" onclick="createDevis()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Créer un devis</button>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Déplacer vers</div>
      <select class="col-select" id="d-move" onchange="moveCard(this.value)">
        <option value="leads">Leads</option>
        <option value="prospects">Prospects</option>
        <option value="linkedin">LinkedIn</option>
        <option value="mailing">Mailing</option>
        <option value="phoning">Phoning</option>
        <option value="visio">Visio</option>
        <option value="rdv">RDV</option>
        <option value="devis">Devis</option>
        <option value="nego">Négociation</option>
        <option value="won">Gagné ✓</option>
        <option value="lost">Disqualifié</option>
      </select>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Informations</div>
      <div class="detail-row" id="d-addr-row"></div>
      <div class="detail-row" id="d-val-row"></div>
      <div class="detail-row" id="d-email-row"></div>
      <div class="detail-row" id="d-tel-row"></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Notes</div>
      <div style="font-size:12.5px;color:var(--muted);line-height:1.6" id="d-notes"></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Activité</div>
      <div id="d-activity" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </div>
</div>

<script>

const STAGES = [
  { id:'leads',     label:'L',  color:'#6E6E73', name:'Leads' },
  { id:'prospects', label:'P',  color:'#CC0000', name:'Prospects' },
  { id:'linkedin',  label:'Li', color:'#0A66C2', name:'LinkedIn' },
  { id:'mailing',   label:'M',  color:'#B84C00', name:'Mailing' },
  { id:'phoning',   label:'Ph', color:'#4338CA', name:'Phoning' },
  { id:'visio',     label:'V',  color:'#7C3AED', name:'Visio' },
  { id:'rdv',       label:'R',  color:'#0BBCD4', name:'RDV' },
  { id:'devis',     label:'D',  color:'#F59E0B', name:'Devis' },
  { id:'nego',      label:'N',  color:'#EA580C', name:'Négociation' },
  { id:'won',       label:'✓',  color:'#1D8348', name:'Gagné' },
  { id:'lost',      label:'✗',  color:'#AEAEB2', name:'Disqualifié' },
];

function stageIndex(colId) {
  if(colId === 'lost') return -1; // cas spécial
  return STAGES.findIndex(s => s.id === colId);
}

function renderProgress(card) {
  const current = stageIndex(card.col);
  if(card.col === 'lost') {
    return '<div class="kcard-progress"><span style="font-size:9px;color:var(--muted2)">Disqualifié</span></div>';
  }
  // Afficher seulement les 9 premières étapes (pas won/lost)
  const mainStages = STAGES.slice(0, 9);
  let html = '<div class="kcard-progress">';
  mainStages.forEach((st, i) => {
    const idx = i;
    const isDone    = idx < current;
    const isCurrent = idx === current;
    const isTodo    = idx > current;
    const cls = isDone ? 'done' : isCurrent ? 'current' : 'todo';
    html += `<div class="prog-dot ${cls}" style="background:${st.color};--c:${st.color}" title="${st.name}"></div>`;
    if(i < mainStages.length - 1) {
      html += `<div class="prog-line${isDone?' done':''}"></div>`;
    }
  });
  html += '</div>';
  return html;
}

const COLS = [
  { id:'leads',     name:'Leads',       color:'#6E6E73' },
  { id:'prospects', name:'Prospects',   color:'#CC0000' },
  { id:'linkedin',  name:'LinkedIn',    color:'#0A66C2' },
  { id:'mailing',   name:'Mailing',     color:'#B84C00' },
  { id:'phoning',   name:'Phoning',     color:'#4338CA' },
  { id:'visio',     name:'Visio',       color:'#7C3AED' },
  { id:'rdv',       name:'RDV',         color:'#0BBCD4' },
  { id:'devis',     name:'Devis',       color:'#F59E0B' },
  { id:'nego',      name:'Négociation', color:'#EA580C' },
  { id:'won',       name:'Gagné ✓',     color:'#1D8348', cls:'won' },
  { id:'lost',      name:'Disqualifié', color:'#AEAEB2', cls:'lost' },
];

const MOCK = [];

let cards = [];
let currentId = null;
let dragId = null;

function load() {
  const s = localStorage.getItem('mup_pipeline');
  if(s) {
    try {
      const parsed = JSON.parse(s);
      // Reset si données mockées avec anciens noms courts (A. Fournier etc.)
      const hasOld = parsed.some(c => c.name && c.name.length <= 12 && c.name.includes('.'));
      cards = hasOld ? MOCK : parsed;
      if(hasOld) localStorage.removeItem('mup_pipeline');
    } catch(e) { cards = MOCK; }
  } else {
    cards = MOCK;
  }
}
function save() { localStorage.setItem('mup_pipeline', JSON.stringify(cards)); }

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function totalInProgress() {
  const active = ['prospects','linkedin','mailing','phoning','visio','rdv','devis','nego'];
  const t = cards.filter(c=>active.includes(c.col)).reduce((s,c)=>s+(c.val||0),0);
  return t >= 1000 ? Math.round(t/1000)+'k€' : t+'€';
}

function renderKanban() {
  const kb = document.getElementById('kanban');
  document.getElementById('pipeline-total').textContent = totalInProgress() + ' en cours';
  kb.innerHTML = COLS.map(col => {
    const colCards = cards.filter(c => c.col === col.id);
    const total = colCards.reduce((s,c)=>s+(c.val||0),0);
    const totalStr = total >= 1000 ? Math.round(total/1000)+'k€' : (total ? total+'€' : '—');
    return `<div class="col${col.cls?' '+col.cls:''}" id="col-${col.id}" 
        ondragover="onDragOver(event,'${col.id}')" 
        ondrop="onDrop(event,'${col.id}')"
        ondragleave="onDragLeave(event,'${col.id}')">
      <div class="col-hdr">
        <div class="col-top">
          <div class="col-bar" style="background:${col.color}"></div>
          <div class="col-name">${col.name}</div>
          <div class="col-count">${colCards.length}</div>
        </div>
        <div class="col-amount">${totalStr}</div>
      </div>
      <div class="col-body" id="body-${col.id}">
        ${colCards.map(c => renderCard(c, col.color)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderCard(c, color) {
  const val = c.val >= 1000 ? Math.round(c.val/1000)+'k€' : (c.val ? c.val+'€' : '—');
  return `<div class="kcard" id="kcard-${c.id}" 
      draggable="true"
      ondragstart="onDragStart(event,'${c.id}')"
      ondragend="onDragEnd(event)"
      onclick="openDetail('${c.id}')">
    <div class="kcard-bar" style="background:${color}"></div>
    <div class="kcard-actions">
      <button class="kcard-btn" onclick="event.stopPropagation();editCard('${c.id}')" title="Modifier">✏️</button>
      <button class="kcard-btn" onclick="event.stopPropagation();deleteCard('${c.id}')" title="Supprimer">🗑</button>
    </div>
    <div class="kcard-name">${esc(c.co||c.name)}</div>
    <div class="kcard-co">${esc(c.co?c.name:"")}</div>
    <div class="kcard-foot">
      <div class="kcard-val">${val}</div>
      <div class="kcard-days">J+${c.days||0}</div>
    </div>
    ${renderProgress(c)}
    ${c.src?`<div class="kcard-src">↳ ${esc(c.src)}</div>`:''}
  </div>`;
}

// ── DRAG & DROP ──
function onDragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.getElementById('kcard-'+id);
    if(el) el.classList.add('dragging');
  }, 0);
}
function onDragEnd(e) {
  document.querySelectorAll('.kcard').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.col-body').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e, colId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.col-body').forEach(el => el.classList.remove('drag-over'));
  const body = document.getElementById('body-'+colId);
  if(body) body.classList.add('drag-over');
}
function onDragLeave(e, colId) {
  const body = document.getElementById('body-'+colId);
  if(body) body.classList.remove('drag-over');
}
function onDrop(e, colId) {
  e.preventDefault();
  if(!dragId) return;
  const card = cards.find(c => c.id === dragId);
  if(card) {
    card.col = colId;
    save();
    renderKanban();
    logActivity(dragId, 'Déplacé vers ' + COLS.find(c=>c.id===colId)?.name);
  }
  dragId = null;
}

// ── MODAL ──
let editingId = null;
function openModal(colId) {
  editingId = null;
  document.getElementById('m-name').value = '';
  document.getElementById('m-co').value = '';
  document.getElementById('m-val').value = '';
  document.getElementById('m-email').value = '';
  document.getElementById('m-tel').value = '';
  document.getElementById('m-notes').value = '';
  document.getElementById('m-col').value = colId || 'leads';
  document.getElementById('modal-title').textContent = 'Nouvelle fiche';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-name').focus(), 100);
}
function editCard(id) {
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  editingId = id;
  document.getElementById('m-name').value = c.name||'';
  document.getElementById('m-co').value = c.co||'';
  document.getElementById('m-val').value = c.val||'';
  document.getElementById('m-email').value = c.email||'';
  document.getElementById('m-tel').value = c.tel||'';
  document.getElementById('m-addr').value = c.address||'';
  document.getElementById('m-notes').value = c.notes||'';
  document.getElementById('m-col').value = c.col||'leads';
  document.getElementById('modal-title').textContent = 'Modifier la fiche';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function saveCard() {
  const name = document.getElementById('m-name').value.trim();
  if(!name) { document.getElementById('m-name').focus(); return; }
  if(editingId) {
    const c = cards.find(x=>x.id===editingId);
    if(c) { c.name=name; c.co=document.getElementById('m-co').value.trim(); c.address=document.getElementById('m-addr').value.trim(); c.val=parseInt(document.getElementById('m-val').value)||0; c.email=document.getElementById('m-email').value.trim(); c.tel=document.getElementById('m-tel').value.trim(); c.notes=document.getElementById('m-notes').value.trim(); c.col=document.getElementById('m-col').value; }
  } else {
    cards.push({ id:'c'+Date.now(), name, co:document.getElementById('m-co').value.trim(), address:document.getElementById('m-addr').value.trim(), val:parseInt(document.getElementById('m-val').value)||0, email:document.getElementById('m-email').value.trim(), tel:document.getElementById('m-tel').value.trim(), notes:document.getElementById('m-notes').value.trim(), col:document.getElementById('m-col').value, days:0, src:'Manuel', activity:[] });
  }
  save(); closeModal(); renderKanban();
}
function deleteCard(id) {
  cards = cards.filter(c=>c.id!==id);
  save(); renderKanban(); closeDetail();
}

// ── DÉTAIL ──
function openDetail(id) {
  currentId = id;
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  const col = COLS.find(x=>x.id===c.col);
  document.getElementById('d-name').textContent = c.co||c.name||'';
  document.getElementById('d-co').textContent = c.name||'';
  const val = c.val>=1000?Math.round(c.val/1000)+'k€':(c.val?c.val+'€':'—');
  document.getElementById('d-badges').innerHTML = `
    <span class="detail-badge" style="background:${col?.color}22;color:${col?.color}">${col?.name||''}</span>
    <span class="detail-badge" style="background:var(--surface2);color:var(--muted)">${val}</span>
    ${c.src?`<span class="detail-badge" style="background:var(--surface2);color:var(--muted2)">↳ ${esc(c.src)}</span>`:''}
  `;
  const telBtn = document.getElementById('d-tel-btn');
  telBtn.href = c.tel?'tel:'+c.tel.replace(/\s/g,''):'#';
  telBtn.style.display = c.tel?'':'none';
  const mailBtn = document.getElementById('d-mail-btn');
  mailBtn.href = c.email?'mailto:'+c.email:'#';
  mailBtn.style.display = c.email?'':'none';
  document.getElementById('d-addr-row').innerHTML = c.address?`<span style="font-size:11px;color:var(--muted2)">📍</span> ${esc(c.address)}`:'';
  document.getElementById('d-val-row').innerHTML = c.val?`<span style="font-size:11px;color:var(--muted2)">💰</span> <strong>${val}</strong> estimé`:'';
  document.getElementById('d-email-row').innerHTML = c.email?`<span style="font-size:11px;color:var(--muted2)">✉️</span> <a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`:'';
  document.getElementById('d-tel-row').innerHTML = c.tel?`<span style="font-size:11px;color:var(--muted2)">📞</span> ${esc(c.tel)}`:'';
  document.getElementById('d-notes').textContent = c.notes||'Aucune note.';
  document.getElementById('d-move').value = c.col||'leads';
  const acts = (c.activity||[]).slice(-5).reverse();
  document.getElementById('d-activity').innerHTML = acts.length
    ? acts.map(a=>`<div class="activity-item"><div class="activity-dot"></div><div class="activity-txt">${esc(a.txt)}</div><div class="activity-date">${esc(a.date)}</div></div>`).join('')
    : '<div style="font-size:12px;color:var(--muted2);font-style:italic">Aucune activité</div>';
  const devisBtn = document.getElementById('d-devis-btn');
  if(devisBtn) devisBtn.style.display = (c.col==='devis') ? 'inline-flex' : 'none';
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}
function createDevis() {
  if(!currentId) return;
  const c = cards.find(x => x.id === currentId);
  if(!c) return;
  localStorage.setItem('mup_devis_prefill', JSON.stringify({name:c.name,co:c.co,email:c.email,addr:c.address,val:c.val}));
  window.location.href = '/devis';
}
function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  currentId = null;
}
function moveCard(colId) {
  if(!currentId) return;
  const c = cards.find(x=>x.id===currentId);
  if(c) { c.col=colId; logActivity(currentId,'Déplacé vers '+COLS.find(x=>x.id===colId)?.name); save(); renderKanban(); }
}
function editCurrentCard() { closeDetail(); editCard(currentId); }
function deleteCurrentCard() { if(confirm('Supprimer cette fiche ?')) { deleteCard(currentId); } }
function logActivity(id, txt) {
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  if(!c.activity) c.activity=[];
  const now = new Date();
  c.activity.push({ txt, date: now.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) });
  save();
}

// ── TRI ──
function sortCards(by) {
  if(by==='value') cards.sort((a,b)=>(b.val||0)-(a.val||0));
  else if(by==='name') cards.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else cards.sort((a,b)=>(b.days||0)-(a.days||0));
  save(); renderKanban();
}

// ── IMPORT DEPUIS PROSPECTS ──
function importFromProspects() {
  const raw = localStorage.getItem('mup_prospects');
  if(!raw) return;
  try {
    const prospects = JSON.parse(raw);
    prospects.forEach(p => {
      if(!cards.find(c=>c.id===p.id)) {
        cards.push({ id:p.id, name:p.name||p.nom||'', co:p.co||p.ville||'', val:0, col:'prospects', email:p.email||'', tel:p.phone||p.tel||'', notes:'', days:0, src:'Prospects', activity:[] });
      }
    });
    save(); renderKanban();
  } catch(e) {}
}

// Vider le cache si les données mockées ont changé
const MOCK_VERSION = '2';
if(localStorage.getItem('mup_pipeline_v') !== MOCK_VERSION) {
  localStorage.removeItem('mup_pipeline');
  localStorage.setItem('mup_pipeline_v', MOCK_VERSION);
}
load();
importFromProspects();
renderKanban();
</script>
<script src="/sidebar.js"></script>
</body>
</html>
