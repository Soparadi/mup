<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable — MovUP</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#FFFFFF;--surface:#F5F5F7;
    --card:#FFFFFF;--border:#E8E8ED;--border-2:#C7C7CC;
    --text:#1D1D1F;--muted:#6E6E73;
    --font:'Geist',-apple-system,'Helvetica Neue',sans-serif;
    --font-serif:'Instrument Serif',Georgia,serif;
  }
  body{background:var(--surface);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}
  .page{width:100%;max-width:520px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:10px;margin:0 auto 28px;text-decoration:none;color:var(--text);font-weight:800;font-size:18px;letter-spacing:-.4px;justify-content:center;width:100%}
  .brand-logo{height:48px;width:auto;display:block}
  .brand-icon{background:var(--text);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;flex-shrink:0}
  .brand-icon svg{width:18px;height:18px}
  .code{font-family:var(--font-serif);font-style:italic;font-size:96px;font-weight:400;color:var(--text);line-height:1;letter-spacing:-.04em;margin-bottom:14px}
  h1{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--text);margin-bottom:10px;line-height:1.2}
  p{font-size:15px;color:var(--muted);margin-bottom:28px;line-height:1.55}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);font-size:14px;font-weight:700;padding:12px 22px;border-radius:10px;border:1px solid var(--text);background:var(--text);color:#fff;text-decoration:none;transition:background .15s}
  .btn:hover{background:#000}
  .links{margin-top:24px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:13px;color:var(--muted)}
  .links a{color:var(--text);font-weight:600;text-decoration:none}
  .links a:hover{text-decoration:underline}
  footer{padding:18px 20px 24px;text-align:center;font-size:11.5px;color:var(--muted);border-top:1px solid var(--border);background:var(--bg)}
  footer a{color:var(--muted);text-decoration:none}
  footer a:hover{color:var(--text);text-decoration:underline}
</style>
</head>
<body>
<main>
  <div class="page">
    <a href="/" class="brand" aria-label="Accueil MovUP">
      <img src="/logo-v7-movup-court.svg" alt="MovUP" class="brand-logo">
    </a>

    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>Cette page n'existe pas, ou n'existe plus. Vérifiez l'adresse, ou revenez à l'accueil.</p>

    <a href="/" class="btn">Retour à l'accueil</a>

    <div class="links">
      <a href="/tarifs">Tarifs</a>
      <a href="/login">Se connecter</a>
      <a href="/signup">Créer un compte</a>
    </div>
  </div>
</main>

<footer>
  © 2026 MovUP — <a href="/mentions-legales.html">Mentions légales</a> · Contact : <a href="mailto:contact@movup.io">contact@movup.io</a>
</footer>
</body>
</html>
