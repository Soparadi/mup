<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUP — Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F7;--surface:#F5F5F7;--surface2:#EBEBF0;
  --card:#FFFFFF;--border:#E8E8ED;--border2:#C7C7CC;
  --text:#1D1D1F;--muted:#6E6E73;--muted2:#AEAEB2;
  --green:#1D8348;--orange:#B84C00;--red:#CC0000;--blue:#0A66C2;
  --font:'Geist',-apple-system,'Helvetica Neue',sans-serif;
  --mono:'Geist Mono','SF Mono','Menlo',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);font-size:14px;color:var(--text);-webkit-font-smoothing:antialiased;display:flex}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0;height:100vh;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:12px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sb-logo-icon{width:28px;height:28px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;letter-spacing:-.3px}
.sb-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:10px 8px 5px;margin-top:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:12.5px;font-weight:500;color:var(--muted);transition:all .12s;text-decoration:none}
.sb-item:hover{color:var(--text);background:var(--surface2)}
.sb-item.active{color:var(--text);background:var(--surface);font-weight:600;border:1px solid var(--border)}
.sb-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── SHELL ── */
.shell{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0;display:flex;align-items:center;gap:16px}
.topbar-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.pipeline-total{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--green);background:rgba(29,131,72,.1);border-radius:6px;padding:3px 10px}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.btn-add-card{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:9px;border:none;background:var(--text);color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-add-card:hover{background:#000}

/* ── KANBAN ── */
.kanban-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 20px 20px;display:flex;gap:12px;align-items:flex-start}
.kanban-wrap::-webkit-scrollbar{height:6px}
.kanban-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── COLONNE ── */
.col{display:flex;flex-direction:column;width:220px;flex-shrink:0;height:calc(100vh - 120px);border-radius:12px;background:var(--surface2);overflow:hidden}
.col-hdr{padding:10px 12px 8px;flex-shrink:0}
.col-top{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.col-bar{width:28px;height:3px;border-radius:2px;flex-shrink:0}
.col-name{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text)}
.col-count{margin-left:auto;font-size:10px;font-weight:800;font-family:var(--mono);color:var(--muted2);background:var(--card);border-radius:5px;padding:1px 6px}
.col-amount{font-size:11px;font-weight:600;color:var(--muted);font-family:var(--mono)}
.col-body{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.col-body.drag-over{background:rgba(37,99,235,.05);border-radius:8px}

/* ── CARD ── */
.kcard{background:var(--card);border-radius:10px;padding:10px 12px;cursor:grab;transition:all .15s;border:1.5px solid var(--border);position:relative;user-select:none}
.kcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.kcard.dragging{opacity:.4;transform:rotate(2deg);cursor:grabbing}
.kcard-bar{height:3px;border-radius:2px;margin-bottom:8px;margin-left:-12px;margin-right:-12px;margin-top:-10px;border-radius:8px 8px 0 0}
.kcard-name{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3}
.kcard-co{font-size:11px;color:var(--muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-naf-pill{display:inline-block;font-size:9px;font-weight:600;color:#6E6E73;background:#F5F5F7;border-radius:4px;padding:2px 6px;margin:4px 0 6px 0;letter-spacing:0.5px;text-transform:uppercase;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kcard-foot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.kcard-val{font-size:11.5px;font-weight:800;font-family:var(--mono);color:var(--text)}
.kcard-days{font-size:10px;font-weight:600;color:var(--muted2);background:var(--surface);border-radius:5px;padding:2px 6px}
.kcard-src{font-size:9.5px;color:var(--muted2);margin-top:4px}
.kcard-actions{position:absolute;top:8px;right:8px;display:none;gap:3px}
.kcard:hover .kcard-actions{display:flex}
.kcard-btn{width:20px;height:20px;border-radius:5px;border:none;background:var(--surface2);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .12s}
.kcard-btn:hover{background:var(--border2);color:var(--text)}

/* ── COLONNES SPÉCIALES ── */
.col.won .col-body{background:rgba(29,131,72,.04)}
.col.lost .col-body{background:rgba(204,0,0,.03)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:460px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-bar{height:4px}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-x{width:26px;height:26px;border-radius:7px;border:none;background:var(--surface2);cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.frow{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)}
.finput{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);width:100%;outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--text);background:var(--card)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-save{background:var(--text);color:#fff;border:none;border-radius:9px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-save:hover{background:#000}
.btn-can{background:var(--surface);color:var(--muted);border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}

/* ── FICHE DÉTAIL ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:400;display:none}
.detail-overlay.open{display:block}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--card);border-left:1px solid var(--border);z-index:401;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.detail-panel.open{transform:none}
.detail-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-name{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:2px}
.detail-co{font-size:13px;color:var(--muted);margin-bottom:10px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap}
.detail-badge{padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:700}
.detail-body{flex:1;overflow-y:auto;padding:16px 20px 20px;display:flex;flex-direction:column;gap:16px}
.detail-section{display:flex;flex-direction:column;gap:8px}
.detail-section-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted2);margin-bottom:2px}
.detail-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text)}
.detail-row a{color:var(--blue);text-decoration:none}
.detail-row a:hover{text-decoration:underline}
.detail-actions{display:flex;gap:7px;flex-wrap:wrap}
.d-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;color:var(--text);transition:all .15s;text-decoration:none}
.d-btn:hover{border-color:var(--text)}
.d-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.d-btn.primary:hover{background:#000}
.col-select{border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);width:100%;outline:none;cursor:pointer}
.detail-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:8px;border:none;background:var(--surface2);cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:var(--border2);color:var(--text)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-item{display:flex;flex-direction:column;gap:2px;padding:9px 11px;border-radius:9px;background:var(--surface)}
.info-item-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)}
.info-item-val{font-size:12px;font-weight:600;color:var(--text);word-break:break-all}
.info-item a{color:var(--blue);text-decoration:none}
.info-item a:hover{text-decoration:underline}
.quick-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.quick-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;color:var(--text);transition:all .15s}
.quick-btn:hover{border-color:var(--text);background:var(--surface)}
.quick-btn-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.history-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.history-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.history-content{flex:1;min-width:0}
.history-title{font-size:12px;font-weight:600;color:var(--text)}
.history-sub{font-size:11px;color:var(--muted)}
.history-date{font-size:10px;color:var(--muted2);font-family:var(--mono);flex-shrink:0;margin-top:2px}
.notes-area{width:100%;min-height:70px;border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:12.5px;font-family:var(--font);color:var(--text);background:var(--surface);resize:vertical;outline:none;line-height:1.6;transition:border-color .15s}
.notes-area:focus{border-color:var(--text);background:var(--card)}
#detail-map{width:100%;height:180px;border-radius:10px;border:1px solid var(--border);z-index:0}
.timeline-line{position:relative;padding-left:20px}
.timeline-line::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1.5px;background:var(--border)}
.tl-item{position:relative;padding-bottom:14px}
.tl-item::before{content:'';position:absolute;left:-16px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--border2);border:2px solid var(--card)}
.tl-item.type-mail::before{background:#B84C00}
.tl-item.type-appel::before{background:#4338CA}
.tl-item.type-visio::before{background:#7C3AED}
.tl-item.type-rdv::before{background:#0BBCD4}
.tl-item.type-move::before{background:#1D8348}
.tl-item.type-note::before{background:#F59E0B}
.tl-txt{font-size:12px;color:var(--text);font-weight:500}
.tl-date{font-size:10px;color:var(--muted2);font-family:var(--mono)}


/* ── PROGRESSION ÉTAPES ── */
.kcard-progress{display:flex;align-items:center;gap:3px;margin-top:6px;margin-bottom:2px}
.prog-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative;cursor:help;transition:transform .15s}
.prog-dot:hover{transform:scale(1.3)}
.prog-dot.done{opacity:1}
.prog-dot.todo{opacity:.2;background:var(--border2)!important}
.prog-dot.current{opacity:1;box-shadow:0 0 0 2px #fff, 0 0 0 3px currentColor;animation:prog-pulse 2s ease-in-out infinite}
@keyframes prog-pulse{0%,100%{box-shadow:0 0 0 2px #fff,0 0 0 3px var(--c,#000)}50%{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--c,#000)}}
.prog-line{flex:1;height:1.5px;background:var(--border);min-width:4px}
.prog-line.done{background:var(--border2)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ═══════════════════════════════════════════════════════
   PIPELINE_FOCUS_MODE_EXTENSION — v15
   ═══════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════
   EXTENSION MODE FOCUS — v15
   Ajout non destructif à pipeline.html
   Active un mode "focus" (colonne isolée + fiche large)
   qui coexiste avec le side-panel classique 380px
   ═══════════════════════════════════════════════════════ */

/* Bouton toggle mode focus dans la topbar */
.btn-focus-toggle{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 12px;border-radius:9px;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--muted);font-family:var(--font);font-size:11.5px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.btn-focus-toggle:hover{color:var(--text);border-color:var(--border2)}
.btn-focus-toggle.active{background:var(--text);color:#fff;border-color:var(--text)}
.btn-focus-toggle svg{width:12px;height:12px}

/* ── MODE FOCUS : masque le Kanban global et remplace par colonne isolée ── */
body.focus-mode .kanban-wrap{display:none!important}
body.focus-mode .detail-overlay{display:none!important}
body.focus-mode .detail-panel{
  width:auto!important;
  right:0!important;left:calc(var(--focus-col-width,272px) + var(--sidebar-w,220px))!important;
  transform:translateX(0)!important;
  position:fixed!important;top:var(--topbar-h,55px)!important;bottom:0!important;
  z-index:10!important;border-left:1px solid var(--border)!important;
}

/* Wrapper focus (colonne isolée + breadcrumb) */
.focus-wrap{display:none;flex-shrink:0;background:var(--bg);padding:16px 16px 20px;border-right:1px solid var(--border);width:272px;overflow:hidden;flex-direction:column}
body.focus-mode .focus-wrap{display:flex}
.focus-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px}
.focus-breadcrumb{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
.focus-breadcrumb a{color:var(--muted);cursor:pointer;text-decoration:none;transition:color .12s}
.focus-breadcrumb a:hover{color:var(--text)}
.focus-breadcrumb svg{width:9px;height:9px;color:var(--muted2)}
.focus-breadcrumb .current{color:var(--text);font-weight:600}

.focus-col{display:flex;flex-direction:column;width:240px;height:calc(100vh - 90px);border-radius:12px;background:var(--surface2);overflow:hidden}
.focus-col-head{display:flex;align-items:center;gap:8px;padding:10px 11px;flex-shrink:0}
.focus-col-bar{width:28px;height:3px;border-radius:2px;flex-shrink:0}
.focus-col-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text);flex:1}
.focus-col-count{font-size:10px;font-weight:800;font-family:var(--mono);color:var(--muted2);background:var(--card);border-radius:5px;padding:1px 6px}
.focus-col-body{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:6px}

/* ── MODE FOCUS : fiche large avec contenu centré ── */
body.focus-mode .detail-panel{
  background:var(--card);
  padding:0!important;
}
body.focus-mode .detail-close{
  top:20px!important;right:20px!important;z-index:100;
}
body.focus-mode .detail-hdr{
  background:var(--text);color:#fff;
  padding:28px 40px 24px!important;border-bottom:none!important;
}
body.focus-mode .detail-hdr .detail-name{color:#fff;font-size:26px;margin-bottom:4px}
body.focus-mode .detail-hdr .detail-co{color:rgba(255,255,255,.7);font-size:14px;margin-bottom:14px}
body.focus-mode .detail-hdr .detail-badges{gap:8px}
body.focus-mode .detail-hdr .detail-badge{background:rgba(255,255,255,.1)!important;color:rgba(255,255,255,.9)!important;padding:4px 12px;font-size:11px}
body.focus-mode .detail-close{background:rgba(255,255,255,.08)!important;color:rgba(255,255,255,.7)!important;border:1px solid rgba(255,255,255,.1)!important}
body.focus-mode .detail-close:hover{background:rgba(255,255,255,.15)!important;color:#fff!important}

/* Corps de la fiche centré à 820px */
body.focus-mode .detail-body{
  padding:0!important;
  max-width:none!important;
}
body.focus-mode .detail-body > *{
  max-width:820px;margin-left:auto;margin-right:auto;
  padding-left:40px;padding-right:40px;width:100%;
}
body.focus-mode .detail-body > *:first-child{padding-top:28px}
body.focus-mode .detail-body > *:last-child{padding-bottom:60px}

/* Sections plus aérées en mode focus */
body.focus-mode .detail-section{gap:12px!important;margin-bottom:8px}
body.focus-mode .detail-section-title{font-size:10px;letter-spacing:.2em;padding-bottom:6px;position:relative}
body.focus-mode .detail-section-title::after{content:"";position:absolute;left:0;bottom:0;width:22px;height:2px;background:var(--border2)}

/* Info-grid plus large */
body.focus-mode .info-grid{grid-template-columns:1fr 1fr;gap:10px}
body.focus-mode .info-item{padding:12px 14px;border-radius:10px}
body.focus-mode .info-item-label{font-size:9.5px;letter-spacing:.14em}
body.focus-mode .info-item-val{font-size:13px;margin-top:2px}

/* Quick actions plus imposants en mode focus */
body.focus-mode .quick-actions{grid-template-columns:repeat(3,1fr);gap:10px}
body.focus-mode .quick-btn{padding:16px 10px;font-size:12px}
body.focus-mode .quick-btn-ico{width:36px;height:36px}

/* Carte plus grande en mode focus */
body.focus-mode #detail-map{height:220px!important}

/* Notes area plus généreux */
body.focus-mode .notes-area{min-height:100px;padding:14px 16px;font-size:13px;line-height:1.6}

/* Timeline plus aérée */
body.focus-mode .timeline-line{padding-left:24px}
body.focus-mode .tl-item{padding-bottom:16px}
body.focus-mode .tl-txt{font-size:13px}

/* Déplacer select plus gros */
body.focus-mode .col-select{padding:10px 14px;font-size:13.5px;border-radius:10px}

/* ── NOUVELLES SECTIONS MODE FOCUS ── */
/* Prochaine action actionnable */
body.focus-mode #focus-next-action{display:block}
#focus-next-action{display:none;margin-bottom:20px}
.next-action-card{
  padding:16px 18px;
  display:flex;align-items:center;gap:14px;
  background:rgba(0,102,224,.06);
  border:1px solid rgba(0,102,224,.15);
  border-radius:10px;
  margin-bottom:8px;
}
.next-action-card.empty{
  background:var(--surface);border:1px dashed var(--border2);
  justify-content:center;padding:24px 18px;color:var(--muted);
  font-size:13px;font-weight:500;
}
.next-action-icon{
  width:42px;height:42px;border-radius:10px;
  background:var(--card);color:#0066E0;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.next-action-icon svg{width:18px;height:18px}
.next-action-body{flex:1;min-width:0}
.next-action-label{font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.next-action-text{font-size:14.5px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.next-action-date{font-size:12px;color:var(--muted);font-family:var(--mono);letter-spacing:0;flex-shrink:0;text-align:right}
.next-action-date strong{color:var(--text);font-weight:800;font-size:13px}

.next-action-controls{
  display:flex;gap:6px;
  padding:10px 18px;
  background:rgba(0,102,224,.04);
  border:1px solid rgba(0,102,224,.15);
  border-top:none;
  border-radius:0 0 10px 10px;
  margin-top:-8px;
}
.next-action-btn{
  flex:1;padding:8px 12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:7px;
  font-family:var(--font);font-size:12px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .12s;
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
}
.next-action-btn:hover{color:var(--text);border-color:var(--border2)}
.next-action-btn svg{width:12px;height:12px}
.next-action-btn.primary{background:#0066E0;color:#fff;border-color:#0066E0}
.next-action-btn.primary:hover{background:#0053BB}
.next-action-btn.danger:hover{color:var(--red);border-color:rgba(204,0,0,.3)}

/* Activité cliquable en mode focus */
body.focus-mode #focus-activity-grid{display:grid}
#focus-activity-grid{display:none;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.act-card-big{
  background:var(--surface);border-radius:10px;padding:14px 16px;
  cursor:pointer;transition:all .15s;
  border:1px solid transparent;
  display:flex;flex-direction:column;gap:4px;position:relative;
  font-family:var(--font);
}
.act-card-big:hover{background:var(--surface2);transform:translateY(-1px);border-color:var(--border)}
.act-card-big.active{background:var(--card);border-color:currentColor;box-shadow:0 0 0 3px rgba(0,0,0,.02)}
.act-card-big-row{display:flex;align-items:center;justify-content:space-between}
.act-card-big-icon svg{width:15px;height:15px;stroke-width:2.2}
.act-card-big-val{font-size:24px;font-weight:800;letter-spacing:-.03em;line-height:1}
.act-card-big-label{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:6px}
.act-card-big.mailing .act-card-big-icon,.act-card-big.mailing .act-card-big-val{color:#B84C00}
.act-card-big.phoning .act-card-big-icon,.act-card-big.phoning .act-card-big-val{color:var(--red)}
.act-card-big.visio .act-card-big-icon,.act-card-big.visio .act-card-big-val{color:#0066E0}
.act-card-big.rdv .act-card-big-icon,.act-card-big.rdv .act-card-big-val{color:#4338CA}

/* État par défaut (sans mode focus) : side-panel classique 380px intact */
body:not(.focus-mode) #focus-next-action,
body:not(.focus-mode) #focus-activity-grid{display:none!important}

/* Animation douce de bascule */
.kanban-wrap,.focus-wrap,.detail-panel{transition:opacity .2s ease}

</style>

<script>

const STAGES = [
  { id:'leads',     label:'L',  color:'#6E6E73', name:'Leads' },
  { id:'prospects', label:'P',  color:'#CC0000', name:'Prospects' },
  { id:'linkedin',  label:'Li', color:'#0A66C2', name:'LinkedIn' },
  { id:'mailing',   label:'M',  color:'#B84C00', name:'Mailing' },
  { id:'phoning',   label:'Ph', color:'#4338CA', name:'Phoning' },
  { id:'visio',     label:'V',  color:'#7C3AED', name:'Visio' },
  { id:'rdv',       label:'R',  color:'#0BBCD4', name:'RDV' },
  { id:'devis',     label:'D',  color:'#F59E0B', name:'Devis' },
  { id:'nego',      label:'N',  color:'#EA580C', name:'Négociation' },
  { id:'won',       label:'✓',  color:'#1D8348', name:'Gagné' },
  { id:'lost',      label:'✗',  color:'#AEAEB2', name:'Disqualifié' },
];

function stageIndex(colId) {
  if(colId === 'lost') return -1; // cas spécial
  return STAGES.findIndex(s => s.id === colId);
}

function renderProgress(card) {
  const current = stageIndex(card.col);
  if(card.col === 'lost') {
    return '<div class="kcard-progress"><span style="font-size:9px;color:var(--muted2)">Disqualifié</span></div>';
  }
  // Afficher seulement les 9 premières étapes (pas won/lost)
  const mainStages = STAGES.slice(0, 9);
  let html = '<div class="kcard-progress">';
  mainStages.forEach((st, i) => {
    const idx = i;
    const isDone    = idx < current;
    const isCurrent = idx === current;
    const isTodo    = idx > current;
    const cls = isDone ? 'done' : isCurrent ? 'current' : 'todo';
    html += `<div class="prog-dot ${cls}" style="background:${st.color};--c:${st.color}" title="${st.name}"></div>`;
    if(i < mainStages.length - 1) {
      html += `<div class="prog-line${isDone?' done':''}"></div>`;
    }
  });
  html += '</div>';
  return html;
}

const COLS = [
  { id:'prospects', name:'Prospects',   color:'#CC0000' },
  { id:'linkedin',  name:'LinkedIn',    color:'#0A66C2' },
  { id:'mailing',   name:'Mailing',     color:'#B84C00' },
  { id:'phoning',   name:'Phoning',     color:'#4338CA' },
  { id:'visio',     name:'Visio',       color:'#7C3AED' },
  { id:'rdv',       name:'RDV',         color:'#0BBCD4' },
  { id:'devis',     name:'Devis',       color:'#F59E0B' },
  { id:'nego',      name:'Négociation', color:'#EA580C' },
  { id:'won',       name:'Gagné ✓',     color:'#1D8348', cls:'won' },
  { id:'lost',      name:'Disqualifié', color:'#AEAEB2', cls:'lost' },
];

const MOCK = [];

let cards = [];
let currentId = null;
let dragId = null;

function load() {
  const s = localStorage.getItem('mup_pipeline');
  if(s) {
    try {
      const parsed = JSON.parse(s);
      // Reset si données mockées avec anciens noms courts (A. Fournier etc.)
      const hasOld = parsed.some(c => c.name && c.name.length <= 12 && c.name.includes('.'));
      cards = (hasOld ? MOCK : parsed).map(migrateCard);
      if(hasOld) localStorage.removeItem('mup_pipeline');
    } catch(e) { cards = MOCK.map(migrateCard); }
  } else {
    cards = MOCK.map(migrateCard);
  }
}
function save() { localStorage.setItem('mup_pipeline', JSON.stringify(cards)); }

function migrateCard(c){
  // Rename old fields
  if(c.co && !c.company) c.company = c.co;
  if(c.name && !c.contact) c.contact = c.name;
  if(!c.company && c.contact) c.company = c.contact;
  if(c.tel && !c.phone) c.phone = c.tel;
  if(c.location && !c.address) c.address = c.location;
  if(c.director && !c.contact) c.contact = c.director;
  // Keep backward compat aliases
  c.co = c.company || '';
  c.name = c.contact || '';
  c.tel = c.phone || '';
  // Init new fields
  if(!c.emailStatus) c.emailStatus = 'new';
  if(!c.lastContact) c.lastContact = '';
  if(!c.tags) c.tags = [];
  return c;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function totalInProgress() {
  const active = ['prospects','linkedin','mailing','phoning','visio','rdv','devis','nego'];
  const t = cards.filter(c=>active.includes(c.col)).reduce((s,c)=>s+(c.val||0),0);
  return t >= 1000 ? Math.round(t/1000)+'k€' : t+'€';
}

function renderKanban() {
  const kb = document.getElementById('kanban');
  document.getElementById('pipeline-total').textContent = totalInProgress() + ' en cours';
  kb.innerHTML = COLS.map(col => {
    const colCards = cards.filter(c => c.col === col.id);
    const total = colCards.reduce((s,c)=>s+(c.val||0),0);
    const totalStr = total >= 1000 ? Math.round(total/1000)+'k€' : (total ? total+'€' : '—');
    return `<div class="col${col.cls?' '+col.cls:''}" id="col-${col.id}" 
        ondragover="onDragOver(event,'${col.id}')" 
        ondrop="onDrop(event,'${col.id}')"
        ondragleave="onDragLeave(event,'${col.id}')">
      <div class="col-hdr">
        <div class="col-top">
          <div class="col-bar" style="background:${col.color}"></div>
          <div class="col-name">${col.name}</div>
          <div class="col-count">${colCards.length}</div>
        </div>
        <div class="col-amount">${totalStr}</div>
      </div>
      <div class="col-body" id="body-${col.id}">
        ${colCards.map(c => renderCard(c, col.color)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderCard(c, color) {
  const val = c.val >= 1000 ? Math.round(c.val/1000)+'k€' : (c.val ? c.val+'€' : '—');
  return `<div class="kcard" id="kcard-${c.id}" 
      draggable="true"
      ondragstart="onDragStart(event,'${c.id}')"
      ondragend="onDragEnd(event)"
      onclick="openDetail('${c.id}')">
    <div class="kcard-bar" style="background:${color}"></div>
    <div class="kcard-actions">
      <button class="kcard-btn" onclick="event.stopPropagation();editCard('${c.id}')" title="Modifier"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="kcard-btn" onclick="event.stopPropagation();deleteCard('${c.id}')" title="Supprimer"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>
    </div>

    <div class="kcard-foot">
      <div class="kcard-val">${val}</div>

// ── DRAG & DROP ──
function onDragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.getElementById('kcard-'+id);
    if(el) el.classList.add('dragging');
  }, 0);
}
function onDragEnd(e) {
  document.querySelectorAll('.kcard').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.col-body').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e, colId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.col-body').forEach(el => el.classList.remove('drag-over'));
  const body = document.getElementById('body-'+colId);
  if(body) body.classList.add('drag-over');
}
function onDragLeave(e, colId) {
  const body = document.getElementById('body-'+colId);
  if(body) body.classList.remove('drag-over');
}
function onDrop(e, colId) {
  e.preventDefault();
  if(!dragId) return;
  const card = cards.find(c => String(c.id) === String(dragId));
  if(card) {
    card.col = colId;
    save();
    renderKanban();
    var now = new Date();
    var timeStr = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    logActivity(dragId, 'Déplacé vers ' + COLS.find(c=>c.id===colId)?.name+' à '+timeStr);
  }
  dragId = null;
}

function saveCard() {

    const c = cards.find(x=>x.id===editingId);

function deleteCard(id) {

}

// ── DÉTAIL ──
let detailMap = null;
let detailMarker = null;

function openDetail(id) {
  currentId = id;
  const c = cards.find(x=>String(x.id)===String(id));
  if(!c) return;
  const col = COLS.find(x=>x.id===c.col);
  const val = c.val>=1000?Math.round(c.val/1000)+'k€':(c.val?c.val+'€':'—');

  // Header
  document.getElementById('d-name').textContent = c.co||c.name||'';
  document.getElementById('d-co').textContent = c.co ? c.name : '';
  document.getElementById('d-badges').innerHTML = `
    <span class="detail-badge" style="background:${col?.color}22;color:${col?.color}">${col?.name||''}</span>
    <span class="detail-badge" style="background:var(--surface2);color:var(--muted)">${val}</span>
    <span class="detail-badge" style="background:var(--surface2);color:var(--muted2)">J+${c.days||0}</span>
    ${c.src?`<span class="detail-badge" style="background:var(--surface2);color:var(--muted2)">↳ ${esc(c.src)}</span>`:''}
  `;

  // Info grid
  let infoHtml = '';
  if(c.email) infoHtml += `<div class="info-item"><div class="info-item-label">Email</div><div class="info-item-val"><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></div></div>`;
  if(c.tel) infoHtml += `<div class="info-item"><div class="info-item-label">Téléphone</div><div class="info-item-val"><a href="tel:${c.tel.replace(/\s/g,'')}">${esc(c.tel)}</a></div></div>`;
  if(c.address) infoHtml += `<div class="info-item"><div class="info-item-label">Localisation</div><div class="info-item-val">${esc(c.address)}</div></div>`;
  infoHtml += `<div class="info-item"><div class="info-item-label">Valeur estimée</div><div class="info-item-val"><strong>${val}</strong></div></div>`;
  if(!infoHtml) infoHtml = '<div style="font-size:12px;color:var(--muted2);font-style:italic">Aucune info</div>';
  document.getElementById('d-info-grid').innerHTML = infoHtml;

  // Socials (editable)
  document.getElementById('d-linkedin').value = c.linkedin||'';
  document.getElementById('d-facebook').value = c.facebook||'';
  document.getElementById('d-instagram').value = c.instagram||'';
  var liLink=document.getElementById('d-linkedin-link'); liLink.href=c.linkedin||'#'; liLink.style.display=c.linkedin?'':'none';
  var fbLink=document.getElementById('d-facebook-link'); fbLink.href=c.facebook||'#'; fbLink.style.display=c.facebook?'':'none';
  var igLink=document.getElementById('d-instagram-link'); igLink.href=c.instagram||'#'; igLink.style.display=c.instagram?'':'none';

  // Move select
  document.getElementById('d-move').value = c.col||'leads';

  // Timeline (all activity + auto-generated entry date)
  const allActs = (c.activity||[]).slice(-12).reverse();
  function getTimelineType(txt) {
    const t = txt.toLowerCase();
    if(t.includes('mail')) return 'type-mail';
    if(t.includes('appel') || t.includes('phoning')) return 'type-appel';
    if(t.includes('visio')) return 'type-visio';
    if(t.includes('rdv')) return 'type-rdv';
    if(t.includes('déplacé') || t.includes('move')) return 'type-move';
    return 'type-note';
  }
  // Add pipeline entry as first event
  const entryDate = c.created || new Date(typeof c.id==='string'?(parseInt(c.id.replace('c',''))||Date.now()):c.id).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
  const entryItem = `<div class="tl-item type-move"><div class="tl-txt">Ajouté au pipeline</div><div class="tl-date">${esc(entryDate)}</div></div>`;
  const tlItems = allActs.map(a => `<div class="tl-item ${getTimelineType(a.txt)}"><div class="tl-txt">${esc(a.txt)}</div><div class="tl-date">${esc(a.date)}</div></div>`).join('');
  document.getElementById('d-timeline').innerHTML = (tlItems || '') + entryItem;

  // Notes (editable)
  document.getElementById('d-notes').value = c.notes||'';

  // RDV section
  var rdvSection = document.getElementById('d-rdv-section');
  var rdvContent = document.getElementById('d-rdv-content');
  var isRdvCol = (c.col === 'rdv');
  var showRdv = ['linkedin','mailing','phoning','visio','rdv','nego','devis'].indexOf(c.col) !== -1;
  if(showRdv) {
    rdvSection.style.display = '';
    var hasRdv = c.rdvDate || isRdvCol;
    if(isRdvCol || c.rdvDate) {
      rdvContent.innerHTML = '<div style="display:flex;gap:8px;margin-bottom:4px"><input type="date" id="d-rdv-date" value="'+(c.rdvDate||'')+'" style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:var(--font);font-size:12px;color:var(--text);background:var(--surface);outline:none" onchange="saveRdv()"><input type="time" id="d-rdv-time" value="'+(c.rdvTime||'')+'" style="width:100px;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:var(--font);font-size:12px;color:var(--text);background:var(--surface);outline:none" onchange="saveRdv()"></div>';
    } else {
      rdvContent.innerHTML = '<button onclick="showRdvInputs()" style="width:100%;padding:7px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;color:var(--text);transition:all .12s">Planifier un RDV</button>';
    }
  } else {
    rdvSection.style.display = 'none';
  }

  // Map
  const mapSection = document.getElementById('d-map-section');
  if(c.address) {
    mapSection.style.display = '';
    setTimeout(() => {
      if(detailMap) { detailMap.remove(); detailMap = null; }
      detailMap = L.map('detail-map', { zoomControl:false, attributionControl:false }).setView([48.4, -1.75], 10);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom:18 }).addTo(detailMap);
      // Geocode address
      fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(c.address)+'&limit=1')
        .then(r=>r.json()).then(data=>{
          if(data.length) {
            const lat = parseFloat(data[0].lat), lon = parseFloat(data[0].lon);
            detailMap.setView([lat, lon], 13);
            if(detailMarker) detailMap.removeLayer(detailMarker);
            detailMarker = L.marker([lat, lon]).addTo(detailMap).bindPopup(esc(c.address)).openPopup();
          }
        }).catch(()=>{});
    }, 300);
  } else {
    mapSection.style.display = 'none';
  }

  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  if(detailMap) { detailMap.remove(); detailMap = null; detailMarker = null; }
  currentId = null;
}

function saveNotes() {
  if(!currentId) return;
  const c = cards.find(x=>x.id===currentId);
  if(c) { c.notes = document.getElementById('d-notes').value.trim(); save(); syncToProspects(c); }
}

function showRdvInputs() {
  var c = cards.find(x=>String(x.id)===String(currentId));
  if(!c) return;
  var rdvContent = document.getElementById('d-rdv-content');
  rdvContent.innerHTML = '<div style="display:flex;gap:8px;margin-bottom:4px"><input type="date" id="d-rdv-date" value="" style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:var(--font);font-size:12px;color:var(--text);background:var(--surface);outline:none" onchange="saveRdv()"><input type="time" id="d-rdv-time" value="" style="width:100px;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:var(--font);font-size:12px;color:var(--text);background:var(--surface);outline:none" onchange="saveRdv()"></div>';
  document.getElementById('d-rdv-date').focus();
}

function saveRdv() {
  if(!currentId) return;
  var c = cards.find(x=>String(x.id)===String(currentId));
  if(!c) return;
  var dateEl = document.getElementById('d-rdv-date');
  var timeEl = document.getElementById('d-rdv-time');
  if(!dateEl) return;
  c.rdvDate = dateEl.value || '';
  c.rdvTime = timeEl ? timeEl.value || '' : '';
  save();
  // Sync to mup_agenda
  syncRdvToAgenda(c);
  logActivity(currentId, 'RDV planifié le ' + (c.rdvDate || '—') + (c.rdvTime ? ' à ' + c.rdvTime : ''));
}

function syncRdvToAgenda(c) {
  var agenda = [];
  try { var r = localStorage.getItem('mup_agenda'); if(r) agenda = JSON.parse(r); } catch(e) {}
  // Remove existing entry for this card
  agenda = agenda.filter(function(ev) { return String(ev.id) !== String(c.id); });
  // Add new if date exists
  if(c.rdvDate) {
    agenda.push({
      id: String(c.id),
      title: c.co || c.name || '',
      contact: c.name || '',
      date: c.rdvDate,
      start: c.rdvTime || '',
      end: '',
      type: 'rdv',
      col: c.col,
      notes: ''
    });
  }
  localStorage.setItem('mup_agenda', JSON.stringify(agenda));
}

function saveSocials() {
  if(!currentId) return;
  const c = cards.find(x=>String(x.id)===String(currentId));
  if(!c) return;
  c.linkedin = document.getElementById('d-linkedin').value.trim();
  c.facebook = document.getElementById('d-facebook').value.trim();
  c.instagram = document.getElementById('d-instagram').value.trim();
  // Update link icons
  var liLink=document.getElementById('d-linkedin-link'); liLink.href=c.linkedin||'#'; liLink.style.display=c.linkedin?'':'none';
  var fbLink=document.getElementById('d-facebook-link'); fbLink.href=c.facebook||'#'; fbLink.style.display=c.facebook?'':'none';
  var igLink=document.getElementById('d-instagram-link'); igLink.href=c.instagram||'#'; igLink.style.display=c.instagram?'':'none';
  save();
  syncToProspects(c);
}

function syncToProspects(c) {
  try {
    var raw = localStorage.getItem('mup_prospects');
    if(!raw) return;
    var prospects = JSON.parse(raw);
    var p = prospects.find(function(x){ return String(x.id)===String(c.id); });
    if(!p) return;
    if(c.email) p.email = c.email;
    if(c.tel) p.phone = c.tel;
    if(c.address) p.location = c.address;
    if(c.notes) p.notes = c.notes;
    if(c.linkedin !== undefined) p.linkedin = c.linkedin;
    if(c.facebook !== undefined) p.facebook = c.facebook;
    if(c.instagram !== undefined) p.instagram = c.instagram;
    localStorage.setItem('mup_prospects', JSON.stringify(prospects));
  } catch(e) {}
}

function quickAction(type) {
  if(!currentId) return;
  const c = cards.find(x=>x.id===currentId);
  if(!c) return;
  const labels = { mailing:'Mailing envoyé', phoning:'Appel effectué', rdv:'RDV planifié' };
  logActivity(currentId, labels[type]||type);
  // Move card to matching column if it exists and card is before it
  const targetCol = type;
  const currentIdx = stageIndex(c.col);
  const targetIdx = stageIndex(targetCol);
  if(targetIdx > currentIdx) {
    c.col = targetCol;
    save(); renderKanban();
  }
  // Refresh panel
  openDetail(currentId);
}
function moveCard(colId) {
  if(!currentId) return;
  const c = cards.find(x=>x.id===currentId);
  if(c) { c.col=colId; var now = new Date(); var timeStr = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); logActivity(currentId,'Déplacé vers '+COLS.find(x=>x.id===colId)?.name+' à '+timeStr); save(); renderKanban(); }
}
function editCurrentCard() { closeDetail(); editCard(currentId); }
function deleteCurrentCard() { if(confirm('Supprimer cette fiche ?')) { deleteCard(currentId); } }
function logActivity(id, txt) {
  const c = cards.find(x=>String(x.id)===String(id));
  if(!c) return;
  if(!c.activity) c.activity=[];
  const now = new Date();
  c.activity.push({ txt, date: now.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) });
  save();
}

// ── TRI ──
function sortCards(by) {
  if(by==='value') cards.sort((a,b)=>(b.val||0)-(a.val||0));
  else if(by==='name') cards.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else cards.sort((a,b)=>(b.days||0)-(a.days||0));
  save(); renderKanban();
}

// ── IMPORT DEPUIS PROSPECTS ──
function importFromProspects() {
  const raw = localStorage.getItem('mup_prospects');
  if(!raw) return;
  try {
    const prospects = JSON.parse(raw);
    prospects.forEach(p => {
      if(!cards.find(c=>String(c.id)===String(p.id))) {
        cards.push({ id:String(p.id), name:p.name||p.contact_name||p.nom||'', co:p.company||p.co||p.partner_name||'', email:p.email||p.email_from||'', tel:p.phone||p.tel||p.mobile||'', address:p.location||p.address||p.city||p.ville||'', val:0, col:'prospects', notes:p.notes||p.description||'', days:0, src:p.source||'Prospects', linkedin:p.linkedin||'', facebook:p.facebook||'', instagram:p.instagram||'', activity:[] });
      }
    });
    save(); renderKanban();
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
/* ═══════════════════════════════════════════════════════
   EXTENSION MODE FOCUS — JS
   Ajouté à pipeline.html sans modifier l'existant
   ═══════════════════════════════════════════════════════ */

(function(){
  // État mode focus
  let focusMode = false;
  let focusColumnId = null;

  // ── BOUTON TOGGLE dans la topbar ──
  function injectFocusToggle(){
    const topbarActions = document.querySelector('.topbar-actions');
    if(!topbarActions) return;
    const btn = document.createElement('button');
    btn.className = 'btn-focus-toggle';
    btn.id = 'btn-focus-toggle';
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M22 12h-3M5 12H2"/></svg> Mode focus';
    btn.onclick = toggleFocusMode;
    topbarActions.insertBefore(btn, topbarActions.firstChild);
  }

  // ── WRAPPER HTML de la colonne focus ──
  function injectFocusWrap(){
    const shell = document.querySelector('.shell');
    if(!shell) return;
    const mainContent = shell.querySelector('.kanban-wrap');
    if(!mainContent) return;
    
    const focusWrap = document.createElement('div');
    focusWrap.className = 'focus-wrap';
    focusWrap.id = 'focus-wrap';
    focusWrap.innerHTML = `
      <div class="focus-topbar">
        <div class="focus-breadcrumb">
          <a id="focus-back-link">Pipeline</a>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
          <span class="current" id="focus-col-label">—</span>
        </div>
      </div>
      <div class="focus-col">
        <div class="focus-col-head">
          <div class="focus-col-bar" id="focus-col-bar"></div>
          <div class="focus-col-title" id="focus-col-title">—</div>
          <div class="focus-col-count" id="focus-col-count">0</div>
        </div>
        <div class="focus-col-body" id="focus-col-body"></div>
      </div>
    `;
    mainContent.parentNode.insertBefore(focusWrap, mainContent);
    
    document.getElementById('focus-back-link').onclick = exitFocusMode;
  }

  // ── INJECTION bloc "Prochaine action" dans detail-body ──
  function injectNextActionBlock(){
    const detailBody = document.querySelector('.detail-body');
    if(!detailBody) return;
    
    // Bloc prochaine action (inséré en premier, avant infos contact)
    const nextAction = document.createElement('div');
    nextAction.id = 'focus-next-action';
    nextAction.innerHTML = `
      <div class="detail-section-title" style="margin-bottom:10px">Prochaine action</div>
      <div id="focus-next-action-content"></div>
    `;
    detailBody.insertBefore(nextAction, detailBody.firstChild);
    
    // Bloc activité cliquable (filtre timeline)
    const activity = document.createElement('div');
    activity.innerHTML = `
      <div class="detail-section-title" style="margin-bottom:10px">Activité</div>
      <div id="focus-activity-grid"></div>
    `;
    // On insère juste après le next-action
    nextAction.parentNode.insertBefore(activity, nextAction.nextSibling);
  }

  // ── BASCULE ON/OFF ──
  function toggleFocusMode(){
    if(focusMode){
      exitFocusMode();
    } else {
      // Si une fiche est ouverte, on bascule dessus
      if(window.currentId){
        const card = window.cards?.find(c => String(c.id) === String(window.currentId));
        if(card) enterFocusMode(card.col, window.currentId);
        else enterFocusMode();
      } else {
        enterFocusMode();
      }
    }
  }

  function enterFocusMode(columnId, prospectId){
    focusMode = true;
    focusColumnId = columnId;
    document.body.classList.add('focus-mode');
    document.getElementById('btn-focus-toggle')?.classList.add('active');
    
    if(columnId) renderFocusColumn(columnId);
    if(prospectId && !document.getElementById('detail-panel').classList.contains('open')){
      window.openDetail(prospectId);
    }
  }

  function exitFocusMode(){
    focusMode = false;
    focusColumnId = null;
    document.body.classList.remove('focus-mode');
    document.getElementById('btn-focus-toggle')?.classList.remove('active');
    // Ferme aussi le detail-panel
    if(window.closeDetail) window.closeDetail();
  }

  // ── AFFICHAGE de la colonne isolée ──
  function renderFocusColumn(columnId){
    const COLS = window.COLS || [];
    const col = COLS.find(c => c.id === columnId);
    if(!col) return;
    
    const cardsInCol = (window.cards || []).filter(c => c.col === columnId);
    
    document.getElementById('focus-col-label').textContent = col.name;
    document.getElementById('focus-col-title').textContent = col.name;
    document.getElementById('focus-col-count').textContent = cardsInCol.length;
    document.getElementById('focus-col-bar').style.background = col.color;
    
    const body = document.getElementById('focus-col-body');
    body.innerHTML = '';
    cardsInCol.forEach(c => {
      const card = buildFocusCard(c, col);
      body.appendChild(card);
    });
  }

  function buildFocusCard(c, col){
    const val = c.val >= 1000 ? Math.round(c.val/1000) + 'k€' : (c.val ? c.val + '€' : '—');
    const div = document.createElement('div');
    div.className = 'kcard';
    if(String(c.id) === String(window.currentId)) div.classList.add('selected');
    div.style.cursor = 'pointer';
    div.innerHTML = `
      <div class="kcard-bar" style="background:${col.color}"></div>
      <div class="kcard-name">${escapeHtml(c.co || c.name || '')}</div>
      <div class="kcard-co">${escapeHtml(c.co ? c.name : '')}</div>
      <div class="kcard-foot">
        <span class="kcard-val">${val}</span>
        <span class="kcard-days">J+${c.days || 0}</span>
      </div>
    `;
    div.onclick = () => {
      // Bascule la fiche ouverte sur ce prospect
      document.querySelectorAll('#focus-col-body .kcard').forEach(k => k.classList.remove('selected'));
      div.classList.add('selected');
      if(window.openDetail) window.openDetail(c.id);
      // Après l'ouverture, on enrichit la fiche avec next-action + activité
      setTimeout(() => enrichFicheWithActions(c), 50);
    };
    return div;
  }

  function escapeHtml(s){
    if(!s) return '';
    return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  // ── ENRICHISSEMENT de la fiche avec next-action + activité cliquable ──
  function enrichFicheWithActions(c){
    if(!focusMode) return;
    
    // Compte les actions par type (à partir de la timeline JSON stockée)
    const timeline = c.timeline || [];
    const counts = { mail: 0, appel: 0, visio: 0, rdv: 0 };
    timeline.forEach(t => {
      if(counts[t.type] !== undefined) counts[t.type]++;
    });
    
    // Prochaine action : on cherche dans rdv (planifié)
    const rdv = c.rdv || null;
    const nextContent = document.getElementById('focus-next-action-content');
    if(nextContent){
      if(rdv && rdv.date){
        const rdvDate = new Date(rdv.date);
        const dateStr = rdvDate.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'});
        const timeStr = rdvDate.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        nextContent.innerHTML = `
          <div class="next-action-card">
            <div class="next-action-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            </div>
            <div class="next-action-body">
              <div class="next-action-label">À venir</div>
              <div class="next-action-text">${escapeHtml(rdv.title || 'Rendez-vous')}</div>
            </div>
            <div class="next-action-date">${dateStr} · <strong>${timeStr}</strong></div>
          </div>
          <div class="next-action-controls">
            <button class="next-action-btn primary" onclick="window.focusActionDone()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              Terminée
            </button>
            <button class="next-action-btn" onclick="window.focusActionEdit()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Modifier
            </button>
            <button class="next-action-btn" onclick="window.focusActionPostpone()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              Reporter
            </button>
            <button class="next-action-btn danger" onclick="window.focusActionCancel()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              Annuler
            </button>
          </div>
        `;
      } else {
        nextContent.innerHTML = `
          <div class="next-action-card empty">
            Aucune action planifiée — utilisez les actions rapides ci-dessous
          </div>
        `;
      }
    }
    
    // Activité cliquable (filtre timeline)
    const activityGrid = document.getElementById('focus-activity-grid');
    if(activityGrid){
      activityGrid.innerHTML = `
        <button class="act-card-big mailing" data-type="mail">
          <div class="act-card-big-row">
            <div class="act-card-big-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
            <div class="act-card-big-val">${counts.mail}</div>
          </div>
          <div class="act-card-big-label">Mail</div>
        </button>
        <button class="act-card-big phoning" data-type="appel">
          <div class="act-card-big-row">
            <div class="act-card-big-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72"/></svg></div>
            <div class="act-card-big-val">${counts.appel}</div>
          </div>
          <div class="act-card-big-label">Téléphone</div>
        </button>
        <button class="act-card-big visio" data-type="visio">
          <div class="act-card-big-row">
            <div class="act-card-big-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M15 10l4.553-2.276A1 1 0 0 1 21 8.618v6.764a1 1 0 0 1-1.447.894L15 14"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg></div>
            <div class="act-card-big-val">${counts.visio}</div>
          </div>
          <div class="act-card-big-label">Visio</div>
        </button>
        <button class="act-card-big rdv" data-type="rdv">
          <div class="act-card-big-row">
            <div class="act-card-big-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
            <div class="act-card-big-val">${counts.rdv}</div>
          </div>
          <div class="act-card-big-label">Rendez-vous</div>
        </button>
      `;
      
      // Handlers filtre timeline
      activityGrid.querySelectorAll('.act-card-big').forEach(btn => {
        btn.onclick = () => {
          const type = btn.dataset.type;
          const isActive = btn.classList.contains('active');
          activityGrid.querySelectorAll('.act-card-big').forEach(b => b.classList.remove('active'));
          if(!isActive){
            btn.classList.add('active');
            filterTimeline(type);
          } else {
            filterTimeline(null);
          }
        };
      });
    }
  }

  function filterTimeline(type){
    document.querySelectorAll('#d-timeline .tl-item').forEach(item => {
      if(!type){
        item.style.display = '';
      } else {
        const hasType = item.classList.contains('type-' + type);
        item.style.display = hasType ? '' : 'none';
      }
    });
  }

  // ── ACTIONS sur la prochaine action ──
  window.focusActionDone = function(){
    alert('✓ Action marquée comme terminée\n(intégration à faire avec ta fonction saveCard)');
  };
  window.focusActionEdit = function(){
    alert('Édition de l\'action\n(TODO: ouvrir modal d\'édition date/heure/note)');
  };
  window.focusActionPostpone = function(){
    alert('Reporter : +1 jour / +1 semaine / date custom\n(TODO: menu rapide)');
  };
  window.focusActionCancel = function(){
    if(confirm('Annuler cette action planifiée ?')){
      alert('Action annulée (TODO: integration saveCard)');
    }
  };

  // ── HOOK sur openDetail existante pour basculer en focus ──
  const originalOpenDetail = window.openDetail;
  window.openDetail = function(id){
    if(originalOpenDetail) originalOpenDetail(id);
    const c = window.cards?.find(x => String(x.id) === String(id));
    if(c && focusMode){
      if(c.col !== focusColumnId){
        focusColumnId = c.col;
        renderFocusColumn(c.col);
      }
      setTimeout(() => enrichFicheWithActions(c), 100);
    }
  };

  // ── HOOK sur closeDetail (en mode focus, ferme aussi le focus) ──
  const originalCloseDetail = window.closeDetail;
  window.closeDetail = function(){
    if(originalCloseDetail) originalCloseDetail();
    // En mode focus : ne pas sortir automatiquement du focus, 
    // l'utilisateur peut continuer à cliquer sur d'autres cards
  };

  // ── INIT après chargement DOM ──
  function init(){
    injectFocusToggle();
    injectFocusWrap();
    injectNextActionBlock();
    
    // Raccourci clavier : F pour toggle focus
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape' && focusMode){
        exitFocusMode();
      }
    });
  }

  // Attendre que le DOM ET les variables globales soient prêtes
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
<script src="/sidebar.js"></script>
</body>
</html>
