    const card = list.find(c => String(c.id) === String(cardId));
    if(!card) return;
    // Éviter boucle si déjà ouverte dans le bon mode
    if(String(window.currentId) === String(cardId)){
      const isFs = document.body.classList.contains('focus-mode');
      if(isFs === wantFullscreen) return;
    }
    setTimeout(() => {
      if(typeof window.openDetail === 'function'){
        window.openDetail(cardId);
        if(wantFullscreen && !document.body.classList.contains('focus-mode')){
          setTimeout(() => {
            if(typeof window.toggleFullscreen === 'function') window.toggleFullscreen();
          }, 100);
        }
      }
    }, 50);
  }

  // ── HOOK sur openDetail : drawer par défaut, render colonne focus si déjà en plein écran ──
  const originalOpenDetail = window.openDetail;
  window.openDetail = function(id){
    if(originalOpenDetail) originalOpenDetail(id);
    const c = window.cards?.find(x => String(x.id) === String(id));
    if(c && document.body.classList.contains('focus-mode')){
      if(c.col !== focusColumnId){
        focusColumnId = c.col;
        renderFocusColumn(c.col);
      }
      setTimeout(() => enrichFicheWithActions(c), 100);
    }
    syncHashFromState();
  };

  // ── TOGGLE FULLSCREEN : bascule drawer ↔ mode focus plein écran ──
  window.toggleFullscreen = function(){
    const isFocus = document.body.classList.toggle('focus-mode');
    if(isFocus && window.currentId){
      const c = window.cards?.find(x => String(x.id) === String(window.currentId));
      if(c){
        if(c.col !== focusColumnId){
          focusColumnId = c.col;
          renderFocusColumn(c.col);
        }
        setTimeout(() => enrichFicheWithActions(c), 100);
      }
    }
    syncHashFromState();
  };

  // ── HOOK sur closeDetail : ferme aussi le mode focus ──
  const originalCloseDetail = window.closeDetail;
  window.closeDetail = function(){
    if(originalCloseDetail) originalCloseDetail();
    focusMode = false;
    focusColumnId = null;
    document.body.classList.remove('focus-mode');
    if(window.location.hash.indexOf('#/card/') === 0){
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  };

  // ── MODE IFRAME (?fiche=ID) : ouvre directement la fiche en plein écran ──
  function bootstrapFicheEmbed(){
    var p = new URLSearchParams(window.location.search);
    var ficheId = p.get('fiche');
    if(!ficheId) return;
    window.MUP_FICHE_EMBED = true;
    var embedMode = p.get('embed') || 'overlay';
    var s = document.createElement('style');

    if(embedMode === 'panel'){
      s.textContent = ''
        + 'aside#sidebar,aside#sidebar.sidebar,#sidebar,.sidebar,.topbar,.kanban-wrap,.kanban-toolbar{display:none!important;width:0!important;visibility:hidden!important}'
        + 'html,body{background:transparent!important;overflow:hidden!important;margin:0!important;padding:0!important;width:100%!important;height:100%!important}'
        + 'main,.main,.kanban-shell,.app,.layout{display:block!important;padding:0!important;margin:0!important;width:100%!important;height:100%!important}'
        + '.detail-overlay{display:none!important}'
        + '.detail-panel{position:static!important;width:100%!important;max-width:none!important;height:100vh!important;transform:none!important;box-shadow:none!important;border-left:none!important;left:auto!important;right:auto!important;margin:0!important;display:flex!important;flex-direction:column!important}'
        + '.detail-panel .detail-body{flex:1;overflow-y:auto}';
    } else {
      s.textContent = ''
        + 'aside#sidebar,aside#sidebar.sidebar,#sidebar,.sidebar,.topbar,.kanban-wrap,.kanban-toolbar{display:none!important}'
        + 'body{background:transparent;overflow:hidden;margin:0;padding:0}'
        + 'main,.main,.kanban-shell{display:block!important}'
        + '.detail-overlay{background:rgba(0,0,0,0)!important;display:block!important}'
        + '.detail-panel{box-shadow:none!important;width:100%!important;max-width:780px;left:0!important;right:0!important;margin:0 auto;border-left:none!important}';
    }
    document.head.appendChild(s);
    // Fallback : si l'ID existe dans mup_contacts mais pas mup_pipeline, le créer
    function ensureCardExists(id){
      if(!Array.isArray(window.cards)) return;
      var found = window.cards.find(function(x){ return String(x.id) === String(id); });
      if(found) return;
      var contacts = [];
      try { contacts = JSON.parse(localStorage.getItem('mup_contacts') || '[]'); } catch(e){}
      var ct = contacts.find(function(x){ return String(x.id) === String(id); });
      if(!ct) return;
      var newCard = {
        id: String(ct.id),
        name: ct.contact || ct.nom || ct.name || '',
        co: ct.company || ct.societe || ct.nom || '',
        email: ct.email || '',
        tel: ct.tel || ct.telephone || ct.phone || '',
        address: ct.adresse || ct.address || '',
        linkedin: ct.linkedin || '',
        facebook: ct.facebook || '',
        instagram: ct.instagram || '',
        col: ct.col || 'leads',
        val: 0,
        days: 0,
        src: ct.source || 'contacts',
        activity: ct.activity || [],
        noteEntries: ct.noteEntries || [],
        rdvs: ct.rdvs || []
      };
      window.cards.push(newCard);
      try { localStorage.setItem('mup_pipeline', JSON.stringify(window.cards)); } catch(e){}
    }
    function tryOpen(retry){
      if(typeof window.openDetail === 'function'){
        ensureCardExists(ficheId);
        window.openDetail(ficheId);
        // Mode panel : forcer .open immédiatement (sans animation)
        if(embedMode === 'panel'){
          setTimeout(function(){
            var panel = document.getElementById('detail-panel');
            if(panel && !panel.classList.contains('open')){
              panel.classList.add('open');
            }
            var ovl = document.getElementById('detail-overlay');
            if(ovl) ovl.classList.remove('open');
          }, 50);
        }
        // Si la fiche n'a pas trouvé de carte, signaler pour fermer le wrap côté parent
        setTimeout(function(){
          var panel = document.getElementById('detail-panel');
          if(!panel || !panel.classList.contains('open')){
            try { window.parent.postMessage({ type:'mup-fiche-not-found', id: ficheId }, '*'); } catch(e){}
          }
        }, 60);
      } else if(retry < 30){
        setTimeout(function(){ tryOpen(retry+1); }, 50);
      }
    }
    tryOpen(0);
  }

  // ── INIT après chargement DOM ──
  function init(){
    injectFocusWrap();
    injectNextActionBlock();
    bootstrapFicheEmbed();

    // Raccourci clavier : F pour toggle focus
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape' && focusMode){
        exitFocusMode();
      }
    });

    // Restauration de la fiche depuis l'URL hash
    restoreFromHash();
    window.addEventListener('hashchange', function(){
      const hash = window.location.hash || '';
      if(!hash || hash === '#'){
        if(typeof window.closeDetail === 'function') window.closeDetail();
      } else {
        restoreFromHash();
      }
    });
  }

  // Attendre que le DOM ET les variables globales soient prêtes
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
<script src="/sidebar.js"></script>
</body>
