<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUP — Carte</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;--surface:#F5F5F7;--surface2:#EBEBF0;
  --card:#FFFFFF;--border:#E8E8ED;--border2:#C7C7CC;
  --text:#1D1D1F;--muted:#6E6E73;--muted2:#AEAEB2;
  --green:#1D8348;--orange:#B84C00;--red:#CC0000;
  --blue:#0A66C2;--purple:#4338CA;
  --font:'Geist',-apple-system,'Helvetica Neue',sans-serif;
  --mono:'Geist Mono','SF Mono','Menlo',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);font-size:14px;color:var(--text);-webkit-font-smoothing:antialiased;display:flex}

/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0;height:100vh;overflow-y:auto}
.sb-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:10px 8px 5px;margin-top:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:12.5px;font-weight:500;color:var(--muted);transition:all .12s;text-decoration:none;cursor:pointer}
.sb-item:hover{color:var(--text);background:var(--surface2)}
.sb-item.active{color:var(--text);background:var(--card);font-weight:600;border:1px solid var(--border)}
.sb-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:9px;font-weight:800;font-family:var(--mono);background:var(--text);color:#fff;border-radius:6px;padding:1px 6px}

/* SHELL */
.shell{flex:1;position:relative;height:100vh;overflow:hidden;transition:margin-right .25s ease}
.shell.tour-open{margin-right:280px}
#map{width:100%;height:100%}

/* LEAFLET OVERRIDES */
.leaflet-container{font-family:var(--font)!important}
.leaflet-tile-pane{filter:grayscale(100%) contrast(1.1)}
.leaflet-popup-content-wrapper{border-radius:12px!important;border:1px solid var(--border)!important;box-shadow:0 10px 28px rgba(0,0,0,.12)!important;padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-tip-container{display:none!important}

/* POPUP CARD */
.pop{padding:12px 14px;width:220px;font-family:var(--font)}
.pop-bar{height:3px;border-radius:10px 10px 0 0;margin:-12px -14px 10px}
.pop-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:1px}
.pop-co{font-size:11.5px;color:var(--muted);margin-bottom:6px}
.pop-foot{display:flex;align-items:center;justify-content:space-between}
.pop-val{font-size:12px;font-weight:800;font-family:var(--mono);color:var(--text)}
.pop-days{font-size:10px;font-weight:600;color:var(--muted2);background:var(--surface);border-radius:4px;padding:2px 6px}
.pop-stage{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;margin-top:6px}
.pop-progress{display:flex;align-items:center;gap:2px;margin-top:8px}
.pop-actions{display:flex;gap:6px;margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
.pop-btn{flex:1;padding:5px 0;border-radius:7px;border:1px solid var(--border);background:var(--card);font-family:var(--font);font-size:10px;font-weight:600;cursor:pointer;color:var(--text);text-align:center;transition:all .12s}
.pop-btn:hover{border-color:var(--text);background:var(--surface)}
.pop-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

/* USER LOCATION PULSE */
@keyframes pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(3);opacity:0}}
.user-dot{width:16px;height:16px;border-radius:50%;background:#2563eb;border:3px solid #fff;box-shadow:0 2px 8px rgba(37,99,235,.4);position:relative}
.user-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;background:#2563eb;animation:pulse 2s ease-out infinite;opacity:.4}

/* TOUR PANEL */
.tour-panel{position:fixed;right:0;top:0;bottom:0;width:280px;z-index:800;background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;overflow:hidden}
.tour-panel.open{transform:translateX(0)}
.tour-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tour-title{font-size:13px;font-weight:700;color:var(--text)}
.tour-count{font-size:10px;font-weight:800;font-family:var(--mono);color:var(--muted2);background:var(--surface);border-radius:5px;padding:2px 7px}
.tour-body{flex:1;overflow-y:auto;padding:8px}
.tour-body::-webkit-scrollbar{width:3px}
.tour-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tour-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;border:1px solid var(--border);margin-bottom:6px;background:var(--surface)}
.tour-num{width:22px;height:22px;border-radius:7px;background:var(--text);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tour-info{flex:1;min-width:0}
.tour-info-name{font-size:11.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tour-info-dist{font-size:10px;color:var(--muted);font-family:var(--mono)}
.tour-remove{width:20px;height:20px;border-radius:6px;border:none;background:none;cursor:pointer;color:var(--muted2);display:flex;align-items:center;justify-content:center;transition:color .12s;flex-shrink:0}
.tour-remove:hover{color:var(--red)}
.tour-footer{padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0}
.tour-clear{width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .12s}
.tour-clear:hover{border-color:var(--red);color:var(--red)}

/* MAP CONTROLS */
.map-toolbar{position:absolute;top:12px;right:12px;z-index:800;display:flex;gap:6px}
.map-btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.95);backdrop-filter:blur(10px);font-family:var(--font);font-size:11.5px;font-weight:600;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:6px;transition:all .12s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.map-btn:hover{border-color:var(--text)}
.map-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

/* SCHEDULE ITEMS */
.sched-item{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;border-radius:9px;border:1px solid var(--border);margin-bottom:5px;background:var(--surface);transition:opacity .2s}
.sched-item.excluded{opacity:.35;background:var(--surface2)}
.sched-time{font-size:11px;font-weight:800;font-family:var(--mono);color:var(--text);min-width:38px;flex-shrink:0;line-height:1.4}
.sched-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sched-info{flex:1;min-width:0}
.sched-name{font-size:11.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-meta{font-size:10px;color:var(--muted);font-family:var(--mono)}
.sched-tel{font-size:10px;color:var(--muted2);margin-top:1px}
.sched-tel a{color:var(--blue);text-decoration:none}
.sched-tel a:hover{text-decoration:underline}
.sched-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.sched-summary{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;flex-shrink:0}
.sched-summary strong{color:var(--text);font-family:var(--mono)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:600;z-index:9000;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* TOUR INPUT BAR */
.tour-input-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:800;display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:6px 8px;box-shadow:0 4px 20px rgba(0,0,0,.12);width:420px;max-width:calc(100% - 260px)}
.tour-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--font);font-size:12px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
.tour-input:focus{border-color:var(--text);background:var(--card)}
.tour-calc-btn{padding:8px 16px;border-radius:8px;border:none;background:var(--text);color:#fff;font-family:var(--font);font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .12s}
.tour-calc-btn:hover{background:#000}

/* ROUTE LINE */
.route-line{stroke:var(--text);stroke-width:3;stroke-dasharray:8 6;fill:none}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<div class="shell">
  <div id="map"></div>

  <div class="map-toolbar">
    <button class="map-btn" id="btn-locate" onclick="locateUser()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      Ma position
      <span id="locate-dot" style="display:none;width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s ease-out infinite;flex-shrink:0"></span>
    </button>
    <button class="map-btn" id="btn-tour" onclick="toggleTourPanel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      RDV <span id="tour-badge" style="display:none;font-size:9px;font-weight:800;background:#fff;color:var(--text);border-radius:4px;padding:1px 5px;margin-left:2px">0</span>
    </button>
  </div>

  <div class="tour-panel" id="tour-panel">
    <div class="tour-hdr">
      <span class="tour-title">RDV</span>
      <span class="tour-count" id="tour-count">0 fiches</span>
    </div>
    <div id="tour-controls" style="display:none;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)">Départ</span>
        <input type="time" id="tour-depart-time" value="09:00" style="margin-left:auto;border:1.5px solid var(--border);border-radius:7px;padding:4px 8px;font-family:var(--font);font-size:11px;color:var(--text);background:var(--surface);outline:none;width:80px" onchange="recalcSchedule()">
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)">Durée visite</span>
        <span id="visit-dur-label" style="margin-left:auto;font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text)">45 min</span>
      </div>
      <input type="range" id="visit-dur" min="15" max="480" step="15" value="45" oninput="updateDurLabel();recalcSchedule()" style="width:100%;margin-top:4px;accent-color:var(--text)">
    </div>
    <div class="tour-body" id="tour-body"></div>
    <div class="tour-footer">
      <button class="tour-clear" onclick="clearTour()">Effacer</button>
    </div>
  </div>

  <div class="tour-input-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <input class="tour-input" id="tour-start-addr" placeholder="Adresse de départ (ex: Rennes, 35)" onkeydown="if(event.key==='Enter')calcTour()">
    <button class="tour-calc-btn" onclick="calcTour()">Calculer la tournée</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var OSRM='https://router.project-osrm.org';

var STAGES=[
  {id:'prospects',name:'Prospects',color:'#CC0000'},
  {id:'linkedin',name:'LinkedIn',color:'#0A66C2'},
  {id:'mailing',name:'Mailing',color:'#B84C00'},
  {id:'phoning',name:'Phoning',color:'#4338CA'},
  {id:'visio',name:'Visio',color:'#7C3AED'},
  {id:'rdv',name:'RDV',color:'#0BBCD4'},
  {id:'devis',name:'Devis',color:'#F59E0B'},
  {id:'nego',name:'Négociation',color:'#EA580C'},
  {id:'won',name:'Gagné',color:'#1D8348'},
  {id:'lost',name:'Disqualifié',color:'#AEAEB2'}
];
function stageIdx(col){for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===col)return i;}return -1;}
function stageColor(col){var s=STAGES.find(function(x){return x.id===col;});return s?s.color:'#AEAEB2';}
function stageName(col){var s=STAGES.find(function(x){return x.id===col;});return s?s.name:col;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function formatRdvDate(dateStr, timeStr) {
  if(!dateStr) return '';
  var JOURS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  var MOIS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  var parts=dateStr.split('-');
  var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var jour=JOURS[d.getDay()];
  var num=d.getDate();
  var mois=MOIS[d.getMonth()];
  var result=jour+' '+num+' '+mois;
  if(timeStr) result+=' · '+timeStr.replace(':','h');
  return result;
}

function progressHtml(col){
  var cur=stageIdx(col);if(cur<0)return '';
  var h='<div class="pop-progress">';
  for(var i=0;i<9;i++){
    var done=i<cur,isCur=i===cur;
    var op=done||isCur?'1':'.2';
    var bg=done||isCur?STAGES[i].color:'#C7C7CC';
    var shadow=isCur?';box-shadow:0 0 0 2px #fff,0 0 0 3px '+STAGES[i].color:'';
    h+='<div style="width:7px;height:7px;border-radius:50%;background:'+bg+';opacity:'+op+shadow+'" title="'+STAGES[i].name+'"></div>';
    if(i<8)h+='<div style="flex:1;height:1px;background:'+(done?'#C7C7CC':'#E8E8ED')+'"></div>';
  }
  return h+'</div>';
}

// State
var map=L.map('map',{center:[46.5,2.5],zoom:5,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,opacity:0.85}).addTo(map);
L.control.attribution({prefix:'© OpenStreetMap'}).addTo(map);

var cards=[];
try{var r=localStorage.getItem('mup_pipeline');if(r)cards=JSON.parse(r);}catch(e){}

var markers={}; // id -> {marker, card, latlng}
var rdvPanelIds=[]; // ids shown in RDV panel
var userLatLng=null;
var watchId=null;
var userMarker=null;
var proximityCircles=[]; // array of L.circle
var dimmedMarkers=[]; // markers set to low opacity

function resetOverlays(){
  proximityCircles.forEach(function(c){map.removeLayer(c);});
  proximityCircles=[];
  dimmedMarkers.forEach(function(m){m.setOpacity(1);});
  dimmedMarkers=[];
}

// Click on map background → reset
map.on('click',function(){
  resetOverlays();
});

// Geocode & place all cards
var withAddr=cards.filter(function(c){return c.address;});
var addrMap={};
withAddr.forEach(function(c){
  if(!addrMap[c.address])addrMap[c.address]=[];
  addrMap[c.address].push(c);
});

var bounds=[];
var pending=Object.keys(addrMap).length;
if(!pending) pending=-1;

Object.keys(addrMap).forEach(function(addr){
  fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(addr)+'&limit=1')
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.length){
        var lat=parseFloat(data[0].lat),lng=parseFloat(data[0].lon);
        bounds.push([lat,lng]);
        addrMap[addr].forEach(function(c,idx){
          var jitter=addrMap[addr].length>1?(idx-addrMap[addr].length/2)*0.0004:0;
          var clat=lat+jitter,clng=lng+jitter;
          var col=stageColor(c.col);
          var isRdv=!!c.rdvDate;
          var sz=isRdv?28:20;
          var bw=isRdv?4:3;
          var icon=L.divIcon({
            className:'',
            html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';border:'+bw+'px solid rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.35);transition:transform .15s"></div>',
            iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
          });
          var val=c.val>=1000?Math.round(c.val/1000)+'k\u20AC':(c.val?c.val+'\u20AC':'\u2014');
          var popup='<div class="pop">'
            +'<div class="pop-bar" style="background:'+col+'"></div>'
            +'<div class="pop-name">'+esc(c.co||c.name)+'</div>'
            +'<div class="pop-co">'+esc(c.co&&c.name?c.name:'')+'</div>'
            +'<div class="pop-foot"><span class="pop-val">'+val+'</span><span class="pop-days">J+'+(c.days||0)+'</span></div>'
            +'<div class="pop-stage" style="background:'+col+'22;color:'+col+'">'+stageName(c.col)+'</div>'
            +progressHtml(c.col)
            +(c.rdvDate?'<div style="font-size:11px;color:var(--text);margin-top:8px;padding:6px 8px;background:var(--surface);border-radius:6px;font-weight:600"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0BBCD4" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:4px"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>'+formatRdvDate(c.rdvDate,c.rdvTime)+'</div>':'')
            +'<div class="pop-actions">'
            +'<button class="pop-btn" onclick="showProximity(\''+c.id+'\')">Proximité</button>'
            +'</div>'
            +'</div>';
          var m=L.marker([clat,clng],{icon:icon,zIndexOffset:isRdv?500:0}).addTo(map).bindPopup(popup,{maxWidth:240,closeButton:false,offset:[0,-10]});
          markers[String(c.id)]={marker:m,card:c,latlng:[clat,clng]};
        });
      }
      pending--;
      if(pending<=0){
        if(bounds.length) map.fitBounds(bounds,{padding:[40,40],maxZoom:12});
        // Auto-show RDV cards with proximity
        autoShowRdv();
      }
    })
    .catch(function(){
      pending--;
      if(pending<=0&&bounds.length){
        map.fitBounds(bounds,{padding:[40,40],maxZoom:12});
        autoShowRdv();
      }
    });
});

// Auto-detect RDV cards and show their proximity + panel
function autoShowRdv(){
  var rdvCards=[];
  Object.keys(markers).forEach(function(id){
    var m=markers[id];
    if(m.card.rdvDate) rdvCards.push(m);
  });
  if(!rdvCards.length) return;

  rdvPanelIds=[];

  // Draw 30km circle for each RDV card and collect nearby prospects
  rdvCards.forEach(function(rdv){
    var circle=L.circle(rdv.latlng,{radius:30000,color:'#0BBCD4',fillOpacity:0.05,weight:2,dashArray:'6 4'}).addTo(map);
    proximityCircles.push(circle);

    // Find all non-RDV cards in radius
    Object.keys(markers).forEach(function(mid){
      var m=markers[mid];
      if(m.card.rdvDate) return;
      var dist=map.distance(L.latLng(rdv.latlng),L.latLng(m.latlng));
      if(dist<=30000&&rdvPanelIds.indexOf(mid)===-1){
        rdvPanelIds.push(mid);
      }
    });
  });

  // Add RDV cards themselves to panel
  rdvCards.forEach(function(rdv){
    var id=String(rdv.card.id);
    if(rdvPanelIds.indexOf(id)===-1) rdvPanelIds.unshift(id);
    else{
      var idx=rdvPanelIds.indexOf(id);
      rdvPanelIds.splice(idx,1);
      rdvPanelIds.unshift(id);
    }
  });

  renderPanel();

  // Open panel automatically
  if(rdvPanelIds.length&&!document.getElementById('tour-panel').classList.contains('open')){
    toggleTourPanel();
  }
}

// Geolocation
function locateUser(){
  if(!navigator.geolocation) return;
  if(watchId!==null){
    navigator.geolocation.clearWatch(watchId);
    watchId=null;
    document.getElementById('btn-locate').classList.remove('active');
    document.getElementById('locate-dot').style.display='none';
    return;
  }
  watchId=navigator.geolocation.watchPosition(function(pos){
    userLatLng=[pos.coords.latitude,pos.coords.longitude];
    if(userMarker) map.removeLayer(userMarker);
    var icon=L.divIcon({className:'',html:'<div class="user-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]});
    userMarker=L.marker(userLatLng,{icon:icon,zIndexOffset:1000}).addTo(map);
    map.setView(userLatLng,11);
    renderPanel();
  },function(){
    watchId=null;
    document.getElementById('btn-locate').classList.remove('active');
    document.getElementById('locate-dot').style.display='none';
  },{enableHighAccuracy:false,maximumAge:10000});
  document.getElementById('btn-locate').classList.add('active');
  document.getElementById('locate-dot').style.display='inline-block';
}

// Proximity for a single card
function showProximity(id){
  resetOverlays();
  var info=markers[String(id)];
  if(!info) return;
  var center=info.latlng;
  var circle=L.circle(center,{radius:30000,color:stageColor(info.card.col),fillOpacity:0.06,weight:2,dashArray:'6 4'}).addTo(map);
  proximityCircles.push(circle);

  // Dim those outside radius
  Object.keys(markers).forEach(function(mid){
    var m=markers[mid];
    var dist=map.distance(L.latLng(center),L.latLng(m.latlng));
    if(dist>30000&&mid!==String(id)){
      m.marker.setOpacity(0.25);
      dimmedMarkers.push(m.marker);
    }
  });
  map.fitBounds(circle.getBounds(),{padding:[30,30]});
}

// Panel rendering
function renderPanel(){
  var body=document.getElementById('tour-body');
  var badge=document.getElementById('tour-badge');
  var count=document.getElementById('tour-count');
  badge.style.display=rdvPanelIds.length?'inline':'none';
  badge.textContent=rdvPanelIds.length;
  count.textContent=rdvPanelIds.length+' fiche'+(rdvPanelIds.length>1?'s':'');
  var btnTour=document.getElementById('btn-tour');
  btnTour.classList.toggle('active',rdvPanelIds.length>0);

  if(!rdvPanelIds.length){
    body.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted2);font-size:12px">Aucun RDV dans le pipeline</div>';
    return;
  }

  var items=rdvPanelIds.map(function(id){
    var info=markers[id];
    if(!info) return null;
    var dist=null;
    if(userLatLng) dist=map.distance(L.latLng(userLatLng),L.latLng(info.latlng));
    return{id:id,card:info.card,dist:dist,latlng:info.latlng,isRdv:info.card.col==='rdv'};
  }).filter(Boolean);

  if(userLatLng) items.sort(function(a,b){return(a.dist||0)-(b.dist||0);});

  body.innerHTML=items.map(function(it,i){
    var distStr=it.dist!==null?(it.dist>=1000?Math.round(it.dist/1000)+' km':Math.round(it.dist)+' m'):'';
    var col=stageColor(it.card.col);
    var label=it.isRdv?'RDV':'Prospect';
    return '<div class="tour-item" style="cursor:pointer;'+(it.isRdv?'border-color:#0BBCD4;background:rgba(11,188,212,.04)':'')+'" onclick="flyTo(\''+it.id+'\')">'
      +'<div class="tour-num" style="background:'+col+'">'+(i+1)+'</div>'
      +'<div class="tour-info">'
      +'<div class="tour-info-name">'+esc(it.card.co||it.card.name)+'</div>'
      +'<div class="tour-info-dist">'+label+(distStr?' · '+distStr:'')+'</div>'
      +'</div>'
      +'</div>';
  }).join('');
}

function flyTo(id){
  var info=markers[String(id)];
  if(!info) return;
  map.setView(info.latlng,13);
  info.marker.openPopup();
}

function toggleTourPanel(){
  var panel=document.getElementById('tour-panel');
  var shell=document.querySelector('.shell');
  var isOpen=panel.classList.contains('open');
  panel.classList.toggle('open');
  shell.classList.toggle('tour-open');
  // If closing, reset overlays
  if(isOpen){
    resetOverlays();
  }
  setTimeout(function(){map.invalidateSize();},300);
}

function clearTour(){
  rdvPanelIds=[];
  resetOverlays();
  renderPanel();
}

renderPanel();

// ── TOAST ──
var toastTimer=null;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove('show');},2500);
}

// ── TOUR PLANNER ──
var startMarker=null;
var startLatLng=null;
var anchorCard=null;
var routeLine=null;
var tourStops=[]; // ordered array of {id, card, latlng}

function calcTour(){
  var addr=document.getElementById('tour-start-addr').value.trim();
  if(!addr){toast('Saisir une adresse de départ');return;}

  // 1. Geocode start address
  fetch('https://api-adresse.data.gouv.fr/search/?q='+encodeURIComponent(addr)+'&limit=1')
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.features||!data.features.length){toast('Adresse introuvable');return;}
      var coords=data.features[0].geometry.coordinates;
      startLatLng=[coords[1],coords[0]]; // lat,lng

      // Place start marker
      if(startMarker)map.removeLayer(startMarker);
      var icon=L.divIcon({
        className:'',
        html:'<div style="width:24px;height:24px;border-radius:8px;background:#1D1D1F;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>',
        iconSize:[24,24],iconAnchor:[12,12]
      });
      startMarker=L.marker(startLatLng,{icon:icon,zIndexOffset:2000}).addTo(map);

      // 2. Find RDV anchor
      anchorCard=null;
      var allCards=[];
      try{var r2=localStorage.getItem('mup_pipeline');if(r2)allCards=JSON.parse(r2);}catch(e){}
      for(var i=0;i<allCards.length;i++){
        if(allCards[i].rdvDate&&allCards[i].col!=='lost'){
          var mid=String(allCards[i].id);
          if(markers[mid]){
            anchorCard={card:allCards[i],latlng:markers[mid].latlng,id:mid};
            break;
          }
        }
      }
      if(!anchorCard){toast('Aucun RDV dans le pipeline');return;}

      // 3. Collect intermediate stops (non-RDV cards with address, within proximity)
      var stops=[];
      Object.keys(markers).forEach(function(mid){
        if(mid===anchorCard.id)return;
        var m=markers[mid];
        if(!m.card.address)return;
        // Within 60km of either start or anchor
        var distStart=map.distance(L.latLng(startLatLng),L.latLng(m.latlng));
        var distAnchor=map.distance(L.latLng(anchorCard.latlng),L.latLng(m.latlng));
        if(distStart<=60000||distAnchor<=60000){
          stops.push({id:mid,card:m.card,latlng:m.latlng});
        }
      });

      // 4. Build waypoints: start -> stops (nearest neighbor) -> anchor
      var ordered=[];
      var remaining=stops.slice();
      var current=startLatLng;
      while(remaining.length){
        var best=-1,bestDist=Infinity;
        for(var j=0;j<remaining.length;j++){
          var d=map.distance(L.latLng(current),L.latLng(remaining[j].latlng));
          if(d<bestDist){bestDist=d;best=j;}
        }
        ordered.push(remaining[best]);
        current=remaining[best].latlng;
        remaining.splice(best,1);
      }

      tourStops=ordered;

      // 5. Build OSRM route
      var waypoints=[startLatLng[1]+','+startLatLng[0]]; // lng,lat for OSRM
      ordered.forEach(function(s){waypoints.push(s.latlng[1]+','+s.latlng[0]);});
      waypoints.push(anchorCard.latlng[1]+','+anchorCard.latlng[0]);

      fetch(OSRM+'/route/v1/driving/'+waypoints.join(';')+'?overview=full&geometries=geojson&steps=false&annotations=distance,duration')
        .then(function(r){return r.json();})
        .then(function(route){
          if(!route.routes||!route.routes.length){toast('Impossible de calculer l\'itinéraire');return;}
          if(routeLine)map.removeLayer(routeLine);
          var geojson=route.routes[0].geometry;
          routeLine=L.geoJSON(geojson,{style:{color:'#1D1D1F',weight:3,dashArray:'8 6',opacity:0.7}}).addTo(map);

          // Store leg data
          tourLegs=route.routes[0].legs||[];
          var totalDist=route.routes[0].distance;
          var totalTime=route.routes[0].duration;

          // Show controls & render
          document.getElementById('tour-controls').style.display='';
          renderSchedule();

          if(!document.getElementById('tour-panel').classList.contains('open')){
            toggleTourPanel();
          }
          map.fitBounds(routeLine.getBounds(),{padding:[60,60]});
          toast('Tournée calculée — '+Math.round(totalDist/1000)+' km · '+Math.round(totalTime/60)+' min');
        })
        .catch(function(){toast('Erreur de calcul itinéraire');});
    })
    .catch(function(){toast('Erreur de géocodage');});
}

var tourLegs=[];

function updateDurLabel(){
  var v=parseInt(document.getElementById('visit-dur').value);
  var label=v>=60?(Math.floor(v/60)+'h'+(v%60?(' '+String(v%60).padStart(2,'0')):'')):v+' min';
  document.getElementById('visit-dur-label').textContent=label;
}

function fmtTime(mins){
  var h=Math.floor(mins/60)%24;
  var m=Math.round(mins%60);
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function fmtDist(m){return m>=1000?Math.round(m/1000)+' km':Math.round(m)+' m';}

function recalcSchedule(){renderSchedule();}

function renderSchedule(){
  if(!anchorCard||!startLatLng){return;}
  var body=document.getElementById('tour-body');
  var badge=document.getElementById('tour-badge');
  var count=document.getElementById('tour-count');
  var btnTour=document.getElementById('btn-tour');

  var visitMin=parseInt(document.getElementById('visit-dur').value)||45;
  var departParts=(document.getElementById('tour-depart-time').value||'09:00').split(':');
  var currentMins=parseInt(departParts[0])*60+parseInt(departParts[1]);

  // RDV anchor deadline
  var anchorDeadline=Infinity;
  if(anchorCard.card.rdvTime){
    var ap=anchorCard.card.rdvTime.split(':');
    anchorDeadline=parseInt(ap[0])*60+parseInt(ap[1]);
  }

  var totalDist=0;
  var html='';

  // Départ
  html+='<div class="sched-item" style="border-color:#1D1D1F;background:rgba(29,29,31,.04)">'
    +'<div class="sched-time">'+fmtTime(currentMins)+'</div>'
    +'<div class="sched-dot" style="background:#1D1D1F"></div>'
    +'<div class="sched-info"><div class="sched-name">Départ</div>'
    +'<div class="sched-meta">'+esc(document.getElementById('tour-start-addr').value)+'</div></div></div>';

  var included=[];
  var excluded=[];

  // Each stop
  tourStops.forEach(function(s,i){
    var legIdx=i; // leg 0 = start->stop0, leg 1 = stop0->stop1, etc.
    var legDist=tourLegs[legIdx]?tourLegs[legIdx].distance:0;
    var legTime=tourLegs[legIdx]?tourLegs[legIdx].duration/60:0;

    var arrivalMins=currentMins+legTime;
    var departureMins=arrivalMins+visitMin;

    // Check: can we still reach anchor on time after this visit?
    var lastLegIdx=i+1; // leg from this stop to next (or anchor)
    var remainingLegs=0;
    for(var k=lastLegIdx;k<tourLegs.length;k++) remainingLegs+=tourLegs[k]?tourLegs[k].duration/60:0;
    // Time needed for remaining visits
    var remainingVisits=(tourStops.length-i-1)*visitMin;
    var estAnchorArrival=departureMins+remainingLegs+remainingVisits;

    var tooLate=anchorDeadline!==Infinity&&estAnchorArrival>anchorDeadline;

    if(tooLate){
      excluded.push(s);
      // Dim marker on map
      if(markers[s.id])markers[s.id].marker.setOpacity(0.2);
    } else {
      included.push(s);
      totalDist+=legDist;
      var col=stageColor(s.card.col);
      var tel=s.card.tel||'';
      html+='<div class="sched-item" style="cursor:pointer" onclick="flyTo(\''+s.id+'\')">'
        +'<div class="sched-time">'+fmtTime(arrivalMins)+'</div>'
        +'<div class="sched-dot" style="background:'+col+'"></div>'
        +'<div class="sched-info"><div class="sched-name">'+esc(s.card.co||s.card.name)+'</div>'
        +'<div class="sched-meta">'+fmtDist(legDist)+' · '+Math.round(legTime)+' min</div>'
        +(tel?'<div class="sched-tel"><a href="tel:'+esc(tel.replace(/\s/g,''))+'">'+esc(tel)+'</a></div>':'')
        +'</div>'
        +'<div class="sched-badge" style="background:'+col+'22;color:'+col+'">'+stageName(s.card.col)+'</div>'
        +'</div>';
      currentMins=departureMins;
    }
  });

  // Excluded stops (grayed)
  excluded.forEach(function(s){
    var col=stageColor(s.card.col);
    html+='<div class="sched-item excluded">'
      +'<div class="sched-time" style="color:var(--muted2)">—</div>'
      +'<div class="sched-dot" style="background:var(--border2)"></div>'
      +'<div class="sched-info"><div class="sched-name" style="color:var(--muted2)">'+esc(s.card.co||s.card.name)+'</div>'
      +'<div class="sched-meta">Exclu (retard RDV)</div></div></div>';
  });

  // Anchor (RDV)
  var anchorLeg=tourLegs[tourLegs.length-1];
  var anchorDist=anchorLeg?anchorLeg.distance:0;
  var anchorTime=anchorLeg?anchorLeg.duration/60:0;
  var anchorArrival=currentMins+anchorTime;
  totalDist+=anchorDist;

  html+='<div class="sched-item" style="border-color:#0BBCD4;background:rgba(11,188,212,.06);cursor:pointer" onclick="flyTo(\''+anchorCard.id+'\')">'
    +'<div class="sched-time" style="color:#0BBCD4">'+fmtTime(anchorArrival)+'</div>'
    +'<div class="sched-dot" style="background:#0BBCD4"></div>'
    +'<div class="sched-info"><div class="sched-name">'+esc(anchorCard.card.co||anchorCard.card.name)+'</div>'
    +'<div class="sched-meta">'+fmtDist(anchorDist)+' · '+Math.round(anchorTime)+' min</div>'
    +'<div class="sched-meta" style="color:#0BBCD4;font-weight:600">RDV — '+formatRdvDate(anchorCard.card.rdvDate,anchorCard.card.rdvTime)+'</div>'
    +'</div>'
    +'<div class="sched-badge" style="background:rgba(11,188,212,.12);color:#0BBCD4">RDV</div>'
    +'</div>';

  body.innerHTML=html;

  // Summary
  var total=included.length+1;
  badge.style.display='inline';
  badge.textContent=total;
  var retourMins=anchorArrival+visitMin;
  count.textContent=total+' étape'+(total>1?'s':'');
  btnTour.classList.add('active');

  // Add summary bar
  var summaryEl=document.getElementById('tour-summary');
  if(!summaryEl){
    summaryEl=document.createElement('div');
    summaryEl.id='tour-summary';
    summaryEl.className='sched-summary';
    document.getElementById('tour-panel').insertBefore(summaryEl,document.querySelector('.tour-footer'));
  }
  summaryEl.innerHTML='<span><strong>'+Math.round(totalDist/1000)+' km</strong> total</span><span>Retour ~ <strong>'+fmtTime(retourMins)+'</strong></span>';
}
</script>
