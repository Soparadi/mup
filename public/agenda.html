<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovUP — Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;--surface:#F5F5F7;--surface2:#EBEBF0;
  --card:#FFFFFF;--border:#E8E8ED;--border2:#C7C7CC;
  --text:#1D1D1F;--muted:#6E6E73;--muted2:#AEAEB2;
  --green:#1D8348;--orange:#B84C00;--red:#CC0000;--blue:#0A66C2;
  /* Couleur d'action destructive (suppression) — réutilisable contact, devis, etc.
     #DC2626 = rouge sobre conforme WCAG AA sur fond blanc. */
  --mup-danger:#DC2626;
  --font:'Geist',-apple-system,'Helvetica Neue',sans-serif;
  --mono:'Geist Mono','SF Mono','Menlo',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);font-size:14px;color:var(--text);-webkit-font-smoothing:antialiased;display:flex}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0;height:100vh;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:12px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sb-logo-icon{width:28px;height:28px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-name{font-size:14px;font-weight:800;letter-spacing:-.3px}
.sb-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:10px 8px 5px;margin-top:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:12.5px;font-weight:500;color:var(--muted);transition:all .12s;text-decoration:none;cursor:pointer}
.sb-item:hover{color:var(--text);background:var(--surface2)}
.sb-item.active{color:var(--text);background:var(--card);font-weight:600;border:1px solid var(--border)}
.sb-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:9px;font-weight:800;font-family:var(--mono);background:var(--text);color:#fff;border-radius:6px;padding:1px 6px}

/* ── SHELL ── */
.shell{flex:1;display:grid;grid-template-columns:1fr 380px;height:100vh;overflow:hidden}

/* ── CALENDRIER ── */
.cal-col{display:flex;flex-direction:column;border-right:1px solid var(--border);height:100vh;overflow:hidden;background:var(--card);min-height:0}

.cal-hdr{background:var(--text);color:#fff;padding:20px 24px 18px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.cal-month{font-size:20px;font-weight:800;letter-spacing:-.4px}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav button:hover{background:rgba(255,255,255,.2)}
.cal-btn-today{padding:0 14px;font-family:var(--font);font-size:11.5px;font-weight:600;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;height:30px;transition:all .15s}
.cal-btn-today:hover{background:rgba(255,255,255,.22)}

.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.cal-day-lbl{padding:8px 0;text-align:center;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2)}

.cal-grid-wrap{flex:1;min-height:0;display:flex;flex-direction:column}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-height:0}

.cal-cell{min-height:88px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 8px;cursor:pointer;transition:background .1s;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--surface)}
.cal-cell.other-month .cal-date{color:var(--muted2)}
.cal-cell.today{background:var(--surface)}
.cal-cell.today .cal-date{width:24px;height:24px;background:var(--text);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-cell.selected{background:#EFF6FF}
.cal-date{font-size:12.5px;font-weight:600;color:var(--text);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.cal-events{display:flex;flex-direction:column;gap:2px}
.cal-evt{padding:2px 5px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-evt[draggable="true"]{cursor:grab}
.cal-evt[draggable="true"]:active{cursor:grabbing}
.evt-block[draggable="true"]{cursor:grab}
.evt-block[draggable="true"]:active{cursor:grabbing}
.cal-cell--drop-target{background:rgba(0,0,0,0.04)!important;outline:2px dashed var(--text);outline-offset:-2px}
.cal-evt.type-rdv{background:rgba(29,131,72,.10);color:#1D8348}
.cal-evt.type-visio{background:rgba(124,58,237,.10);color:#7C3AED}
.cal-evt.type-mail{background:rgba(184,76,0,.10);color:#B84C00}
.cal-evt.type-devis{background:rgba(10,102,194,.10);color:#0A66C2}
.cal-evt.type-appel{background:rgba(29,131,72,.1);color:#1D8348}
.cal-evt.type-perso{background:rgba(107,114,128,.1);color:#4B5563}
.cal-more{font-size:9.5px;color:var(--muted2);font-weight:600;padding:1px 4px}

/* ── COLONNE DROITE : vue jour ── */
.day-col{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg)}

.day-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)}
.day-hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.day-date-big{font-size:36px;font-weight:900;letter-spacing:-.8px;color:var(--text);line-height:1}
.day-name{font-size:11.5px;font-weight:500;color:var(--muted);margin-top:4px;text-transform:capitalize}
.day-weather{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--surface);flex-shrink:0}
.day-weather-ico{font-size:22px;line-height:1}
.day-weather-info{display:flex;flex-direction:column;gap:1px}
.day-weather-temp{font-size:18px;font-weight:800;letter-spacing:-.4px;color:var(--text);line-height:1}
.day-weather-desc{font-size:10.5px;color:var(--muted);font-weight:500}
.day-weather-loc{font-size:9.5px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.day-actions{display:flex;gap:6px;margin-top:12px}
.btn-add-evt{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:9px;border:none;background:var(--text);color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-add-evt:hover{background:#000}

/* Timeline */
.day-scroll{flex:1;overflow:hidden;display:flex;flex-direction:column}
.day-scroll::-webkit-scrollbar{width:3px}
.day-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.timeline{display:flex;flex-direction:column;flex:1}
.time-slot{display:flex;flex:1;border-bottom:1px solid var(--border);position:relative;min-height:44px}
.time-slot.current-hour{background:rgba(37,99,235,.02)}
.time-label{width:52px;padding:6px 8px 0;font-size:10.5px;font-weight:600;font-family:var(--mono);color:var(--muted2);flex-shrink:0;text-align:right;line-height:1}
.time-line{flex:1;padding:4px 10px 4px 14px;position:relative;border-left:1px solid var(--border)}
.current-time-line{position:absolute;left:0;right:0;height:2px;background:#2563eb;z-index:10}
.current-time-line::before{content:'';width:8px;height:8px;border-radius:50%;background:#2563eb;position:absolute;left:-4px;top:-3px}

/* Events dans la timeline */
.evt-block{padding:7px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;position:relative}
.evt-block:hover{transform:translateX(2px)}
.evt-block.type-rdv{background:rgba(29,131,72,.08);border-color:#1D8348}
.evt-block.type-visio{background:rgba(124,58,237,.08);border-color:#7C3AED}
.evt-block.type-mail{background:rgba(184,76,0,.08);border-color:#B84C00}
.evt-block.type-devis{background:rgba(10,102,194,.08);border-color:#0A66C2}
.evt-block.type-appel{background:rgba(29,131,72,.08);border-color:#1D8348}
.evt-block.type-perso{background:rgba(107,114,128,.08);border-color:#6B7280}
.evt-title{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:2px}
.evt-contact{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.evt-time-tag{font-size:10px;font-weight:600;font-family:var(--mono);color:var(--muted2);position:absolute;top:7px;right:10px}
.evt-empty{padding:20px 14px;text-align:center;color:var(--muted2);font-size:12.5px;font-style:italic}

/* Modal ajout événement */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-bar{height:4px;background:var(--text)}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-x{width:26px;height:26px;border-radius:7px;border:none;background:var(--surface2);cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.frow{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2)}
.finput{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);width:100%;outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--text);background:var(--card)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-pills{display:flex;gap:5px;flex-wrap:wrap}
.type-pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.type-pill.sel{border-color:var(--text);background:var(--text);color:#fff}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:space-between;align-items:center}
.modal-foot-left{display:flex;gap:8px}
.modal-foot-right{display:flex;gap:8px}
.btn-save{background:var(--text);color:#fff;border:none;border-radius:9px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-save:hover{background:#000}
.btn-can{background:var(--surface);color:var(--muted);border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}
/* Action destructive — rouge sobre, hover plus appuyé */
.btn-delete{background:#fff;color:var(--mup-danger);border:1.5px solid var(--mup-danger);border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-delete:hover{background:var(--mup-danger);color:#fff}
/* Mention discrète : événement lié à une fiche pipeline (édition normale) */
.modal-pipeline-info{background:rgba(67,56,202,.08);border:1px solid rgba(67,56,202,.2);border-radius:9px;padding:9px 12px;font-size:12px;color:#4338CA;line-height:1.4;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.modal-pipeline-info svg{flex-shrink:0}
.modal-pipeline-info strong{font-weight:700}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>

<body>

<aside class="sidebar" id="sidebar"></aside>

<!-- SHELL -->
<div class="shell">

  <!-- CALENDRIER MENSUEL -->
  <div class="cal-col">
    <div class="cal-hdr">
      <div class="cal-month" id="cal-month-title">Avril 2026</div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="cal-btn-today" onclick="goToday()">Aujourd'hui</button>
        <div class="cal-nav">
          <button onclick="prevMonth()">‹</button>
          <button onclick="nextMonth()">›</button>
        </div>
      </div>
    </div>
    <div class="cal-days-header">
      <div class="cal-day-lbl">Lu</div>
      <div class="cal-day-lbl">Ma</div>
      <div class="cal-day-lbl">Me</div>
      <div class="cal-day-lbl">Je</div>
      <div class="cal-day-lbl">Ve</div>
      <div class="cal-day-lbl">Sa</div>
      <div class="cal-day-lbl">Di</div>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- VUE JOUR -->
  <div class="day-col">
    <div class="day-hdr">
      <div class="day-hdr-top">
        <div>
          <div class="day-date-big" id="day-date-big">6</div>
          <div id="day-clock" style="font-size:22px;font-weight:700;font-family:var(--mono);color:var(--muted);letter-spacing:.5px;margin-top:2px;line-height:1"></div>
          <div class="day-name" id="day-name">Lundi 6 avril 2026</div>
        </div>
        <div class="day-weather" id="day-weather">
          <div class="day-weather-ico" id="weather-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 1 0-1.4-8.8 6 6 0 0 0-11.6 1.6 4 4 0 0 0 1 7.9z"/><path d="M12 2v2M4.93 4.93l1.41 1.41M2 12h2"/></svg></div>
          <div class="day-weather-info">
            <div class="day-weather-temp" id="weather-temp">—°</div>
            <div class="day-weather-desc" id="weather-desc">Chargement…</div>
            <div class="day-weather-loc">Combourg</div>
          </div>
        </div>
      </div>
      <div class="day-actions">
        <button class="btn-add-evt" onclick="openModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Ajouter un événement
        </button>
      </div>
    </div>
    <div class="day-scroll" id="day-scroll">
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title">Nouvel événement</div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <!-- Mention discrète : visible si l'event est lié à une fiche pipeline -->
      <div class="modal-pipeline-info" id="modal-pipeline-info" hidden>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span>Lié à la fiche <strong id="modal-pipeline-info-name"></strong></span>
      </div>
      <div class="frow">
        <div class="flabel">Titre</div>
        <select class="finput" id="m-pipeline-card" onchange="fillFromPipeline()"><option value="">-- Choisir une fiche pipeline --</option></select>
        <input class="finput" id="m-title" placeholder="Ou saisir un titre libre" style="margin-top:6px">
      </div>
      <div class="frow">
        <div class="flabel">Contact / Société</div>
        <input class="finput" id="m-contact" placeholder="Ex : Château Margaux">
      </div>
      <div class="frow">
        <div class="flabel">Date</div>
        <input class="finput" id="m-date" type="date">
      </div>
      <div class="f2">
        <div class="frow">
          <div class="flabel">Heure début</div>
          <input class="finput" id="m-start" type="time" value="09:00">
        </div>
        <div class="frow">
          <div class="flabel">Heure fin</div>
          <input class="finput" id="m-end" type="time" value="10:00">
        </div>
      </div>
      <div class="frow">
        <div class="flabel">Type</div>
        <div class="type-pills">
          <span class="type-pill sel" data-type="rdv" onclick="selType(this)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-1px;margin-right:4px"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>RDV</span>
          <span class="type-pill" data-type="visio" onclick="selType(this)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-1px;margin-right:4px"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>Visio</span>
          <span class="type-pill" data-type="appel" onclick="selType(this)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-1px;margin-right:4px"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72"/></svg>Appel</span>
          <span class="type-pill" data-type="devis" onclick="selType(this)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-1px;margin-right:4px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Devis</span>
          <span class="type-pill" data-type="perso" onclick="selType(this)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-1px;margin-right:4px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Perso</span>
        </div>
      </div>
      <div class="frow">
        <div class="flabel">Notes</div>
        <textarea class="finput" id="m-notes" rows="2" placeholder="Optionnel…" style="resize:none"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <div class="modal-foot-left">
        <button class="btn-delete" id="btn-delete" onclick="deleteEvent()" hidden>Supprimer</button>
        <button class="btn-can" id="btn-open-fiche" onclick="openFicheFromModal()" hidden>Ouvrir la fiche pipeline</button>
      </div>
      <div class="modal-foot-right">
        <button class="btn-can" id="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" id="btn-save" onclick="saveEvent()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script>
var _pipelineCache = null;
var _pipelineCacheTime = 0;
var _agendaCache = null;
var _agendaCacheTime = 0;

async function _loadPipeline(){
  if(_pipelineCache && (Date.now() - _pipelineCacheTime < 30000)){
    return _pipelineCache;
  }
  var cards = [];
  try {
    var resp = await fetch('/api/pipeline');
    if(resp.ok){
      var data = await resp.json();
      if(Array.isArray(data)) cards = data;
    } else {
      throw new Error('Pipeline API unavailable');
    }
  } catch(e) {
    console.warn('[Agenda] _loadPipeline API failed, fallback localStorage', e);
    try { var r = localStorage.getItem('mup_pipeline'); if(r) cards = JSON.parse(r); } catch(e2){}
  }
  _pipelineCache = cards || [];
  _pipelineCacheTime = Date.now();
  return _pipelineCache;
}

async function _loadAgenda(){
  if(_agendaCache && (Date.now() - _agendaCacheTime < 30000)){
    return _agendaCache;
  }
  var events = [];
  try {
    var resp = await fetch('/api/agenda');
    if(resp.ok){
      var data = await resp.json();
      if(Array.isArray(data)) events = data;
    } else {
      throw new Error('Agenda API unavailable');
    }
  } catch(e) {
    // SurrealDB est source unique de vérité : pas de fallback localStorage
    // (qui produisait des events fantômes persistants après échec API).
    console.warn('[Agenda] _loadAgenda API failed', e);
    events = [];
  }
  _agendaCache = events || [];
  _agendaCacheTime = Date.now();
  return _agendaCache;
}

async function _saveAgendaEvent(ev){
  var hasId = ev && ev.id && typeof ev.id === 'string';
  var url = hasId ? '/api/agenda/' + encodeURIComponent(ev.id.replace(/^agenda:/, '')) : '/api/agenda';
  var method = hasId ? 'PUT' : 'POST';
  try {
    var resp = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(ev) });
    if(!resp.ok){
      if(resp.status === 404 && method === 'PUT'){
        var resp2 = await fetch('/api/agenda', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(ev) });
        if(!resp2.ok) throw new Error('POST fallback failed: ' + resp2.status);
        _agendaCache = null; _agendaCacheTime = 0;
        return await resp2.json();
      }
      throw new Error('HTTP ' + resp.status);
    }
    _agendaCache = null; _agendaCacheTime = 0;
    return await resp.json();
  } catch(e){
    console.warn('[Agenda] _saveAgendaEvent API failed', e);
    return null;
  }
}

async function _savePipelineCard(card){
  var rawId = String(card.id || '').replace(/^pipeline:/, '');
  var hasId = rawId && rawId.length > 0;
  var url = hasId ? '/api/pipeline/' + encodeURIComponent(rawId) : '/api/pipeline';
  var method = hasId ? 'PUT' : 'POST';
  try {
    var resp = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(card) });
    if(!resp.ok){
      if(resp.status === 404 && method === 'PUT'){
        var resp2 = await fetch('/api/pipeline', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(card) });
        if(!resp2.ok) throw new Error('POST fallback failed: ' + resp2.status);
        _pipelineCache = null; _pipelineCacheTime = 0;
        return await resp2.json();
      }
      throw new Error('HTTP ' + resp.status);
    }
    _pipelineCache = null; _pipelineCacheTime = 0;
    return await resp.json();
  } catch(e){
    console.warn('[Agenda] _savePipelineCard API failed', e);
    return null;
  }
}

function isUpcoming(dateStr){if(!dateStr)return false;var today=new Date();today.setHours(0,0,0,0);return new Date(dateStr+'T00:00:00')>=today;}
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR   = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

const TODAY = new Date();
let viewYear  = TODAY.getFullYear();
let viewMonth = TODAY.getMonth();
let selectedDay = new Date(TODAY);

// Événements (données mockées + stockage local)
const MOCK_EVENTS = [];

let events = [];

// Normalise un id event pour comparaison robuste : retire le préfixe
// "agenda:" si présent. Évite que events.filter/find ratent le match
// quand l'id local ("eXXX") diffère de l'id serveur ("agenda:eXXX").
function _normAgendaId(id) {
  return String(id == null ? '' : id).replace(/^agenda:/, '');
}

async function loadEvents() {
  // Single source of truth : table agenda en SurrealDB.
  // Les events liés à une fiche pipeline portent un champ ficheId (populé au save).
  try { events = await _loadAgenda(); } catch(e) { events = []; }
  if(!Array.isArray(events)) events = [];
  if(!events.length) events = MOCK_EVENTS;
}

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function eventsForDate(dateStr) {
  return events.filter(e => e.date === dateStr).sort((a,b) => a.start.localeCompare(b.start));
}

// Labels lisibles par type, partagés par les vues mois + jour
const TYPE_LABELS = { rdv:'RDV', visio:'Visio', mail:'Mail', devis:'Devis', appel:'Appel', perso:'' };

// ── CALENDRIER ──
function renderCal() {
  const title = document.getElementById('cal-month-title');
  const grid  = document.getElementById('cal-grid');
  title.textContent = MONTHS_FR[viewMonth] + ' ' + viewYear;

  // Premier jour du mois (0=dim, ajuster pour lundi)
  const first = new Date(viewYear, viewMonth, 1);
  const last  = new Date(viewYear, viewMonth+1, 0);
  let startDow = first.getDay(); // 0=dim
  startDow = startDow === 0 ? 6 : startDow - 1; // convertir lundi=0

  const cells = [];
  // Jours du mois précédent
  for(let i = startDow - 1; i >= 0; i--) {
    const d = new Date(viewYear, viewMonth, -i);
    cells.push({ date: d, otherMonth: true });
  }
  // Jours du mois
  for(let d = 1; d <= last.getDate(); d++) {
    cells.push({ date: new Date(viewYear, viewMonth, d), otherMonth: false });
  }
  // Compléter jusqu'à la fin de la semaine (multiple de 7, max 42)
  const targetLen = Math.ceil((startDow + last.getDate()) / 7) * 7;
  while(cells.length < targetLen) {
    const d = new Date(viewYear, viewMonth+1, cells.length - startDow - last.getDate() + 1);
    cells.push({ date: d, otherMonth: true });
  }

  // Calculer nb de rangées réelles
  const nbRows = Math.ceil(cells.length / 7);
  grid.style.gridTemplateRows = `repeat(${nbRows}, 1fr)`;
  grid.innerHTML = cells.map(cell => {
    const dk = dateKey(cell.date);
    const isToday = dk === dateKey(TODAY);
    const isSel   = dk === dateKey(selectedDay);
    const dayEvts = eventsForDate(dk);
    const cls = ['cal-cell', cell.otherMonth?'other-month':'', isToday?'today':'', isSel?'selected':''].filter(Boolean).join(' ');

    let evtHtml = '';
    const visible = dayEvts.slice(0, 2);
    visible.forEach(e => {
      const lbl = TYPE_LABELS[e.type] || '';
      const prefix = lbl ? lbl + ' · ' : '';
      evtHtml += `<div class="cal-evt type-${e.type}" data-event-id="${e.id}" draggable="true" title="${lbl} — ${e.start} — ${e.title}">${prefix}${e.start} ${e.title}</div>`;
    });
    if(dayEvts.length > 2) evtHtml += `<div class="cal-more">+${dayEvts.length-2}</div>`;

    return `<div class="${cls}" data-date="${dk}" onclick="selectDay(${cell.date.getTime()})">
      <div class="cal-date">${cell.date.getDate()}</div>
      <div class="cal-events">${evtHtml}</div>
    </div>`;
  }).join('');
  setupAgendaDnD();
}

function selectDay(ts) {
  selectedDay = new Date(ts);
  renderCal();
  renderDay();
}

function prevMonth() { viewMonth--; if(viewMonth < 0){ viewMonth=11; viewYear--; } renderCal(); }
function nextMonth() { viewMonth++; if(viewMonth > 11){ viewMonth=0; viewYear++; } renderCal(); }
function goToday()   { viewYear=TODAY.getFullYear(); viewMonth=TODAY.getMonth(); selectedDay=new Date(TODAY); renderCal(); renderDay(); }

// ── VUE JOUR ──
function renderDay() {
  const dk = dateKey(selectedDay);
  const dayEvts = eventsForDate(dk);

  // Header
  const dow = DAYS_FR[(selectedDay.getDay()+6)%7];
  const dd = String(selectedDay.getDate()).padStart(2,'0');
  const mm = String(selectedDay.getMonth()+1).padStart(2,'0');
  const yyyy = selectedDay.getFullYear();
  document.getElementById('day-date-big').textContent = dd + ' ' + mm + ' ' + yyyy;
  document.getElementById('day-name').textContent = dow;
  startClock();

  // Timeline 7h → 21h
  const timeline = document.getElementById('timeline');
  const nowH = TODAY.getHours() + TODAY.getMinutes()/60;
  const isToday = dk === dateKey(TODAY);

  let html = '';
  for(let h = 7; h <= 21; h++) {
    const hLabel = String(h).padStart(2,'0') + ':00';
    const hEvts  = dayEvts.filter(e => {
      const [eh] = e.start.split(':').map(Number);
      return eh === h;
    });

    let evtsHtml = '';
    hEvts.forEach(e => {
      const typeIcons = {
        rdv:    '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
        visio:  '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>',
        appel:  '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72"/></svg>',
        devis:  '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
        perso:  '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
      };
      const typeEmoji = typeIcons[e.type] || typeIcons.rdv;
      const typeLabel = TYPE_LABELS[e.type] || '';
      const labelHtml = typeLabel ? '<span style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;opacity:.7;margin-right:6px">'+typeLabel+'</span>' : '';
      evtsHtml += `
        <div class="evt-block type-${e.type}" data-event-id="${e.id}" draggable="true" onclick="editEvent('${e.id}')">
          <div class="evt-time-tag">${e.start}–${e.end||''}</div>
          <div class="evt-title">${typeEmoji} ${labelHtml}${e.title}</div>
          ${e.contact?`<div class="evt-contact"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${e.contact}</div>`:''}
          ${e.notes?`<div style="font-size:10.5px;color:var(--muted);margin-top:3px;font-style:italic">${e.notes}</div>`:''}
        </div>`;
    });

    // Ligne de l'heure courante
    let currentLine = '';
    if(isToday && nowH >= h && nowH < h+1) {
      const pct = (nowH - h) * 100;
      currentLine = `<div class="current-time-line" style="top:${pct}%;position:absolute;left:0;right:0"></div>`;
    }

    const isCurrent = isToday && Math.floor(nowH) === h;
    html += `<div class="time-slot${isCurrent?' current-hour':''}">
      <div class="time-label">${hLabel}</div>
      <div class="time-line" style="position:relative">
        ${currentLine}
        ${evtsHtml || '<div style="height:100%"></div>'}
      </div>
    </div>`;
  }

  if(!dayEvts.length) {
    html += `<div class="evt-empty">Aucun événement ce jour</div>`;
  }

  timeline.innerHTML = html;
  setupAgendaDnD();

  // Scroll vers l'heure courante si aujourd'hui
  if(isToday) {
    setTimeout(() => {
      const slot = document.querySelector('.current-hour');
      if(slot) slot.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 100);
  }
}

// ── MODAL ──
let editingId = null;
let modalType = 'rdv';
// 'create' | 'edit' — tous les events sont éditables (single source of truth = table agenda)
let modalMode = 'create';
// ficheId de la fiche pipeline parente (null si event sans fiche)
let modalFicheId = null;

// Bascule l'UI de la modale selon le mode courant.
//   create : titre "Nouvel événement", bouton "Enregistrer", pas de Supprimer
//   edit   : titre "Modifier l'événement", bouton "Enregistrer les modifications",
//            bouton "Supprimer" rouge à gauche, "Ouvrir la fiche" si ficheId présent
function applyModalMode(mode) {
  modalMode = mode;
  var title = document.getElementById('modal-title');
  var btnDelete = document.getElementById('btn-delete');
  var btnOpenFiche = document.getElementById('btn-open-fiche');
  var btnSave = document.getElementById('btn-save');

  if (mode === 'edit') {
    title.textContent = 'Modifier l\'événement';
    btnDelete.hidden = false;
    btnOpenFiche.hidden = !modalFicheId;
    btnSave.textContent = 'Enregistrer les modifications';
  } else { // 'create'
    title.textContent = 'Nouvel événement';
    btnDelete.hidden = true;
    btnOpenFiche.hidden = true;
    btnSave.textContent = 'Enregistrer';
  }
}

// Affiche la mention "Lié à la fiche X" en mode edit si ficheId présent.
function refreshPipelineInfo() {
  var info = document.getElementById('modal-pipeline-info');
  var nameEl = document.getElementById('modal-pipeline-info-name');
  if (!info || !nameEl) return;
  if (!modalFicheId) { info.hidden = true; nameEl.textContent = ''; return; }
  // Lookup nom de la fiche depuis le select déjà peuplé
  var sel = document.getElementById('m-pipeline-card');
  var label = '';
  if (sel) {
    for (var i = 0; i < sel.options.length; i++) {
      if (String(sel.options[i].value) === String(modalFicheId)) { label = sel.options[i].textContent; break; }
    }
  }
  nameEl.textContent = label || ('#' + modalFicheId);
  info.hidden = false;
}

async function openModal(hour) {
  editingId = null;
  modalFicheId = null;
  document.getElementById('m-title').value = '';
  document.getElementById('m-contact').value = '';
  document.getElementById('m-notes').value = '';
  document.getElementById('m-date').value = dateKey(selectedDay);
  if(hour !== undefined) {
    document.getElementById('m-start').value = String(hour).padStart(2,'0') + ':00';
    document.getElementById('m-end').value = String(hour+1).padStart(2,'0') + ':00';
  } else {
    document.getElementById('m-start').value = '09:00';
    document.getElementById('m-end').value = '10:00';
  }
  selType(document.querySelector('.type-pill[data-type="rdv"]'));
  applyModalMode('create');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-title').focus(), 100);
  // Populate pipeline cards select
  var sel = document.getElementById('m-pipeline-card');
  if(sel) {
    var html = '<option value="">-- Choisir une fiche pipeline --</option>';
    try {
      var cards = await _loadPipeline();
      cards.forEach(function(c) {
        html += '<option value="'+c.id+'">'+((c.co||c.name)||'Sans nom')+'</option>';
      });
    } catch(e) {}
    sel.innerHTML = html;
  }
}

async function fillFromPipeline() {
  var sel = document.getElementById('m-pipeline-card');
  if(!sel) return;
  // Met à jour la référence ficheId à chaque changement du select (incluant "vide").
  modalFicheId = sel.value || null;
  refreshPipelineInfo();
  if(!sel.value) return;
  try {
    var pipe = await _loadPipeline();
    var c = pipe.find(function(x) { return String(x.id) === String(sel.value); });
    if(c) {
      document.getElementById('m-title').value = c.co || c.name || '';
      document.getElementById('m-contact').value = c.name || '';
    }
  } catch(e) {}
}

function editEvent(id) {
  var nid = _normAgendaId(id);
  const e = events.find(x => _normAgendaId(x.id) === nid);
  if(!e) return;
  editingId = id;
  modalFicheId = e.ficheId || null;
  document.getElementById('m-title').value = e.title || '';
  document.getElementById('m-contact').value = e.contact || '';
  document.getElementById('m-date').value = e.date || dateKey(selectedDay);
  document.getElementById('m-start').value = e.start || '09:00';
  document.getElementById('m-end').value = e.end || '10:00';
  document.getElementById('m-notes').value = e.notes || '';
  var typePill = document.querySelector('.type-pill[data-type="' + (e.type || 'rdv') + '"]');
  if (typePill) selType(typePill);
  applyModalMode('edit');
  // Sync select fiche + bandeau d'info
  var sel = document.getElementById('m-pipeline-card');
  if (sel) sel.value = modalFicheId || '';
  refreshPipelineInfo();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  // Reset pour la prochaine ouverture (par sécurité)
  editingId = null;
  modalFicheId = null;
  var info = document.getElementById('modal-pipeline-info');
  if (info) info.hidden = true;
}

function selType(el) {
  if (!el) return;
  document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('sel'));
  el.classList.add('sel');
  modalType = el.dataset.type;
  applyPersoVisibility();
}

// Type "perso" : masque le select fiche (sémantique, un event perso n'a pas
// de fiche pipeline). Reset modalFicheId et bandeau info dans ce cas.
function applyPersoVisibility() {
  var sel = document.getElementById('m-pipeline-card');
  var info = document.getElementById('modal-pipeline-info');
  var isPerso = (modalType === 'perso');
  if (sel) {
    sel.style.display = isPerso ? 'none' : '';
    if (isPerso) {
      sel.value = '';
      modalFicheId = null;
      if (info) info.hidden = true;
    }
  }
}

// Bouton "Ouvrir la fiche pipeline" — visible en mode edit si ficheId présent.
function openFicheFromModal() {
  var fid = modalFicheId;
  closeModal();
  if (fid && window.MUPFiche && typeof window.MUPFiche.open === 'function') {
    window.MUPFiche.open(fid);
  } else if (fid) {
    window.location.href = '/pipeline?fiche=' + encodeURIComponent(fid);
  }
}

async function saveEvent() {
  const title = document.getElementById('m-title').value.trim();
  if(!title) {
    if (typeof showAgendaToast === 'function') showAgendaToast('Renseignez un titre ou liez une fiche');
    document.getElementById('m-title').focus();
    return;
  }
  const dateVal = document.getElementById('m-date').value || dateKey(selectedDay);
  const startVal = document.getElementById('m-start').value;
  const endVal = document.getElementById('m-end').value;
  const contactVal = document.getElementById('m-contact').value.trim();
  const notesVal = document.getElementById('m-notes').value.trim();
  // ficheId : depuis modalFicheId (édition) OU select (création)
  const sel = document.getElementById('m-pipeline-card');
  const ficheId = modalFicheId || (sel && sel.value) || null;

  let target;
  if (editingId) {
    var nid = _normAgendaId(editingId);
    target = events.find(x => _normAgendaId(x.id) === nid);
    if (!target) { closeModal(); return; }
    target.title = title;
    target.contact = contactVal;
    target.date = dateVal;
    target.start = startVal;
    target.end = endVal;
    target.type = modalType;
    target.notes = notesVal;
    target.ficheId = ficheId;
  } else {
    // Création : on construit l'objet SANS id local (le serveur l'attribue).
    // PAS de push dans events[] avant succès POST — sinon en cas d'échec
    // l'event devient un fantôme inexistant en DB qu'aucun DELETE ne peut purger.
    target = {
      date: dateVal,
      start: startVal,
      end: endVal,
      title: title,
      contact: contactVal,
      type: modalType,
      notes: notesVal,
      ficheId: ficheId
    };
  }

  const saved = await _saveAgendaEvent(target);
  if (!saved || !saved.id) {
    if (typeof showAgendaToast === 'function') {
      showAgendaToast(editingId ? 'Échec mise à jour, réessayez' : 'Création échouée, réessayez');
    }
    return;
  }

  if (!editingId) {
    target.id = String(saved.id).replace(/^agenda:/, '');
    events.push(target);
  }

  // Invalider cache agenda local pour forcer reload aux prochaines pages
  if (typeof _agendaCache !== 'undefined') { _agendaCache = null; _agendaCacheTime = 0; }

  closeModal();
  renderCal();
  renderDay();

  // Notif cross-onglet (pipeline / carte / visio écoutent storage event)
  try { window.dispatchEvent(new StorageEvent('storage', { key: 'mup_agenda' })); } catch(_){}
}

// ── DELETE ──
// Suppression ciblée d'un event de la table agenda + retrait local + re-render.
// Confirmation native (confirm) — UX simple, conforme au brief.
async function deleteEvent() {
  if (!editingId) return;
  if (!window.confirm('Supprimer cet événement ?')) return;
  var localId = editingId;
  var cleanId = String(localId).replace(/^agenda:/, '');
  try {
    var resp = await fetch('/api/agenda/' + encodeURIComponent(cleanId), { method: 'DELETE' });
    if (!resp.ok && resp.status !== 404) {
      window.alert('Suppression impossible (HTTP ' + resp.status + '). Réessayez.');
      return;
    }
  } catch (e) {
    window.alert('Erreur réseau lors de la suppression. Réessayez.');
    return;
  }
  events = events.filter(function(x){ return _normAgendaId(x.id) !== cleanId; });
  if (typeof _agendaCache !== 'undefined') { _agendaCache = null; _agendaCacheTime = 0; }
  closeModal();
  renderCal();
  renderDay();
  try { window.dispatchEvent(new StorageEvent('storage', { key: 'mup_agenda' })); } catch(_){}
}

// Init


var _clockInterval = null;
function startClock() {
  if(_clockInterval) clearInterval(_clockInterval);
  function tick() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    var sec = String(now.getSeconds()).padStart(2,'0');
    var el = document.getElementById('day-clock');
    if(el) el.textContent = h + ':' + m + ':' + sec;
  }
  tick();
  _clockInterval = setInterval(tick, 1000);
}

// ── MÉTÉO Combourg ──
async function fetchWeather() {
  try {
    const r = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=48.41&longitude=-1.75&current=temperature_2m,weathercode&timezone=Europe/Paris',
      { signal: AbortSignal.timeout(6000) }
    );
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const code = d.current.weathercode;
    const { ico, desc } = weatherCode(code);
    document.getElementById('weather-ico').innerHTML    = ico;
    document.getElementById('weather-temp').textContent = temp + '°C';
    document.getElementById('weather-desc').textContent = desc;
  } catch(e) {
    document.getElementById('weather-desc').textContent = 'Indisponible';
  }
}

function weatherCode(c) {
  const SVG_WEATHER = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 1 0-1.4-8.8 6 6 0 0 0-11.6 1.6 4 4 0 0 0 1 7.9z"/></svg>';
  if(c === 0)           return { ico:SVG_WEATHER, desc:'Ensoleillé' };
  if(c <= 2)            return { ico:SVG_WEATHER, desc:'Peu nuageux' };
  if(c === 3)           return { ico:SVG_WEATHER, desc:'Couvert' };
  if(c <= 48)           return { ico:SVG_WEATHER, desc:'Brouillard' };
  if(c <= 57)           return { ico:SVG_WEATHER, desc:'Bruine' };
  if(c <= 67)           return { ico:SVG_WEATHER, desc:'Pluie' };
  if(c <= 77)           return { ico:SVG_WEATHER, desc:'Neige' };
  if(c <= 82)           return { ico:SVG_WEATHER, desc:'Averses' };
  if(c <= 99)           return { ico:SVG_WEATHER, desc:'Orages' };
  return { ico:SVG_WEATHER, desc:'—' };
}

// Cleanup one-shot : purge les vestiges localStorage "mup_agenda" laissés par
// l'ancienne dual-write API + LS. La SurrealDB est source unique de vérité
// désormais — un event présent dans le LS mais absent de la DB devenait un
// fantôme côté UI qu'aucun DELETE ne pouvait purger (404 server-side).
try { localStorage.removeItem('mup_agenda'); } catch(_) {}

loadEvents().then(function(){
  renderCal();
  renderDay();
});
fetchWeather();

// Rafraîchissement temps réel quand mup_pipeline ou mup_agenda changent
window.addEventListener('storage', function(e){
  if(!e.key || e.key === 'mup_pipeline' || e.key === 'mup_agenda'){
    loadEvents().then(function(){
      if(typeof renderCal === 'function') renderCal();
      if(typeof renderDay === 'function') renderDay();
    });
  }
});

// ── Drag & drop RDV (vue mensuelle : changement de date · vue jour :
//    changement d'heure avec snap 15 min). Détection conflits + propagation
//    via storage event mup_agenda. ────────────────────────────────────────

function _timeToMin(hhmm) {
  if (!hhmm) return 0;
  var p = String(hhmm).split(':');
  return (parseInt(p[0],10)||0) * 60 + (parseInt(p[1],10)||0);
}
function _minToTime(m) {
  m = Math.max(0, Math.min(24*60-1, m|0));
  var h = (m/60)|0, mm = m % 60;
  return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}
function _isAgendaConflict(evts, candidateId, candidateDate, candidateStart, candidateEnd) {
  var cs = _timeToMin(candidateStart);
  var ce = _timeToMin(candidateEnd || candidateStart);
  if (ce <= cs) ce = cs + 30;
  var ncid = _normAgendaId(candidateId);
  return (evts || []).some(function(e) {
    if (_normAgendaId(e.id) === ncid) return false;
    if (e.date !== candidateDate) return false;
    var es = _timeToMin(e.start);
    var ee = _timeToMin(e.end || e.start);
    if (ee <= es) ee = es + 30;
    return !(ce <= es || cs >= ee);
  });
}

function showAgendaToast(msg) {
  var t = document.getElementById('agenda-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'agenda-toast';
    t.style.cssText = 'position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#1D1D1F;color:#fff;padding:10px 18px;border-radius:8px;font-family:Geist,-apple-system,sans-serif;font-size:13px;font-weight:500;z-index:100000;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.18)';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t.__hideTimer);
  t.__hideTimer = setTimeout(function(){ t.style.opacity='0'; }, 2200);
}

async function _updateAgendaEvent(eventId, patch) {
  var nid = _normAgendaId(eventId);
  var ev = events.find(function(e){ return _normAgendaId(e.id) === nid; });
  if (!ev) return false;
  var body = Object.assign({}, ev, patch);
  delete body.id;
  var cleanId = nid;
  try {
    var resp = await fetch('/api/agenda/' + encodeURIComponent(cleanId), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) return false;
  } catch (e) { return false; }
  Object.assign(ev, patch);
  if (typeof _agendaCache !== 'undefined') { _agendaCache = null; _agendaCacheTime = 0; }
  try { window.dispatchEvent(new StorageEvent('storage', { key: 'mup_agenda' })); } catch(_){}
  return true;
}

async function updateEventDate(eventId, newDate) {
  var nid = _normAgendaId(eventId);
  var ev = events.find(function(e){ return _normAgendaId(e.id) === nid; });
  if (!ev || ev.date === newDate) return;
  if (_isAgendaConflict(events, eventId, newDate, ev.start, ev.end)) {
    showAgendaToast('Créneau déjà occupé à cette heure');
    return;
  }
  var ok = await _updateAgendaEvent(eventId, { date: newDate });
  if (ok) { renderCal(); renderDay(); }
  else showAgendaToast('Erreur réseau, réessayez');
}

async function updateEventTime(eventId, newStart, newEnd) {
  var nid = _normAgendaId(eventId);
  var ev = events.find(function(e){ return _normAgendaId(e.id) === nid; });
  if (!ev) return;
  if (ev.start === newStart && ev.end === newEnd) return;
  if (_isAgendaConflict(events, eventId, ev.date, newStart, newEnd)) {
    showAgendaToast('Créneau déjà occupé');
    return;
  }
  var ok = await _updateAgendaEvent(eventId, { start: newStart, end: newEnd });
  if (ok) { renderCal(); renderDay(); }
  else showAgendaToast('Erreur réseau, réessayez');
}

// Listeners délégués sur cal-grid + timeline (re-binding idempotent via flag).
function setupAgendaDnD() {
  var grid = document.getElementById('cal-grid');
  if (grid && !grid.__dndBound) {
    grid.__dndBound = true;
    grid.addEventListener('dragstart', function(e) {
      var pill = e.target.closest('.cal-evt[data-event-id]');
      if (!pill) return;
      e.stopPropagation();
      e.dataTransfer.setData('text/plain', pill.dataset.eventId);
      e.dataTransfer.effectAllowed = 'move';
      pill.style.opacity = '0.5';
    });
    grid.addEventListener('dragend', function(e) {
      var pill = e.target.closest('.cal-evt[data-event-id]');
      if (pill) pill.style.opacity = '';
      document.querySelectorAll('.cal-cell--drop-target').forEach(function(c){
        c.classList.remove('cal-cell--drop-target');
      });
    });
    grid.addEventListener('dragover', function(e) {
      var cell = e.target.closest('.cal-cell[data-date]');
      if (!cell) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!cell.classList.contains('cal-cell--drop-target')) {
        document.querySelectorAll('.cal-cell--drop-target').forEach(function(c){
          c.classList.remove('cal-cell--drop-target');
        });
        cell.classList.add('cal-cell--drop-target');
      }
    });
    grid.addEventListener('drop', function(e) {
      var cell = e.target.closest('.cal-cell[data-date]');
      if (!cell) return;
      e.preventDefault();
      e.stopPropagation();
      var eventId = e.dataTransfer.getData('text/plain');
      if (eventId && cell.dataset.date) updateEventDate(eventId, cell.dataset.date);
    });
  }

  var timeline = document.getElementById('timeline');
  if (timeline && !timeline.__dndBound) {
    timeline.__dndBound = true;
    timeline.addEventListener('dragstart', function(e) {
      var block = e.target.closest('.evt-block[data-event-id]');
      if (!block) return;
      e.stopPropagation();
      e.dataTransfer.setData('text/plain', block.dataset.eventId);
      e.dataTransfer.effectAllowed = 'move';
      block.style.opacity = '0.5';
    });
    timeline.addEventListener('dragend', function(e) {
      var block = e.target.closest('.evt-block[data-event-id]');
      if (block) block.style.opacity = '';
    });
    timeline.addEventListener('dragover', function(e) {
      var slot = e.target.closest('.time-slot');
      if (!slot) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });
    timeline.addEventListener('drop', function(e) {
      var slot = e.target.closest('.time-slot');
      if (!slot) return;
      e.preventDefault();
      e.stopPropagation();
      var eventId = e.dataTransfer.getData('text/plain');
      if (!eventId) return;
      var label = slot.querySelector('.time-label');
      var hourMatch = label && label.textContent.match(/(\d{2}):00/);
      if (!hourMatch) return;
      var slotHour = parseInt(hourMatch[1], 10);
      var line = slot.querySelector('.time-line');
      var rect = line.getBoundingClientRect();
      var ratio = Math.max(0, Math.min(0.999, (e.clientY - rect.top) / Math.max(1, rect.height)));
      var minuteOffset = Math.round(ratio * 4) * 15;
      if (minuteOffset >= 60) minuteOffset = 45;
      var nid = _normAgendaId(eventId);
      var ev = events.find(function(x){ return _normAgendaId(x.id) === nid; });
      if (!ev) return;
      var startMin = _timeToMin(ev.start);
      var endMin = _timeToMin(ev.end || ev.start);
      var durationMin = Math.max(15, endMin - startMin);
      var newStartMin = slotHour * 60 + minuteOffset;
      var newEndMin = Math.min(24*60 - 1, newStartMin + durationMin);
      updateEventTime(eventId, _minToTime(newStartMin), _minToTime(newEndMin));
    });
  }
}
