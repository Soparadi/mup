<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MovUP — Créer votre compte</title>
<meta name="description" content="Créez votre compte MovUP. Vous serez opérationnel en quelques minutes.">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@font-face{font-family:"MovUP Digits";src:local("-apple-system"),local("BlinkMacSystemFont"),local("Segoe UI"),local("Helvetica Neue"),local("Helvetica"),local("Arial");unicode-range:U+0030-0039;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#FFFFFF;--surface:#F5F5F7;--surface2:#EBEBF0;
    --card:#FFFFFF;--border:#E8E8ED;--border2:#C7C7CC;
    --text:#1D1D1F;--muted:#6E6E73;--muted2:#AEAEB2;
    --green:#1D8348;--red:#CC0000;--orange:#B84C00;
    --font:"MovUP Digits",'Geist',-apple-system,'Helvetica Neue',sans-serif;
  }
  body{background:var(--surface);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:48px 20px}
  .auth{width:100%;max-width:520px}

  /* Logo MovUP — version canonique : /logo-v7-movup-court.svg */
  .auth-brand{display:inline-flex;align-items:center;gap:10px;margin:0 auto 14px;justify-content:center;width:100%;text-decoration:none;color:var(--text);font-family:var(--font)}
  .auth-brand-logo{height:48px;width:auto;display:block}
  .auth-brand-icon{background:var(--text);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;flex-shrink:0}
  .auth-brand-icon svg{width:18px;height:18px}
  .auth-brand-name{font-size:17px;font-weight:700;letter-spacing:-.3px}

  .auth-head{text-align:center;margin-bottom:22px}
  .auth-head h1{font-size:26px;font-weight:800;letter-spacing:-.6px;color:var(--text);margin-bottom:8px;line-height:1.2}
  /* Sous-titre tient sur 1 ligne en desktop ; retour à la ligne autorisé en mobile. */
  .auth-head p{font-size:14px;color:var(--muted);margin:0 auto;line-height:1.55;max-width:none}
  @media (min-width:768px){
    .auth-head p{white-space:nowrap}
  }

  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .card-body{padding:22px 24px 24px}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media (max-width:640px){ .grid-2{grid-template-columns:1fr} }

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
  .field input{font-family:var(--font);font-size:14px;padding:10px 12px;border:1px solid var(--border2);border-radius:9px;background:#fff;color:var(--text);outline:none;transition:border-color .12s,box-shadow .12s;width:100%}
  .field input:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(29,29,31,.08)}
  .field input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(204,0,0,.08)}
  .field-err{font-size:11.5px;color:var(--red);min-height:14px;line-height:1.3}

  /* Champs avec bouton œil */
  .password-wrap{position:relative}
  .password-wrap input{padding-right:40px}
  .pw-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:0;padding:6px;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;border-radius:6px}
  .pw-toggle:hover{color:var(--text);background:var(--surface)}
  .pw-toggle svg{width:18px;height:18px}

  /* Indicateur de force — masqué tant que le champ est vide (.is-on ajouté par le JS). */
  .pw-strength{display:none;gap:6px;margin-top:6px}
  .pw-strength.is-on{display:flex}
  .pw-strength span{flex:1;height:4px;border-radius:2px;background:#E5E5E5;transition:background .15s}
  .pw-strength.s1 span:nth-child(1){background:#DC2626}
  .pw-strength.s2 span:nth-child(-n+2){background:#F59E0B}
  .pw-strength.s3 span{background:#16A34A}
  .pw-label{display:none;font-size:12px;color:#6B7280;margin-top:4px;font-weight:500;letter-spacing:.2px;text-align:left}
  .pw-label.is-on{display:block}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);font-size:14px;font-weight:700;padding:12px 18px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .15s;text-decoration:none;width:100%}
  .btn-dark{background:var(--text);color:#fff;border-color:var(--text);margin-top:6px}
  .btn-dark:hover:not(:disabled){background:#000}
  .btn-dark:disabled{opacity:.45;cursor:not-allowed}

  .alert{padding:10px 12px;border-radius:9px;font-size:12.5px;margin-bottom:14px;line-height:1.5}
  .alert-error{background:rgba(204,0,0,.08);color:var(--red);border:1px solid rgba(204,0,0,.2)}
  .alert-success{background:rgba(29,131,72,.08);color:var(--green);border:1px solid rgba(29,131,72,.2)}

  .legal{font-size:11.5px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.55}
  .legal a{color:var(--text);text-decoration:underline;text-underline-offset:2px}
  .legal a:hover{color:#000}

  /* Badge "Plan choisi" — affiché si ?plan=… valide sur l'URL */
  .plan-badge{display:none;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.02em;margin-bottom:18px;border:1px solid transparent;width:fit-content;margin-left:auto;margin-right:auto}
  .plan-badge.is-on{display:inline-flex}
  .plan-badge .pb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .plan-badge.plan-demarrage{background:rgba(11,188,212,.12);color:#0BBCD4;border-color:rgba(11,188,212,.2)}
  .plan-badge.plan-demarrage .pb-dot{background:#0BBCD4}
  .plan-badge.plan-activite{background:rgba(29,131,72,.12);color:#1D8348;border-color:rgba(29,131,72,.2)}
  .plan-badge.plan-activite .pb-dot{background:#1D8348}
  .plan-badge.plan-croisiere{background:rgba(29,131,72,.12);color:#1D8348;border-color:rgba(29,131,72,.2)}
  .plan-badge.plan-croisiere .pb-dot{background:#1D8348}

  /* Case opt-in marketing — RGPD : non pré-cochée, label complet visible */
  .field-checkbox{margin:6px 0 14px}
  .checkbox-label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:12.5px;line-height:1.5;color:var(--muted)}
  .checkbox-label input[type="checkbox"]{margin-top:2px;width:16px;height:16px;cursor:pointer;accent-color:#F97316;flex-shrink:0}
  .checkbox-text{flex:1}

  .auth-foot{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
  .auth-foot a{color:var(--text);font-weight:600;text-decoration:none}
  .auth-foot a:hover{text-decoration:underline}

  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
</style>
</head>
<body>
<main class="auth">
  <a href="/" class="auth-brand" aria-label="Accueil MovUP">
    <img src="/logo-v7-movup-court.svg" alt="MovUP" class="auth-brand-logo">
  </a>

  <div class="auth-head">
    <h1>Créer votre compte</h1>
    <p>Créez votre compte MovUP, vous serez opérationnel en quelques minutes.</p>
  </div>

  <div class="card">
    <div class="card-body">
      <div id="alert" class="alert hidden" role="alert"></div>

      <form id="form-signup" autocomplete="on" novalidate>
        <!-- Badge plan choisi — visible uniquement si ?plan=… valide -->
        <div id="plan-badge" class="plan-badge" role="status" aria-live="polite">
          <span class="pb-dot" aria-hidden="true"></span>
          <span>Plan choisi : <strong id="plan-badge-name"></strong></span>
        </div>
        <input type="hidden" name="intended_plan" id="intended-plan-input" value="">

        <div class="grid-2">
          <div class="field">
            <label for="prenom">Prénom</label>
            <input id="prenom" name="prenom" type="text" required autocomplete="given-name" maxlength="80">
            <div class="field-err" id="err-prenom"></div>
          </div>
          <div class="field">
            <label for="nom">Nom</label>
            <input id="nom" name="nom" type="text" required autocomplete="family-name" maxlength="80">
            <div class="field-err" id="err-nom"></div>
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email" maxlength="160">
          <div class="field-err" id="err-email"></div>
        </div>

        <div class="field">
          <label for="telephone">Téléphone</label>
          <input id="telephone" name="telephone" type="tel" required autocomplete="tel" maxlength="20" placeholder="06 12 34 56 78">
          <div class="field-err" id="err-telephone"></div>
        </div>

        <div class="field">
          <label for="password">Mot de passe (10 caractères min)</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" required autocomplete="new-password" minlength="10">
            <button type="button" class="pw-toggle" data-target="password" aria-label="Afficher le mot de passe">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-eye><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength" id="pw-strength" aria-hidden="true"><span></span><span></span><span></span></div>
          <div class="pw-label" id="pw-label"></div>
          <div class="field-err" id="err-password"></div>
        </div>

        <div class="field">
          <label for="password2">Confirmer le mot de passe</label>
          <div class="password-wrap">
            <input id="password2" name="password2" type="password" required autocomplete="new-password" minlength="10">
            <button type="button" class="pw-toggle" data-target="password2" aria-label="Afficher le mot de passe">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-eye><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-err" id="err-password2"></div>
        </div>

        <p class="legal">
          En créant votre compte, vous acceptez les
          <a href="https://movup.io/cgu">CGU</a> et la
          <a href="https://movup.io/confidentialite">politique de confidentialité</a>.
        </p>

        <div class="field-checkbox">
          <label class="checkbox-label" for="marketing_consent">
            <input type="checkbox" id="marketing_consent" name="marketing_consent" value="1">
            <span class="checkbox-text">Je souhaite recevoir des conseils de prospection et offres MovUP par email. 1 à 2 emails par mois maximum, désinscription en 1 clic à tout moment.</span>
          </label>
        </div>

        <button type="submit" id="btn-submit" class="btn btn-dark" disabled>Créer mon compte</button>
      </form>
    </div>
  </div>

  <div class="auth-foot">
    Déjà inscrit ? <a href="/login">Se connecter</a>
  </div>
</main>

<script>
(function(){
  var alertBox = document.getElementById('alert')
  var form = document.getElementById('form-signup')
  var btnSubmit = document.getElementById('btn-submit')

  // ── Intention de plan : ?plan=… sur l'URL OU récupérée de sessionStorage ──
  // Validation stricte case-sensitive : les 3 valeurs autorisées uniquement,
  // tout le reste devient null (le badge ne s'affiche pas et le hidden reste vide).
  var VALID_PLANS = ['demarrage', 'activite', 'croisiere']
  var PLAN_LABELS = { demarrage: 'Démarrage', activite: 'Activité', croisiere: 'Croisière' }
  var planInput = document.getElementById('intended-plan-input')
  var planBadge = document.getElementById('plan-badge')
  var planBadgeName = document.getElementById('plan-badge-name')
  function applyIntendedPlan(plan) {
    if (!planInput || !planBadge) return
    if (!plan || VALID_PLANS.indexOf(plan) === -1) {
      planInput.value = ''
      planBadge.classList.remove('is-on', 'plan-demarrage', 'plan-activite', 'plan-croisiere')
      return
    }
    planInput.value = plan
    planBadge.classList.remove('plan-demarrage', 'plan-activite', 'plan-croisiere')
    planBadge.classList.add('is-on', 'plan-' + plan)
    if (planBadgeName) planBadgeName.textContent = PLAN_LABELS[plan]
  }
  try {
    var urlPlan = new URLSearchParams(window.location.search).get('plan')
    if (urlPlan && VALID_PLANS.indexOf(urlPlan) !== -1) {
      applyIntendedPlan(urlPlan)
      sessionStorage.setItem('intended_plan', urlPlan)
    } else {
      var stored = sessionStorage.getItem('intended_plan')
      if (stored && VALID_PLANS.indexOf(stored) !== -1) applyIntendedPlan(stored)
    }
  } catch (e) { /* sessionStorage indisponible (mode privé strict) — fail silencieux */ }

  var inputs = {
    prenom: document.getElementById('prenom'),
    nom: document.getElementById('nom'),
    email: document.getElementById('email'),
    telephone: document.getElementById('telephone'),
    password: document.getElementById('password'),
    password2: document.getElementById('password2')
  }
  var errs = {
    prenom: document.getElementById('err-prenom'),
    nom: document.getElementById('err-nom'),
    email: document.getElementById('err-email'),
    telephone: document.getElementById('err-telephone'),
    password: document.getElementById('err-password'),
    password2: document.getElementById('err-password2')
  }
  var pwStrength = document.getElementById('pw-strength')
  var pwLabel = document.getElementById('pw-label')

  // SVG œil ouvert / fermé
  var EYE_OPEN = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
  var EYE_OFF = '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.66 19.66 0 0 1 5.06-5.94"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a19.69 19.69 0 0 1-3.17 4.36"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'

  // ── Validators ──
  function vRequired(s){ return typeof s==='string' && s.trim().length > 0 }
  function vEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(s||'').trim()) }
  // FR : +33 suivi de 9 chiffres OU 0 suivi de 9 chiffres ; espaces/tirets/points tolérés
  function vTelFR(s){
    var raw = String(s||'').replace(/[\s.\-()]/g,'')
    return /^(?:\+33[1-9]\d{8}|0[1-9]\d{8})$/.test(raw)
  }
  function pwScore(s){
    if(!s) return 0
    var hasLetter = /[A-Za-zÀ-ÿ]/.test(s)
    var hasDigit = /\d/.test(s)
    if(s.length < 10 || !hasLetter || !hasDigit) return 0
    var score = 1
    if(s.length >= 12) score++
    if(/[^A-Za-z0-9]/.test(s) || (/[A-Z]/.test(s) && /[a-z]/.test(s) && s.length >= 14)) score++
    return Math.min(score, 3)
  }

  function setErr(name, msg){
    errs[name].textContent = msg || ''
    inputs[name].classList.toggle('error', !!msg)
  }

  function validate(showErrors){
    var ok = true
    var v = {
      prenom: inputs.prenom.value.trim(),
      nom: inputs.nom.value.trim(),
      email: inputs.email.value.trim(),
      telephone: inputs.telephone.value.trim(),
      password: inputs.password.value,
      password2: inputs.password2.value
    }
    if(!vRequired(v.prenom)){ ok=false; if(showErrors) setErr('prenom','Prénom requis.') } else setErr('prenom','')
    if(!vRequired(v.nom)){ ok=false; if(showErrors) setErr('nom','Nom requis.') } else setErr('nom','')
    if(!vEmail(v.email)){ ok=false; if(showErrors) setErr('email','Email invalide.') } else setErr('email','')
    if(!vTelFR(v.telephone)){ ok=false; if(showErrors) setErr('telephone','Numéro français invalide (10 chiffres ou +33).') } else setErr('telephone','')
    var s = pwScore(v.password)
    if(s === 0){
      ok=false
      if(showErrors) setErr('password','10 caractères minimum, dont au moins 1 lettre et 1 chiffre.')
    } else setErr('password','')
    if(v.password2 !== v.password || !v.password2){
      ok=false
      if(showErrors) setErr('password2','Les mots de passe ne correspondent pas.')
    } else setErr('password2','')
    return { ok: ok, values: v, score: s }
  }

  function refreshSubmit(){
    btnSubmit.disabled = !validate(false).ok
  }

  function refreshStrength(){
    var hasValue = inputs.password.value.length > 0
    var s = pwScore(inputs.password.value)
    var classes = 'pw-strength'
    if(hasValue){ classes += ' is-on' }
    if(s>0){ classes += ' s'+s }
    pwStrength.className = classes
    var labels = ['Faible', 'Faible', 'Moyen', 'Fort']
    if(hasValue){
      pwLabel.textContent = labels[s]
      pwLabel.classList.add('is-on')
    } else {
      pwLabel.textContent = ''
      pwLabel.classList.remove('is-on')
    }
  }

  // ── Toggle œil ──
  document.querySelectorAll('.pw-toggle').forEach(function(btn){
    btn.addEventListener('click', function(){
      var target = document.getElementById(btn.dataset.target)
      var svg = btn.querySelector('svg')
      if(target.type === 'password'){
        target.type = 'text'
        svg.innerHTML = EYE_OFF
        btn.setAttribute('aria-label','Masquer le mot de passe')
      } else {
        target.type = 'password'
        svg.innerHTML = EYE_OPEN
        btn.setAttribute('aria-label','Afficher le mot de passe')
      }
    })
  })

  // ── Live validation : fait sauter l'erreur dès que l'utilisateur corrige ──
  Object.keys(inputs).forEach(function(name){
    inputs[name].addEventListener('input', function(){
      if(name === 'password') refreshStrength()
      // n'affiche pas d'erreur tant que l'utilisateur tape, mais retire celles déjà affichées si OK
      if(errs[name].textContent){
        var v = validate(false)
        if(name === 'password' && v.score > 0) setErr('password','')
        if(name === 'password2' && inputs.password2.value === inputs.password.value && inputs.password2.value) setErr('password2','')
        if(name === 'prenom' && vRequired(inputs.prenom.value)) setErr('prenom','')
        if(name === 'nom' && vRequired(inputs.nom.value)) setErr('nom','')
        if(name === 'email' && vEmail(inputs.email.value)) setErr('email','')
        if(name === 'telephone' && vTelFR(inputs.telephone.value)) setErr('telephone','')
      }
      refreshSubmit()
    })
    inputs[name].addEventListener('blur', function(){
      // À la sortie d'un champ touché, on affiche l'erreur si invalide
      if(inputs[name].value) validate(true)
      refreshSubmit()
    })
  })

  function setAlert(type, msg){
    alertBox.className = 'alert alert-' + type
    alertBox.textContent = msg
    alertBox.classList.remove('hidden')
  }
  function clearAlert(){ alertBox.classList.add('hidden'); alertBox.textContent='' }

  // ── Submit ──
  form.addEventListener('submit', function(ev){
    ev.preventDefault()
    clearAlert()
    var v = validate(true)
    refreshSubmit()
    if(!v.ok){ return }

    btnSubmit.disabled = true
    btnSubmit.innerHTML = '<span class="spinner"></span> Création en cours…'

    fetch('/api/auth/signup', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body: JSON.stringify({
        prenom: v.values.prenom,
        nom: v.values.nom,
        email: v.values.email,
        telephone: v.values.telephone,
        password: v.values.password,
        marketing_consent: !!document.getElementById('marketing_consent').checked,
        intended_plan: planInput && planInput.value ? planInput.value : null
      })
    }).then(function(r){
      return r.json().then(function(data){ return { ok:r.ok, status:r.status, data:data } })
                     .catch(function(){ return { ok:r.ok, status:r.status, data:{} } })
    }).then(function(res){
      if(res.status === 201 || (res.ok && res.status === 200)){
        // Compte créé : on nettoie l'intention en sessionStorage (déjà persistée en base)
        try { sessionStorage.removeItem('intended_plan') } catch (e) { /* ignore */ }
        // Doctrine A : pas de session posée au signup. L'utilisateur doit
        // vérifier son email avant tout accès. Redirection vers la page
        // d'attente sobre /verify-pending.
        window.location.href = '/verify-pending'
        return
      }
      btnSubmit.disabled = false
      btnSubmit.textContent = 'Créer mon compte'
      if(res.status === 409){
        setErr('email', res.data.error || 'Cet email est déjà utilisé.')
        return
      }
      if(res.status === 422 && res.data && res.data.errors && typeof res.data.errors === 'object'){
        Object.keys(res.data.errors).forEach(function(k){
          if(errs[k]) setErr(k, String(res.data.errors[k]))
        })
        return
      }
      setAlert('error', (res.data && res.data.error) || 'Création impossible. Réessayez.')
    }).catch(function(err){
      btnSubmit.disabled = false
      btnSubmit.textContent = 'Créer mon compte'
      setAlert('error', 'Erreur réseau. Réessayez.')
      console.error(err)
    })
  })

  // Init
  refreshSubmit()
})()
</script>
</body>
</html>
