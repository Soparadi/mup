<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MovUP — Mot de passe oublié</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--surface:#F5F5F7;--card:#FFFFFF;--border:#E8E8ED;--border2:#C7C7CC;--text:#1D1D1F;--muted:#6E6E73;--green:#1D8348;--red:#CC0000;--font:'Geist',-apple-system,'Helvetica Neue',sans-serif}
  body{background:var(--surface);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 20px}
  .auth{width:100%;max-width:420px}
  .auth-brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:24px;text-decoration:none;color:var(--text);font-weight:800;font-size:18px;letter-spacing:-.4px}
  .auth-brand-logo{height:48px;width:auto;display:block}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .card-head{background:#1D1D1F;color:#fff;padding:18px 24px}
  .card-head h1{font-size:18px;font-weight:800;letter-spacing:-.3px;margin:0}
  .card-head p{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px}
  .card-body{padding:22px 24px}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
  .field input{font-family:var(--font);font-size:14px;padding:10px 12px;border:1px solid var(--border2);border-radius:9px;background:#fff;color:var(--text);outline:none;transition:border-color .12s,box-shadow .12s}
  .field input:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(29,29,31,.08)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);font-size:13.5px;font-weight:700;padding:11px 18px;border-radius:10px;border:1px solid transparent;cursor:pointer;width:100%;background:var(--text);color:#fff}
  .btn:hover:not(:disabled){background:#000}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .alert{padding:10px 12px;border-radius:9px;font-size:12.5px;margin-bottom:14px}
  .alert-error{background:rgba(204,0,0,.08);color:var(--red);border:1px solid rgba(204,0,0,.2)}
  .alert-success{background:rgba(29,131,72,.08);color:var(--green);border:1px solid rgba(29,131,72,.2)}
  .auth-foot{text-align:center;margin-top:18px;font-size:12.5px;color:var(--muted)}
  .auth-foot a{color:var(--text);font-weight:600;text-decoration:none}
  .auth-foot a:hover{text-decoration:underline}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
</style>
</head>
<body>
<main class="auth">
  <a href="/" class="auth-brand" aria-label="Accueil MovUP">
    <img src="/logo-v7-movup-court.svg" alt="MovUP" class="auth-brand-logo">
  </a>
  <div class="card">
    <div class="card-head">
      <h1>Mot de passe oublié</h1>
      <p>Recevez un lien de réinitialisation par email.</p>
    </div>
    <div class="card-body">
      <div id="alert" class="alert hidden"></div>
      <form id="form-forgot" autocomplete="on" novalidate>
        <div class="field">
          <label for="email">Email du compte</label>
          <input id="email" name="email" type="email" required autocomplete="email" placeholder="vous@entreprise.fr">
        </div>
        <button type="submit" id="btn-submit" class="btn">Envoyer le lien</button>
      </form>
    </div>
  </div>
  <div class="auth-foot">
    <a href="/login">Retour à la connexion</a>
  </div>
</main>
<script>
(function(){
  var alertBox = document.getElementById('alert')
  var form = document.getElementById('form-forgot')
  var btn = document.getElementById('btn-submit')
  function setAlert(type, msg){ alertBox.className='alert alert-'+type; alertBox.textContent=msg; alertBox.classList.remove('hidden') }
  form.addEventListener('submit', function(ev){
    ev.preventDefault()
    var email = document.getElementById('email').value.trim()
    if(!email){ setAlert('error','Email requis.'); return }
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Envoi...'
    fetch('/api/auth/forgot-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: email })
    }).then(function(r){ return r.json().then(function(d){ return { ok:r.ok, data:d } }) })
    .then(function(res){
      btn.disabled=false; btn.textContent='Envoyer le lien'
      if(!res.ok){ setAlert('error', res.data.error || 'Erreur.'); return }
      setAlert('success', res.data.message || 'Si ce compte existe, un email vient d\'être envoyé.')
      form.reset()
    }).catch(function(){
      btn.disabled=false; btn.textContent='Envoyer le lien'
      setAlert('error','Erreur réseau.')
    })
  })
})()
</script>
</body>
</html>
